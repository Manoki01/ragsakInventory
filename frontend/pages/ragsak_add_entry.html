<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Master Registry | Ragsak</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <style type="text/tailwindcss">
        @theme {
            --color-soft-black: #4A5D23;
            --color-moss-light: #8DA067;
            --color-soft-black: #121212;
            --color-off-white: #F4F5F2;
            --font-montserrat: "Montserrat", sans-serif;
        }

        @layer base {
            body {
                font-family: var(--font-montserrat);
                @apply bg-off-white text-soft-black antialiased overflow-hidden;
            }
        }

         /* Toast Styles */
        #toast-container {
            @apply fixed top-10 left-1/2 -translate-x-1/2 z-[100] flex flex-col items-center gap-3 pointer-events-none;
        }
        .toast-card {
            @apply bg-soft-black text-white px-8 py-4 rounded-2xl shadow-2xl border-l-4 flex items-center gap-4 transition-all duration-500 opacity-0 translate-y-[-20px] pointer-events-auto;
        }
        .toast-card.show { @apply opacity-100 translate-y-0; }
        .toast-success { @apply border-soft-black; }
        .toast-error { @apply border-red-600; }
        
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-track { @apply bg-transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { @apply bg-soft-black/20 rounded; }

        .process-checkbox:checked + label {
            @apply border-soft-black bg-soft-black/10 text-soft-black ring-1 ring-soft-black/20;
        }
    </style>
</head>
<body>
    <div id="toast-container"></div>

    <main class="min-h-screen lg:pl-64">
        <div class="lg:col-span-1">
            <div id="sidebar-container"></div>
        </div>

        <div class="flex h-full flex-col lg:col-span-7 px-10 pt-10 pb-6 overflow-hidden">
            <header class="mb-8 shrink-0">
                <h1 class="text-3xl font-black italic uppercase tracking-tighter text-soft-black">Master Registry</h1>
                <p class="text-[10px] font-bold text-soft-black uppercase tracking-[0.3em]">System Initialization</p>
            </header>

            <div class="grid grid-cols-1 lg:grid-cols-3 gap-10 flex-1 overflow-hidden">
                <div class="lg:col-span-2 flex flex-col h-full overflow-hidden">
                    <div class="bg-white rounded-[40px] border-t-[12px] border-soft-black flex flex-col h-full max-w-5xl overflow-hidden">
                        
                        <div class="px-10 py-6 border-b border-gray-50 shrink-0">
                            <h2 class="text-xl font-black italic uppercase tracking-tighter text-soft-black">Initialize Resource</h2>
                        </div>
                        
                        <form id="intakeForm" class="flex-1 overflow-y-auto custom-scrollbar px-10 py-8 space-y-10" onsubmit="event.preventDefault();">
                            
                            <div>
                                <label class="text-[9px] font-black text-gray-400 uppercase tracking-[0.2em] mb-3 block">Target Database</label>
                                <div class="grid grid-cols-3 gap-3">
                                    <label class="cursor-pointer">
                                        <input type="radio" name="db_toggle" value="ragsak_products_inv" class="hidden peer" checked onchange="updateDbFromRadio(this.value)">
                                        <div class="py-3 border-2 border-gray-100 rounded-xl text-center text-[9px] font-bold uppercase peer-checked:border-soft-black peer-checked:bg-soft-black/5 transition-all">Products</div>
                                    </label>
                                    <label class="cursor-pointer">
                                        <input type="radio" name="db_toggle" value="ragsak_materials_inv" class="hidden peer" onchange="updateDbFromRadio(this.value)">
                                        <div class="py-3 border-2 border-gray-100 rounded-xl text-center text-[9px] font-bold uppercase peer-checked:border-soft-black peer-checked:bg-soft-black/5 transition-all">Raw Materials</div>
                                    </label>
                                    <label class="cursor-pointer">
                                        <input type="radio" name="db_toggle" value="ragsak_packaging_inv" class="hidden peer" onchange="updateDbFromRadio(this.value)">
                                        <div class="py-3 border-2 border-gray-100 rounded-xl text-center text-[9px] font-bold uppercase peer-checked:border-soft-black peer-checked:bg-soft-black/5 transition-all">Packaging</div>
                                    </label>
                                </div>
                                <input type="hidden" id="targetDb" value="ragsak_products_inv">
                            </div>

                            <div class="grid grid-cols-1 md:grid-cols-2 gap-12">
                                <div class="space-y-8">
                                    <div class="relative">
                                        <label class="text-[9px] font-black text-gray-400 uppercase tracking-[0.2em] mb-1 block">Item Description</label>
                                        <input type="text" id="itemName" placeholder="Resource name..." required 
                                               class="w-full bg-gray-50 border-b-2 border-gray-100 py-3 text-sm font-bold outline-none focus:border-soft-black uppercase"
                                               autocomplete="off">
                                        <ul id="predictiveResults" class="absolute z-50 w-full bg-white shadow-2xl rounded-b-xl border border-gray-100 hidden max-h-40 overflow-y-auto custom-scrollbar top-full"></ul>
                                    </div>

                                    <div class="grid grid-cols-2 gap-6">
                                        <div>
                                            <label class="text-[9px] font-black text-gray-400 uppercase tracking-[0.2em] mb-1 block">Price (₱)</label>
                                            <input type="number" id="itemPrice" placeholder="0.00" step="0.01" required class="w-full bg-gray-50 border-b-2 border-gray-100 py-3 text-sm font-bold outline-none focus:border-soft-black">
                                        </div>
                                        <div>
                                            <label class="text-[9px] font-black text-gray-400 uppercase tracking-[0.2em] mb-1 block">Unit</label>
                                            <input type="text" id="itemUnit" placeholder="kg, pcs..." required class="w-full bg-gray-50 border-b-2 border-gray-100 py-3 text-sm font-bold outline-none focus:border-soft-black uppercase">
                                        </div>
                                    </div>
                                </div>

                                <div>
                                    <label id="processLabel" class="text-[9px] font-black text-gray-400 uppercase tracking-[0.2em] mb-3 block">Production Phases</label>
                                    <div id="processCheckboxContainer" class="grid grid-cols-1 gap-2 max-h-48 overflow-y-auto custom-scrollbar p-1"></div>
                                </div>
                            </div>
                        </form>

                        <div class="px-10 py-6 bg-gray-50 border-t border-gray-100 shrink-0">
                            <button type="submit" id="submitBtn" form="intakeForm" class="w-full bg-soft-black text-white text-[10px] font-black py-5 rounded-2xl hover:bg-soft-black/50 transition-all uppercase tracking-[0.4em] shadow-xl">
                                Register Resource
                            </button>
                        </div>
                    </div>
                </div>

                <div class="lg:col-span-1 flex flex-col bg-soft-black rounded-[40px] p-8 overflow-hidden h-full">
                    <div class="flex flex-col mb-6 shrink-0 gap-1">
                        <h3 class="text-white text-lg font-black italic uppercase tracking-tighter">
                            Information Preview
                        </h3>
                        <p id="dbLabel"
                        class="text-white/60 text-[10px] font-bold uppercase tracking-widest">
                        </p>
                    </div>
                    <div class="flex-1 overflow-y-auto custom-scrollbar pr-1">
                        <div id="logBody" class="space-y-4"></div>
                        <div id="emptyState"
                            class="h-full flex flex-col items-center justify-center text-white/10 italic text-center">
                            <p class="text-[10px] uppercase tracking-widest font-bold">
                                Awaiting Input
                            </p>
                        </div>

                    </div>
                </div>
            </div>
        </div>
    </main>

    <script>
        window.currentPageId = 'nav-add-entry';
    </script>
    <script type="module" src="../components/ragsak_navigation.js"></script>
    <script type="module">
        import { getProcesses } from "../assets/js/api.js";
        import { addProduct } from "../assets/js/products.js";
        import { addRawMaterial } from "../assets/js/raw_materials.js";
        import { addPackaging } from "../assets/js/packaging.js";
        import { showToast } from '../components/notification.js';

        const intakeForm = document.getElementById("intakeForm");
        const processContainer = document.getElementById("processCheckboxContainer");
        document.getElementById("itemName").addEventListener("input", updatePreview);
        document.getElementById("itemPrice").addEventListener("input", updatePreview);
        document.getElementById("itemUnit").addEventListener("input", updatePreview);
        const FINISHED_PRODUCT_ID = 7; 
        const FINISHED_PRODUCT_NAME = "Finished Product";

        let cachedProcesses = null;
        let selectedProcessOrder = [];

        initialize();

        function initialize() {
            loadProcessesIfNeeded();
            updateDbLabel();
        }

        window.updateDbFromRadio = function (value) {
            document.getElementById("targetDb").value = value;
            loadProcessesIfNeeded();
        };

        async function loadProcessesIfNeeded() {
            const targetDb = document.getElementById("targetDb").value;
            const label = document.getElementById("processLabel");

            if (targetDb === "ragsak_products_inv") {
                label.textContent = "Production Phases";
            } else {
                label.textContent = "Material Type";
            }

            if (targetDb !== "ragsak_products_inv") {
                displayNonProductOptions();
                return;
            }

            if (cachedProcesses) {
                displayProcesses(cachedProcesses);
                return;
            }

            try {
                const response = await getProcesses();

                if (response.status !== "success") {
                    console.error(response.message);
                    return;
                }

                cachedProcesses = response.data;
                displayProcesses(cachedProcesses);

            } catch (error) {
                console.error("Failed to load processes", error);
            }
        }

        function displayProcesses(processes) {
            processContainer.innerHTML = "";

            if (!processes || processes.length === 0) {
                processContainer.innerHTML = `
                    <div class="text-gray-400 text-[10px] uppercase">
                        No processes available
                    </div>`;
                return;
            }

            processes.forEach(process => {
                // ❌ skip Finished Product if it's in DB (avoid duplicate)
                if (Number(process.processID) === FINISHED_PRODUCT_ID) return;

                const wrapper = document.createElement("div");

                const checkbox = document.createElement("input");
                checkbox.addEventListener("change", (e) => {
                    const id = parseInt(e.target.value, 10);

                    if (e.target.checked) {
                        selectedProcessOrder.push(id);
                    } else {
                        selectedProcessOrder = selectedProcessOrder.filter(x => x !== id);
                    }

                    updatePreview();
                });

                checkbox.type = "checkbox";
                checkbox.id = `proc_${process.processID}`;
                checkbox.name = "selectedProcesses";
                checkbox.value = process.processID;
                checkbox.className = "hidden peer process-checkbox";

                const label = document.createElement("label");
                label.htmlFor = checkbox.id;
                label.className =
                    "flex items-center justify-between px-3 py-2 border border-gray-100 rounded-lg cursor-pointer text-[8px] font-bold uppercase transition-all hover:bg-gray-50 peer-checked:border-soft-black peer-checked:bg-soft-black/10";

                label.textContent = process.processName;

                const checkmark = document.createElement("span");
                checkmark.className =
                    "text-soft-black opacity-0 peer-checked:opacity-100 font-black";
                checkmark.textContent = "✔";

                label.appendChild(checkmark);

                wrapper.append(checkbox, label);
                processContainer.appendChild(wrapper);
            });

            const wrapper = document.createElement("div");

            const checkbox = document.createElement("input");
            checkbox.type = "checkbox";
            checkbox.id = `proc_${FINISHED_PRODUCT_ID}`;
            checkbox.value = FINISHED_PRODUCT_ID;
            checkbox.checked = true;
            checkbox.disabled = true; // 🔥 KEY PART
            checkbox.className = "hidden peer process-checkbox";

            const label = document.createElement("label");
            label.className =
                "flex items-center justify-between px-3 py-2 border border-soft-black bg-soft-black/10 text-soft-black rounded-lg text-[8px] font-bold uppercase cursor-not-allowed opacity-80";

            label.textContent = FINISHED_PRODUCT_NAME;

            const checkmark = document.createElement("span");
            checkmark.className = "text-soft-black font-black";
            checkmark.textContent = "✔";

            label.appendChild(checkmark);

            wrapper.append(checkbox, label);
            processContainer.appendChild(wrapper);

            updatePreview();
        }

        function displayNonProductOptions() {
            processContainer.innerHTML = "";

            const options = [
                { id: "main", label: "Main" },
                { id: "alternative", label: "Alternative" }
            ];

            options.forEach(opt => {
                const wrapper = document.createElement("div");

                const radio = document.createElement("input");
                radio.addEventListener("change", updatePreview);
                radio.type = "radio";
                radio.id = `opt_${opt.id}`;
                radio.name = "altType"; // IMPORTANT: same name = radio group
                radio.value = opt.id;
                radio.className = "hidden peer process-checkbox";

                const label = document.createElement("label");
                label.htmlFor = radio.id;
                label.className =
                    "flex items-center justify-between px-3 py-2 border border-gray-100 rounded-lg cursor-pointer text-[8px] font-bold uppercase transition-all hover:bg-gray-50 peer-checked:border-soft-black peer-checked:bg-soft-black/10";

                label.textContent = opt.label;

                const checkmark = document.createElement("span");
                checkmark.className =
                    "text-soft-black opacity-0 peer-checked:opacity-100 font-black";
                checkmark.textContent = "✔";

                label.appendChild(checkmark);

                wrapper.append(radio, label);
                processContainer.appendChild(wrapper);
            });
        }

        intakeForm.addEventListener("submit", e => {
            e.preventDefault();
            processIntake();
        });

        async function processIntake() {
            const submitBtn = document.getElementById("submitBtn");
            const targetDb = document.getElementById("targetDb").value;

            const unitName = document.getElementById("itemName").value.trim();
            const unitPrice = parseFloat(document.getElementById("itemPrice").value);
            const unitType = document.getElementById("itemUnit").value.trim();

            let data = {
                unitName,
                unitType,
                unitPrice
            };

            if (targetDb === "ragsak_products_inv") {
                let ordered = [...selectedProcessOrder];

                ordered = [...new Set(ordered)];

                ordered = ordered.filter(id => id !== FINISHED_PRODUCT_ID);

                if (ordered.length === 0) {
                    ordered = [FINISHED_PRODUCT_ID];
                } else {
                    ordered.push(FINISHED_PRODUCT_ID);
                }

                data.processes = ordered;
            }
           else {
                const materialType = getCategoryType();
                data.materialType = materialType;
            }

            console.log("Passing data:", data);

            if (!unitName || !unitType || isNaN(unitPrice)) {
                showToast("Please fill in all required fields", "error");
                return;
            }

            if (targetDb === "ragsak_products_inv" && (!data.processes || data.processes.length === 0)) {
                showToast("Please select at least one process", "error");
                return;
            }

            if (targetDb !== "ragsak_products_inv" && !data.materialType) {
                showToast("Please select Main or Alternative", "error");
                return;
            }

            submitBtn.disabled = true;
            submitBtn.classList.add("opacity-70", "cursor-not-allowed");

            try {
                let response;

                switch (targetDb) {
                    case "ragsak_products_inv":
                        response = await addProduct(data);
                        break;

                    case "ragsak_materials_inv":
                        response = await addRawMaterial(data);
                        break;

                    case "ragsak_packaging_inv":
                        response = await addPackaging(data);
                        break;
                }

                const isSuccess = response === true || response?.success === true;
                const responseMessage = typeof response === "object" && response !== null
                    ? response.message
                    : null;

                if (isSuccess) {
                    showToast(responseMessage || "Resource added successfully", "success");
                    clearPreview();
                } else {
                    showToast(responseMessage || "Failed to register resource", "error");
                }
            } finally {
                submitBtn.disabled = false;
                submitBtn.classList.remove("opacity-70", "cursor-not-allowed");
            }
        }

        function updatePreview() {
            const name = document.getElementById("itemName").value.trim();
            const price = document.getElementById("itemPrice").value;
            const unit = document.getElementById("itemUnit").value.trim();
            const targetDb = document.getElementById("targetDb").value;
            const logBody = document.getElementById("logBody");
            const emptyState = document.getElementById("emptyState");

            let selectedItems = [];
            const selectionLabel =
                targetDb === "ragsak_products_inv"
                    ? "Product Phases"
                    : "Material Type";

            if (targetDb === "ragsak_products_inv") {
                selectedItems = selectedProcessOrder.map((id, index) => {
                    const label = document.querySelector(`#proc_${id}`)
                        ?.nextElementSibling
                        ?.textContent
                        ?.replace("✔", "")
                        .trim();

                    return `${index + 1}. ${label}`;
                });

                if (selectedProcessOrder.length === 0) {
                    selectedItems = [`1. ${FINISHED_PRODUCT_NAME}`];
                } else {
                    selectedItems.push(`${selectedItems.length + 1}. ${FINISHED_PRODUCT_NAME}`);
                }
            }
            else {
                const selected = document.querySelector("#processCheckboxContainer input:checked");
                if (selected) {
                    selectedItems = [
                        selected.nextElementSibling.textContent.replace("✔", "").trim()
                    ];
                }
            }

            let html = "";

            if (name) {
                html += `<p class="text-white text-sm font-black tracking-wide">
                    Name: <span class="text-white/90">${name}</span>
                </p>`;
            }
            if (price) {
                html += `<p class="text-white text-sm font-black tracking-wide">
                    Price: <span class="text-white/90">
                        ₱${Number(price || 0).toLocaleString("en-PH", {
                            minimumFractionDigits: 2,
                            maximumFractionDigits: 2
                        })}
                    </span>
                </p>`;
            }
            if (unit) {
                html += `<p class="text-white text-sm font-black tracking-wide">
                    Unit: <span class="text-white/90">${unit}</span>
                </p>`;
            }
            if (selectedItems.length > 0) {
                html += `<p class="text-white text-sm font-black mt-4 tracking-wide">
                    ${selectionLabel}:
                </p>`;

                selectedItems.forEach(item => {
                    html += `<p class="text-white text-xs font-semibold ml-2 opacity-90">
                        • ${item}
                    </p>`;
                });
            }
            if (!name && !price && !unit && selectedItems.length === 0) {
                emptyState.style.display = "flex";
                logBody.innerHTML = "";
            } else {
                emptyState.style.display = "none";
                logBody.innerHTML = html;
            }
        }

        function updateDbLabel() {
            const targetDb = document.getElementById("targetDb").value;
            const dbLabel = document.getElementById("dbLabel");

            const labels = {
                ragsak_products_inv: "Products",
                ragsak_materials_inv: "Raw Materials",
                ragsak_packaging_inv: "Packaging"
            };

            dbLabel.textContent = labels[targetDb] || "Unknown Database";
        }

        window.updateDbFromRadio = function (value) {
            document.getElementById("targetDb").value = value;

            clearPreview();

            loadProcessesIfNeeded();
            updateDbLabel();
        };

        function clearPreview() {
            document.getElementById("itemName").value = "";
            document.getElementById("itemPrice").value = "";
            document.getElementById("itemUnit").value = "";
            selectedProcessOrder = [];

            // clear selections (checkboxes / radios)
            document.querySelectorAll("#processCheckboxContainer input").forEach(input => {
                input.checked = false;
            });

            // clear preview panel
            document.getElementById("logBody").innerHTML = "";

            // show empty state again
            document.getElementById("emptyState").style.display = "flex";
        }

        function getCategoryType() {
            const selected = document.querySelector(
                '#processCheckboxContainer input[name="altType"]:checked'
            );

            return selected ? selected.value : null;
        }
        </script>
</body>
</html>
