<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Order Management | Ragsak</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">

    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <style type="text/tailwindcss">
        @theme {
            --color-soft-black: #4A5D23;
            --color-moss-light: #8DA067;
            --color-soft-black: #121212;
            --color-off-white: #F4F5F2;
            --font-montserrat: "Montserrat", sans-serif;
        }

        @layer base {
            body {
                font-family: var(--font-montserrat);
                @apply bg-off-white text-soft-black antialiased;
            }
        }

        #orderModal:not(.hidden), #viewModal:not(.hidden) { @apply !flex items-center justify-center; }

        .custom-scrollbar::-webkit-scrollbar { width: 4px; height: 4px; }
        .custom-scrollbar::-webkit-scrollbar-track { @apply bg-soft-black; }
        .custom-scrollbar::-webkit-scrollbar-thumb { @apply bg-soft-black rounded; }

        #toast-container {
            @apply fixed top-6 left-1/2 -translate-x-1/2 z-[100] flex flex-col items-center gap-3 pointer-events-none px-4;
        }
        .toast-card {
            @apply bg-soft-black text-white px-6 py-4 rounded-2xl shadow-2xl border-l-4 flex items-center gap-4 transition-all duration-500 opacity-0 translate-y-[-20px] pointer-events-auto max-w-full;
        }
        .toast-card.show { @apply opacity-100 translate-y-0; }

        input:disabled { @apply bg-gray-100 cursor-not-allowed opacity-80; }
    </style>
</head>
<body>
    <div id="toast-container"></div>
    <div id="sidebar-container"></div>

    <main class="min-h-screen lg:pl-64">
        <div class="flex min-h-screen flex-col px-4 pt-6 pb-6 sm:px-6 lg:px-8 lg:pt-10 overflow-hidden">
            <header class="mb-8 flex flex-col gap-5 md:mb-10 md:flex-row md:items-start md:justify-between">
                <div>
                    <h1 class="text-2xl sm:text-3xl font-black italic uppercase tracking-tighter leading-none text-soft-black">
                        Order Fulfillment
                    </h1>
                    <p class="text-[10px] font-bold text-soft-black uppercase mt-2 tracking-[0.2em]">
                        Customer Pipeline • Ragsak Farm
                    </p>
                </div>

                <div class="relative w-full md:w-auto">
                    <input
                        type="text"
                        id="orderSearch"
                        placeholder="Search orders..."
                        class="h-11 w-full md:w-72 rounded-xl border border-gray-200 bg-white px-4 text-xs text-soft-black outline-none transition-all shadow-sm focus:border-soft-black focus:ring-2 focus:ring-soft-black/10 placeholder:text-gray-400"
                    >
                </div>
            </header>

            <div class="flex-1 overflow-hidden bg-white rounded-3xl p-4 sm:p-6 shadow-sm border border-gray-100 flex flex-col min-h-[420px]">
                <div class="flex flex-col gap-3 sm:flex-row sm:items-center sm:justify-between mb-6 px-2">
                    <p class="text-[10px] font-bold uppercase tracking-[0.3em] text-gray-500">
                        Active Sales Orders
                    </p>
                    <button type="button" onclick="openOrderModal()" class="bg-soft-black hover:bg-soft-black/50 text-white text-[9px] font-black px-4 py-3 rounded-lg uppercase tracking-widest transition-all shadow-md">
                        Create New Order
                    </button>
                </div>

                <div class="flex-1 overflow-auto custom-scrollbar pr-2">
                    <table class="w-full text-left min-w-[1100px] table-fixed">
                        <thead class="sticky top-0 z-10">
                            <tr class="border-b border-gray-200">
                                <th class="pb-6 pt-2 px-2 text-[10px] font-bold uppercase tracking-widest text-gray-600">Customer</th>
                                <th class="pb-6 pt-2 w-[150px] text-[10px] font-bold uppercase tracking-widest text-gray-600">Contact</th>
                                <th class="pb-6 pt-2 text-[10px] font-bold uppercase tracking-widest text-gray-600">Product</th>
                                <th class="pb-6 pt-2 w-[100px] text-center text-[10px] font-bold uppercase text-gray-600">Qty</th>
                                <th class="pb-6 pt-2 w-[130px] text-center text-[10px] font-bold uppercase text-gray-600">Status</th>
                                <th class="pb-6 pt-2 w-[140px] text-center text-[10px] font-bold uppercase text-gray-600">Due Date</th>
                                <th class="pb-6 pt-2 w-[140px] text-right text-[10px] font-bold uppercase text-gray-600 pr-2">Control</th>
                            </tr>
                        </thead>
                        <tbody id="orderTableBody" class="divide-y divide-gray-200"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>

    <div id="orderModal" class="hidden fixed inset-0 bg-soft-black/30 z-[60] p-3 sm:p-4 backdrop-blur-sm">
        <div class="bg-white w-full max-w-4xl rounded-3xl overflow-hidden shadow-2xl border-t-[14px] border-soft-black max-h-[95vh]">
            <div class="p-5 sm:p-8 lg:p-10 max-h-[95vh] overflow-y-auto">
                <h2 id="modalTitle" class="text-xl sm:text-2xl font-black italic uppercase tracking-tighter text-soft-black mb-8 border-b border-gray-100 pb-4">
                    New Sales Order
                </h2>

                <div class="space-y-6">
                    <input type="hidden" id="editOrderId">

                    <div>
                        <label class="text-[10px] font-bold text-gray-400 uppercase tracking-widest ml-1">Customer Name</label>
                        <input type="text" id="custName" class="w-full bg-gray-50 border-b-2 border-gray-200 py-4 px-2 text-sm font-bold outline-none focus:border-soft-black transition-all" placeholder="Enter name...">
                    </div>

                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div>
                            <label class="text-[10px] font-bold text-gray-400 uppercase tracking-widest ml-1">Contact Number</label>
                            <input type="text" id="custContact" class="w-full bg-gray-50 border-b-2 border-gray-200 py-4 px-2 text-sm font-bold outline-none focus:border-soft-black transition-all" placeholder="09XXXXXXXXX">
                        </div>

                        <div>
                            <label class="text-[10px] font-bold text-gray-400 uppercase tracking-widest ml-1">Order Status</label>
                            <select id="orderStatus" class="w-full bg-gray-50 border-b-2 border-gray-200 py-4 px-2 text-sm font-bold outline-none focus:border-soft-black transition-all appearance-none">
                                <option value="pending">Pending</option>
                                <option value="completed">Completed</option>
                                <option value="canceled">Canceled</option>
                            </select>
                        </div>
                    </div>

                    <div>
                        <label class="text-[10px] font-bold text-gray-400 uppercase tracking-widest ml-1">Customer Address</label>
                        <textarea id="custAddress" rows="3" class="w-full resize-none bg-gray-50 border-b-2 border-gray-200 py-4 px-2 text-sm font-bold outline-none focus:border-soft-black transition-all" placeholder="Enter delivery address..."></textarea>
                    </div>

                    <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                        <div>
                            <label class="text-[10px] font-bold text-gray-400 uppercase tracking-widest ml-1">Select Product</label>
                            <select id="prodSelect" onchange="updateAvailableStock()" class="w-full bg-gray-50 border-b-2 border-gray-200 py-4 px-2 text-sm font-bold outline-none focus:border-soft-black transition-all appearance-none"></select>
                        </div>

                        <div>
                            <label class="text-[10px] font-bold text-gray-400 uppercase tracking-widest ml-1">Current Stock</label>
                            <div class="relative">
                                <input type="text" id="availableQty" disabled class="w-full border-b-2 border-gray-200 py-4 px-2 text-sm font-black text-soft-black outline-none" value="0">
                                <span id="unitLabel" class="absolute right-2 top-1/2 -translate-y-1/2 text-[9px] font-bold text-gray-400 uppercase">Unit</span>
                            </div>
                        </div>

                        <div>
                            <label class="text-[10px] font-bold text-gray-400 uppercase tracking-widest ml-1">Order Amount</label>
                            <input type="number" id="orderQty" class="w-full bg-gray-50 border-b-2 border-gray-200 py-4 px-2 text-sm font-bold outline-none focus:border-soft-black transition-all" placeholder="0">
                        </div>
                    </div>

                    <div>
                        <label class="text-[10px] font-bold text-gray-400 uppercase tracking-widest ml-1">Target Completion Date</label>
                        <input type="date" id="dueDate" class="w-full bg-gray-50 border-b-2 border-gray-200 py-4 px-2 text-sm font-bold outline-none focus:border-soft-black transition-all">
                    </div>

                    <div class="pt-6 grid grid-cols-1 md:grid-cols-2 gap-3">
                        <button type="button" id="saveOrderButton" onclick="commitOrder()" class="bg-soft-black text-white text-[11px] font-black py-5 rounded-2xl hover:bg-soft-black/50 transition-all uppercase tracking-widest shadow-xl">
                            Confirm Entry
                        </button>
                        <button type="button" onclick="closeOrderModal()" class="py-5 text-[10px] font-bold uppercase text-gray-400 hover:text-red-600 transition-all tracking-widest">
                            Abort
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        window.currentPageId = 'nav-orders';
    </script>
    <script type="module" src="../components/ragsak_navigation.js"></script>
    <script type="module">
        import { getOrders, getOrderFinishedProducts, createOrder, updateOrder } from '../assets/js/api.js';

        let orders = [];
        let finishedProducts = [];

        function escapeHtml(value) {
            return String(value ?? '').replace(/[&<>"']/g, char => ({
                '&': '&amp;',
                '<': '&lt;',
                '>': '&gt;',
                '"': '&quot;',
                "'": '&#039;'
            }[char]));
        }

        function showToast(msg, type) {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = `toast-card show ${type === 'success' ? 'border-soft-black' : 'border-red-600'}`;
            toast.innerHTML = `<p class="text-[10px] font-black uppercase tracking-widest">${escapeHtml(msg)}</p>`;
            container.appendChild(toast);
            setTimeout(() => {
                toast.classList.remove('show');
                setTimeout(() => toast.remove(), 500);
            }, 3000);
        }

        function getSelectedFinishedProduct() {
            const value = document.getElementById('prodSelect').value;
            const [productID, processID] = value.split(':').map(Number);
            return finishedProducts.find(product =>
                Number(product.productID) === productID &&
                Number(product.processID) === processID
            );
        }

        function loadProductOptions(selectedValue = '') {
            const select = document.getElementById('prodSelect');
            select.innerHTML = '<option value="" disabled selected>Choose Finished Product...</option>' +
                finishedProducts.map(product => {
                    const value = `${product.productID}:${product.processID}`;
                    return `<option value="${value}">${escapeHtml(product.productName)} [${escapeHtml(product.unitType)}]</option>`;
                }).join('');

            if (selectedValue) {
                select.value = selectedValue;
            }

            updateAvailableStock();
        }

        function updateAvailableStock() {
            const selectedItem = getSelectedFinishedProduct();

            if (selectedItem) {
                document.getElementById('availableQty').value = selectedItem.quantity;
                document.getElementById('unitLabel').innerText = selectedItem.unitType || 'QTY';
                return;
            }

            document.getElementById('availableQty').value = '0';
            document.getElementById('unitLabel').innerText = 'Unit';
        }

        function getStatusClass(status) {
            if (status === 'completed') return 'bg-soft-black text-white';
            if (status === 'canceled') return 'bg-red-50 text-red-600 border border-red-100';
            return 'bg-yellow-50 text-yellow-700 border border-yellow-100';
        }

        function renderOrders() {
            const body = document.getElementById('orderTableBody');
            const search = document.getElementById('orderSearch').value.trim().toLowerCase();
            const visibleOrders = orders.filter(order => {
                const haystack = `${order.customerName} ${order.contactNumber} ${order.customerAddress} ${order.productName} ${order.orderStatus}`.toLowerCase();
                return haystack.includes(search);
            });

            if (visibleOrders.length === 0) {
                body.innerHTML = `
                    <tr>
                        <td colspan="7" class="py-16 text-center text-[10px] font-black uppercase tracking-[0.25em] text-gray-400">
                            No orders found
                        </td>
                    </tr>
                `;
                return;
            }

            body.innerHTML = visibleOrders.map(order => `
                <tr class="group hover:bg-gray-50/50 transition-colors">
                    <td class="py-6 px-2">
                        <p class="text-sm font-bold text-soft-black uppercase tracking-tight italic">${escapeHtml(order.customerName)}</p>
                        <p class="mt-1 truncate text-[10px] font-bold text-gray-400">${escapeHtml(order.customerAddress)}</p>
                    </td>
                    <td class="py-6 text-xs font-bold text-soft-black/70">${escapeHtml(order.contactNumber)}</td>
                    <td class="py-6">
                        <span class="text-xs font-bold text-soft-black">${escapeHtml(order.productName)}</span>
                        <span class="text-[9px] font-black uppercase text-white bg-soft-black border border-soft-black px-2 py-0.5 rounded ml-2">
                            ${escapeHtml(order.processName)}
                        </span>
                    </td>
                    <td class="py-6 text-center text-sm font-black text-soft-black">${escapeHtml(order.quantity)}</td>
                    <td class="py-6 text-center">
                        <span class="inline-flex rounded-full px-3 py-1 text-[9px] font-black uppercase tracking-widest ${getStatusClass(order.orderStatus)}">
                            ${escapeHtml(order.orderStatus)}
                        </span>
                    </td>
                    <td class="py-6 text-center text-[10px] font-bold text-gray-400 uppercase tracking-widest">${escapeHtml(order.dateCompletion)}</td>
                    <td class="py-6 text-right pr-2">
                        <button type="button" onclick="editOrder('${escapeHtml(order.orderID)}')" class="text-soft-black/40 hover:text-soft-black text-[9px] font-black uppercase tracking-widest transition-colors">
                            Edit
                        </button>
                    </td>
                </tr>
            `).join('');
        }

        async function loadOrderData() {
            const [ordersResponse, productsResponse] = await Promise.all([
                getOrders(),
                getOrderFinishedProducts()
            ]);

            if (!ordersResponse || ordersResponse.status !== 'success') {
                showToast(ordersResponse?.message || 'Failed to load orders', 'error');
                return;
            }

            if (!productsResponse || productsResponse.status !== 'success') {
                showToast(productsResponse?.message || 'Failed to load finished products', 'error');
                return;
            }

            orders = ordersResponse.data || [];
            finishedProducts = productsResponse.data || [];
            loadProductOptions();
            renderOrders();
        }

        function editOrder(id) {
            const order = orders.find(o => Number(o.orderID) === Number(id));
            if (!order) return;

            document.getElementById('modalTitle').innerText = "Update Sales Order";
            document.getElementById('editOrderId').value = order.orderID;
            document.getElementById('custName').value = order.customerName || '';
            document.getElementById('custContact').value = order.contactNumber || '';
            document.getElementById('custAddress').value = order.customerAddress || '';
            document.getElementById('orderStatus').value = order.orderStatus || 'pending';
            document.getElementById('orderQty').value = order.quantity || '';
            document.getElementById('dueDate').value = order.dateCompletion || '';
            loadProductOptions(`${order.productID}:${order.processID}`);
            document.getElementById('orderModal').classList.remove('hidden');
        }

        async function commitOrder() {
            const editId = document.getElementById('editOrderId').value;
            const selectedItem = getSelectedFinishedProduct();
            const quantity = Number(document.getElementById('orderQty').value);

            const payload = {
                customerName: document.getElementById('custName').value.trim(),
                contactNumber: document.getElementById('custContact').value.trim(),
                customerAddress: document.getElementById('custAddress').value.trim(),
                productID: selectedItem ? Number(selectedItem.productID) : null,
                processID: selectedItem ? Number(selectedItem.processID) : null,
                quantity,
                orderStatus: document.getElementById('orderStatus').value,
                dateCompletion: document.getElementById('dueDate').value
            };

            if (!payload.customerName || !payload.contactNumber || !payload.customerAddress || !payload.productID || !payload.quantity || !payload.dateCompletion) {
                showToast("Missing Fields", "error");
                return;
            }

            if (payload.quantity <= 0 || !Number.isInteger(payload.quantity)) {
                showToast("Quantity must be a positive whole number", "error");
                return;
            }

            if (selectedItem && Number(selectedItem.quantity) < payload.quantity) {
                showToast("Order quantity is greater than finished product stock", "error");
                return;
            }

            const saveButton = document.getElementById('saveOrderButton');
            saveButton.disabled = true;
            saveButton.textContent = 'Saving Order...';

            try {
                if (editId) {
                    payload.orderID = Number(editId);
                }

                const response = editId
                    ? await updateOrder(payload)
                    : await createOrder(payload);

                if (!response || response.status !== 'success') {
                    showToast(response?.message || 'Order save failed', 'error');
                    return;
                }

                showToast(response.message || 'Order saved', 'success');
                closeOrderModal();
                await loadOrderData();
            } catch (error) {
                showToast("Failed to connect to orders", "error");
            } finally {
                saveButton.disabled = false;
                saveButton.textContent = 'Confirm Entry';
            }
        }

        function openOrderModal() {
            document.getElementById('modalTitle').innerText = "New Sales Order";
            document.getElementById('editOrderId').value = "";
            document.getElementById('custName').value = "";
            document.getElementById('custContact').value = "";
            document.getElementById('custAddress').value = "";
            document.getElementById('orderStatus').value = "pending";
            document.getElementById('orderQty').value = "";
            document.getElementById('dueDate').value = "";
            loadProductOptions();
            document.getElementById('orderModal').classList.remove('hidden');
        }

        function closeOrderModal() {
            document.getElementById('orderModal').classList.add('hidden');
        }

        document.getElementById('orderSearch').addEventListener('input', renderOrders);

        window.openOrderModal = openOrderModal;
        window.closeOrderModal = closeOrderModal;
        window.commitOrder = commitOrder;
        window.editOrder = editOrder;
        window.updateAvailableStock = updateAvailableStock;

        loadOrderData();
    </script>
</body>
</html>
