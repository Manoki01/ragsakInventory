<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Order Management | Ragsak</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <style type="text/tailwindcss">
        @theme {
            --color-moss-green: #4A5D23;
            --color-moss-light: #8DA067;
            --color-soft-black: #121212;
            --color-off-white: #F4F5F2;
            --font-montserrat: "Montserrat", sans-serif;
        }

        @layer base {
            body {
                font-family: var(--font-montserrat);
                @apply bg-off-white text-soft-black antialiased;
            }
        }

        #orderModal:not(.hidden), #viewModal:not(.hidden) { @apply !flex items-center justify-center; }

        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-track { @apply bg-soft-black; }
        .custom-scrollbar::-webkit-scrollbar-thumb { @apply bg-moss-green rounded; }

        #toast-container {
            @apply fixed top-10 left-1/2 -translate-x-1/2 z-[100] flex flex-col items-center gap-3 pointer-events-none;
        }
        .toast-card {
            @apply bg-soft-black text-white px-8 py-4 rounded-2xl shadow-2xl border-l-4 flex items-center gap-4 transition-all duration-500 opacity-0 translate-y-[-20px] pointer-events-auto;
        }
        .toast-card.show { @apply opacity-100 translate-y-0; }
    </style>
</head>
<body>

    <div id="toast-container"></div>

    <div class="grid grid-cols-1 lg:grid-cols-8">
        <div class="lg:col-span-1">
            <div id="sidebar-container"></div>
        </div>

        <div class="flex h-screen flex-col lg:col-span-7 px-8 pt-10 pb-6">
            <header class="flex flex-col md:flex-row justify-between items-start mb-10 gap-6">
                <div>
                    <h1 class="text-3xl font-black italic uppercase tracking-tighter leading-none text-soft-black">Order Fulfillment</h1>
                    <p class="text-[10px] font-bold text-moss-green uppercase mt-2 tracking-[0.2em]">Customer Pipeline • Ragsak Farm</p>
                </div>
                <div class="relative">
                    <input type="text" id="orderSearch" placeholder="Search orders..." 
                        class="h-11 w-72 rounded-xl border border-gray-200 bg-white px-4 text-xs text-soft-black outline-none transition-all shadow-sm focus:border-moss-green focus:ring-2 focus:ring-moss-green/10 placeholder:text-gray-400">
                </div>
            </header>

            <div class="flex-1 overflow-hidden bg-soft-black rounded-3xl p-6 shadow-2xl flex flex-col">
                <div class="flex items-center justify-between mb-6 px-2">
                    <p class="text-[10px] font-bold uppercase tracking-[0.3em] text-white/50">Active Sales Orders</p>
                    <button onclick="openOrderModal()" class="bg-white/10 hover:bg-white/20 text-white text-[9px] font-black px-4 py-2 rounded-lg uppercase tracking-widest transition-all">Create New Order</button>
                </div>
                
                <div class="flex-1 overflow-y-auto custom-scrollbar pr-2">
                    <table class="w-full text-left min-w-[800px] table-fixed">
                        <thead class="sticky top-0 bg-soft-black z-10">
                            <tr class="border-b border-white/5">
                                <th class="pb-6 px-2 text-[10px] font-bold uppercase tracking-widest text-white/60">Customer</th>
                                <th class="pb-6 text-[10px] font-bold uppercase tracking-widest text-white/60">Product (Process)</th>
                                <th class="pb-6 w-[100px] text-center text-[10px] font-bold uppercase text-white/60">Qty</th> 
                                <th class="pb-6 w-[160px] text-center text-[10px] font-bold uppercase text-white/60">Due Date</th>
                                <th class="pb-6 w-[100px] text-right text-[10px] font-bold uppercase text-white/60 pr-2">Ctrl</th>
                            </tr>
                        </thead>
                        <tbody id="orderTableBody" class="divide-y divide-white/5"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <div id="orderModal" class="hidden fixed inset-0 bg-soft-black/30 z-[60] p-4 backdrop-blur-sm">
        <div class="bg-white w-full max-w-4xl rounded-3xl overflow-hidden shadow-2xl border-t-[14px] border-moss-green">
            <div class="p-10">
                <h2 class="text-2xl font-black italic uppercase tracking-tighter text-soft-black mb-8 border-b border-gray-100 pb-4">New Sales Order</h2>
                
                <div class="space-y-6">
                    <div>
                        <label class="text-[10px] font-bold text-gray-400 uppercase tracking-widest ml-1">Customer Name</label>
                        <input type="text" id="custName" class="w-full bg-gray-50 border-b-2 border-gray-200 py-4 px-2 text-sm font-bold outline-none focus:border-moss-green transition-all" placeholder="Enter name...">
                    </div>

                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div>
                            <label class="text-[10px] font-bold text-gray-400 uppercase tracking-widest ml-1">Select Product & Process</label>
                            <select id="prodSelect" class="w-full bg-gray-50 border-b-2 border-gray-200 py-4 px-2 text-sm font-bold outline-none focus:border-moss-green transition-all appearance-none">
                                </select>
                        </div>
                        <div>
                            <label class="text-[10px] font-bold text-gray-400 uppercase tracking-widest ml-1">Order Quantity</label>
                            <input type="number" id="orderQty" class="w-full bg-gray-50 border-b-2 border-gray-200 py-4 px-2 text-sm font-bold outline-none focus:border-moss-green transition-all" placeholder="0">
                        </div>
                    </div>

                    <div>
                        <label class="text-[10px] font-bold text-gray-400 uppercase tracking-widest ml-1">Target Completion Date</label>
                        <input type="date" id="dueDate" class="w-full bg-gray-50 border-b-2 border-gray-200 py-4 px-2 text-sm font-bold outline-none focus:border-moss-green transition-all">
                    </div>

                    <div class="pt-6 grid grid-cols-2 gap-3">
                        <button onclick="commitOrder()" class="bg-soft-black text-white text-[11px] font-black py-5 rounded-2xl hover:bg-moss-green transition-all uppercase tracking-widest shadow-xl">Confirm Order</button>
                        <button onclick="closeOrderModal()" class="py-5 text-[10px] font-bold uppercase text-gray-400 hover:text-red-600 transition-all tracking-widest">Cancel</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="viewModal" class="hidden fixed inset-0 bg-soft-black/30 z-[70] p-4 backdrop-blur-sm">
        <div class="bg-white w-full max-w-lg rounded-3xl overflow-hidden shadow-2xl p-10 text-white border-b-[14px] border-moss-green">
            <p class="text-[10px] font-bold text-moss-light uppercase tracking-[0.3em] mb-2">Transaction Receipt</p>
            <h2 id="viewCust" class="text-3xl text-black italic uppercase tracking-tighter mb-8 leading-none">Customer</h2>
            
            <div class="space-y-4 border-t border-white/10 pt-6">
                <div class="flex justify-between items-center">
                    <span class="text-[10px] font-bold text-black uppercase tracking-widest">Product Details</span>
                    <span id="viewProd" class="text-sm text-black font-bold text-moss-light">--</span>
                </div>
                <div class="flex justify-between items-center">
                    <span class="text-[10px] font-bold text-black uppercase tracking-widest">Ordered Amount</span>
                    <span id="viewQty" class="text-sm text-black font-bold">--</span>
                </div>
                <div class="flex justify-between items-center">
                    <span class="text-[10px] font-bold text-black uppercase tracking-widest">Fulfillment Date</span>
                    <span id="viewDate" class="text-sm text-black font-bold">--</span>
                </div>
            </div>

            <button onclick="closeViewModal()" class="mt-10 w-full bg-white/10 py-4 rounded-xl text-[10px] text-black uppercase tracking-widest hover:bg-black/20 transition-all">Close Summary</button>
        </div>
    </div>

    <script src="../components/ragsak_navigation.js"></script>

    <script>
        const ORDER_KEY = 'ragsak_orders_data';
        const PRODUCT_KEY = 'ragsak_products_inv'; // FIXED KEY
        
        injectNavigation('nav-orders');

        let orders = JSON.parse(localStorage.getItem(ORDER_KEY)) || [];

        function loadProducts() {
            const rawData = localStorage.getItem(PRODUCT_KEY);
            const products = JSON.parse(rawData) || [];
            const select = document.getElementById('prodSelect');
            
            if (products.length === 0) {
                select.innerHTML = '<option value="">No products available in inventory</option>';
                return;
            }

            // Populates with Name, Process, and current stock for clarity
            select.innerHTML = products.map(p => `
                <option value="${p.id}">
                    ${p.name} [${p.process}] — ${p.qty} ${p.unit} in stock
                </option>
            `).join('');
        }

        function renderOrders() {
            const body = document.getElementById('orderTableBody');
            body.innerHTML = orders.map(order => `
                <tr class="hover:bg-white/5 transition-colors group">
                    <td class="px-2 py-4 text-xs font-bold text-white uppercase tracking-tight">${order.customer}</td>
                    <td class="py-4">
                        <span class="text-xs font-bold text-white">${order.productName}</span>
                        <span class="text-[9px] font-bold text-moss-light uppercase ml-2">[${order.process}]</span>
                    </td>
                    <td class="py-4 text-center text-xs font-black text-white">${order.qty}</td>
                    <td class="py-4 text-center text-[10px] font-bold text-white/40 uppercase tracking-widest">${order.date}</td>
                    <td class="py-4 text-right pr-2">
                        <button onclick="viewOrder('${order.id}')" class="text-white/20 hover:text-white transition-colors text-[10px] font-bold uppercase tracking-widest">View</button>
                    </td>
                </tr>
            `).join('');
        }

        function commitOrder() {
            const customer = document.getElementById('custName').value.trim();
            const prodId = document.getElementById('prodSelect').value;
            const qtyRequested = parseFloat(document.getElementById('orderQty').value);
            const date = document.getElementById('dueDate').value;

            if (!customer || !prodId || !qtyRequested || !date) {
                showToast("Fill all details", "border-red-600");
                return;
            }

            let products = JSON.parse(localStorage.getItem(PRODUCT_KEY)) || [];
            const pIndex = products.findIndex(p => p.id == prodId);

            if (pIndex === -1) {
                showToast("Product not found", "border-red-600");
                return;
            }

            if (products[pIndex].qty < qtyRequested) {
                showToast(`Low stock: ${products[pIndex].qty} available`, "border-red-600");
                return;
            }

            // SUBTRACT FROM PRODUCTS INVENTORY
            products[pIndex].qty -= qtyRequested;
            localStorage.setItem(PRODUCT_KEY, JSON.stringify(products));

            // CREATE ORDER RECORD
            const newOrder = {
                id: Date.now(),
                customer,
                productId: prodId,
                productName: products[pIndex].name,
                process: products[pIndex].process,
                qty: qtyRequested,
                date
            };

            orders.unshift(newOrder);
            localStorage.setItem(ORDER_KEY, JSON.stringify(orders));

            showToast("Order Logged & Stock Deducted", "border-moss-green");
            renderOrders();
            closeOrderModal();
        }

        function viewOrder(id) {
            const order = orders.find(o => o.id == id);
            if (!order) return;
            
            document.getElementById('viewCust').innerText = order.customer;
            document.getElementById('viewProd').innerText = `${order.productName} (${order.process})`;
            document.getElementById('viewQty').innerText = order.qty;
            document.getElementById('viewDate').innerText = order.date;
            
            document.getElementById('viewModal').classList.remove('hidden');
        }

        function showToast(msg, borderClass) {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = `toast-card show ${borderClass}`;
            toast.innerHTML = `<p class="text-[10px] font-black uppercase tracking-widest text-white">${msg}</p>`;
            container.appendChild(toast);
            setTimeout(() => { toast.classList.remove('show'); setTimeout(() => toast.remove(), 500); }, 3000);
        }

        function openOrderModal() { loadProducts(); document.getElementById('orderModal').classList.remove('hidden'); }
        function closeOrderModal() { document.getElementById('orderModal').classList.add('hidden'); }
        function closeViewModal() { document.getElementById('viewModal').classList.add('hidden'); }

        renderOrders();
    </script>
</body>
</html>
