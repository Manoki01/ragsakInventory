<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Order Management | Ragsak</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">

    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <style type="text/tailwindcss">
        @theme {
            --color-soft-black: #4A5D23;
            --color-moss-light: #8DA067;
            --color-soft-black: #121212;
            --color-off-white: #F4F5F2;
            --font-montserrat: "Montserrat", sans-serif;
        }

        @layer base {
            body {
                font-family: var(--font-montserrat);
                @apply bg-off-white text-soft-black antialiased;
            }
        }

        table th,
        table td {
            text-align: center !important;
            vertical-align: middle;
        }

        #orderModal:not(.hidden), #viewModal:not(.hidden) { @apply !flex items-center justify-center; }

        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-track { @apply bg-soft-black; }
        .custom-scrollbar::-webkit-scrollbar-thumb { @apply bg-soft-black rounded; }

        .table-scrollbar {
            scrollbar-width: thin;
            scrollbar-color: #121212 #F4F5F2;
        }

        .table-scrollbar::-webkit-scrollbar { width: 8px; height: 8px; }
        .table-scrollbar::-webkit-scrollbar-track { @apply bg-off-white rounded-full; }
        .table-scrollbar::-webkit-scrollbar-thumb { @apply bg-soft-black rounded-full; }
        .table-scrollbar::-webkit-scrollbar-thumb:hover { @apply bg-soft-black/80; }

        .view-scrollbar {
            scrollbar-width: thin;
            scrollbar-color: #121212 transparent;
        }

        .view-scrollbar::-webkit-scrollbar { width: 10px; }
        .view-scrollbar::-webkit-scrollbar-track {
            background: transparent;
            margin-block: 72px;
        }
        .view-scrollbar::-webkit-scrollbar-thumb {
            background-color: #121212;
            background-clip: content-box;
            border: 3px solid transparent;
            border-radius: 999px;
        }
        .view-scrollbar::-webkit-scrollbar-thumb:hover {
            background-color: rgba(18, 18, 18, 0.82);
        }

        #toast-container {
            @apply fixed top-6 left-1/2 -translate-x-1/2 z-[100] flex flex-col items-center gap-3 pointer-events-none px-4;
        }
        .toast-card {
            @apply bg-soft-black text-white px-6 py-4 rounded-2xl shadow-2xl border-l-4 flex items-center gap-4 transition-all duration-500 opacity-0 translate-y-[-20px] pointer-events-auto max-w-full;
        }
        .toast-card.show { @apply opacity-100 translate-y-0; }

        .status-pill { @apply inline-block w-28 text-center py-1 rounded text-[9px] font-bold uppercase tracking-tighter; }
        .status-green { @apply bg-soft-black text-white; }
        .status-yellow { @apply border border-soft-black/50 text-yellow-500; }
        .status-red { @apply border border-red-900/50 text-red-500; }

        input:disabled { @apply bg-gray-100 cursor-not-allowed opacity-80; }
    </style>
</head>
<body>
    <div id="toast-container"></div>
    <div id="sidebar-container"></div>

    <main class="min-h-screen lg:pl-64">
        <div class="flex min-h-screen flex-col px-4 pt-6 pb-6 sm:px-6 lg:px-8 lg:pt-10 overflow-hidden">
            <header class="mb-8 flex flex-col gap-5 md:mb-10 md:flex-row md:items-start md:justify-between">
                <div>
                    <h1 class="text-2xl sm:text-3xl font-black italic uppercase tracking-tighter leading-none text-soft-black">
                        Order Fulfillment
                    </h1>
                    <p class="text-[10px] font-bold text-soft-black uppercase mt-2 tracking-[0.2em]">
                        Customer Pipeline • Ragsak Farm
                    </p>
                </div>

                <div class="relative w-full md:w-auto">
                    <input
                        type="text"
                        id="orderSearch"
                        placeholder="Search orders..."
                        class="h-11 w-full md:w-72 rounded-xl border border-gray-200 bg-white px-4 text-xs text-soft-black outline-none transition-all shadow-sm focus:border-soft-black focus:ring-2 focus:ring-soft-black/10 placeholder:text-gray-400"
                    >
                </div>
            </header>

            <div class="flex-1 overflow-hidden bg-white rounded-3xl p-4 sm:p-6 shadow-sm border border-gray-100 flex flex-col min-h-[420px]">
                <div class="flex flex-col gap-3 sm:flex-row sm:items-center sm:justify-between mb-6 px-2">
                    <p class="text-[10px] font-bold uppercase tracking-[0.3em] text-gray-500">
                        Active Sales Orders
                    </p>
                    <button type="button" onclick="openOrderModal()" class="bg-soft-black hover:bg-soft-black/50 text-white text-[9px] font-black px-4 py-3 rounded-lg uppercase tracking-widest transition-all shadow-md">
                        Create New Order
                    </button>
                </div>

                <div class="flex-1 min-h-0 overflow-x-auto overflow-y-auto custom-scrollbar table-scrollbar pr-2">
                    <table class="w-full text-left min-w-[1120px] table-fixed">
                        <thead class="sticky top-0 bg-white z-10">
                            <tr class="border-b border-gray-200">
                                <th class="pb-6 pt-2 px-2 w-[90px] text-[10px] font-bold uppercase tracking-widest text-gray-600">Order ID</th>
                                <th class="pb-6 pt-2 px-2 w-[150px] text-[10px] font-bold uppercase tracking-widest text-gray-600">Customer</th>
                                <th class="pb-6 px-2 w-[170px] text-[10px] font-bold uppercase tracking-widest text-gray-600">Address</th>
                                <th class="pb-6 px-2 w-[145px] text-[10px] font-bold uppercase tracking-widest text-gray-600">Contact</th>
                                <th class="pb-6 px-2 w-[165px] text-[10px] font-bold uppercase tracking-widest text-gray-600">Product</th>
                                <th class="pb-6 px-2 w-[95px] text-center text-[10px] font-bold uppercase text-gray-600">Qty</th>
                                <th class="pb-6 px-2 w-[125px] text-center text-[10px] font-bold uppercase text-gray-600">Status</th>
                                <th class="pb-6 px-2 w-[130px] text-center text-[10px] font-bold uppercase text-gray-600">Due Date</th>
                                <th class="pb-6 px-2 w-[110px] text-right text-[10px] font-bold uppercase text-gray-600">Control</th>
                            </tr>
                        </thead>
                        <tbody id="orderTableBody" class="divide-y divide-gray-200"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>

    <div id="orderModal" class="hidden fixed inset-0 bg-soft-black/30 z-[60] p-3 sm:p-4 backdrop-blur-sm">
        <div class="bg-white w-full max-w-4xl rounded-3xl overflow-hidden shadow-2xl border-t-[14px] border-soft-black">
            <div class="p-8 md:p-10 max-h-[90vh] overflow-y-auto view-scrollbar">
                <div class="mb-8 flex items-start justify-between gap-4 border-b border-gray-100 pb-4">
                    <h2 id="modalTitle" class="text-2xl font-black italic uppercase tracking-tighter text-soft-black">
                        New Sales Order
                    </h2>
                    <button type="button" onclick="closeOrderModal()" class="rounded-lg border border-gray-200 px-4 py-2 text-[10px] font-black uppercase tracking-widest text-soft-black hover:bg-gray-50">Exit</button>
                </div>

                <div class="space-y-6">
                    <input type="hidden" id="editOrderId">

                    <div id="orderViewSummary" class="hidden">
                        <div class="grid grid-cols-1 gap-4 py-6 md:grid-cols-3">
                            <div class="rounded-2xl bg-gray-50 p-5">
                                <p class="text-[9px] font-black uppercase tracking-widest text-gray-400">Product</p>
                                <p id="viewOrderProduct" class="mt-2 text-sm font-black uppercase text-soft-black">-</p>
                            </div>
                            <div class="rounded-2xl bg-gray-50 p-5">
                                <p class="text-[9px] font-black uppercase tracking-widest text-gray-400">Quantity</p>
                                <p id="viewOrderQuantity" class="mt-2 text-sm font-black uppercase text-soft-black">-</p>
                            </div>
                            <div class="rounded-2xl bg-gray-50 p-5">
                                <p class="text-[9px] font-black uppercase tracking-widest text-gray-400">Status</p>
                                <p id="viewOrderStatus" class="mt-2 text-sm font-black uppercase text-soft-black">-</p>
                            </div>
                        </div>

                        <div>
                            <p class="mb-4 text-[10px] font-black uppercase tracking-[0.25em] text-gray-400">Order Details</p>
                            <div class="space-y-3">
                                <div class="grid grid-cols-12 items-center gap-3 rounded-2xl border border-gray-100 bg-white p-4 shadow-sm">
                                    <div class="col-span-12 md:col-span-3">
                                        <p class="text-[9px] font-black uppercase tracking-widest text-gray-400">Customer</p>
                                    </div>
                                    <div class="col-span-12 md:col-span-9 text-xs font-black uppercase tracking-tight text-soft-black" id="viewOrderCustomer">-</div>
                                </div>
                                <div class="grid grid-cols-12 items-center gap-3 rounded-2xl border border-gray-100 bg-white p-4 shadow-sm">
                                    <div class="col-span-12 md:col-span-3">
                                        <p class="text-[9px] font-black uppercase tracking-widest text-gray-400">Contact</p>
                                    </div>
                                    <div class="col-span-12 md:col-span-9 text-xs font-mono font-bold text-soft-black/70" id="viewOrderContact">-</div>
                                </div>
                                <div class="grid grid-cols-12 items-center gap-3 rounded-2xl border border-gray-100 bg-white p-4 shadow-sm">
                                    <div class="col-span-12 md:col-span-3">
                                        <p class="text-[9px] font-black uppercase tracking-widest text-gray-400">Due Date</p>
                                    </div>
                                    <div class="col-span-12 md:col-span-9 text-xs font-mono font-bold text-soft-black/70" id="viewOrderDueDate">-</div>
                                </div>
                                <div class="grid grid-cols-12 items-start gap-3 rounded-2xl border border-gray-100 bg-white p-4 shadow-sm">
                                    <div class="col-span-12 md:col-span-3">
                                        <p class="text-[9px] font-black uppercase tracking-widest text-gray-400">Address</p>
                                    </div>
                                    <div class="col-span-12 md:col-span-9 text-xs font-bold leading-relaxed text-soft-black/70" id="viewOrderAddress">-</div>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div id="orderInfoFields" class="space-y-6">
                    <div>
                        <label class="text-[10px] font-bold text-gray-400 uppercase tracking-widest ml-1">Customer Name</label>
                        <input type="text" id="custName" class="w-full bg-gray-50 border-b-2 border-gray-200 py-4 px-2 text-sm font-bold outline-none focus:border-soft-black transition-all" placeholder="Enter name...">
                    </div>

                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div>
                            <label class="text-[10px] font-bold text-gray-400 uppercase tracking-widest ml-1">Contact Number</label>
                            <input type="text" id="custContact" inputmode="numeric" maxlength="11" pattern="09[0-9]{9}" class="w-full bg-gray-50 border-b-2 border-gray-200 py-4 px-2 text-sm font-bold outline-none focus:border-soft-black transition-all" placeholder="09XXXXXXXXX">
                        </div>
                    </div>

                    <div>
                        <label class="text-[10px] font-bold text-gray-400 uppercase tracking-widest ml-1">Customer Address</label>
                        <textarea id="custAddress" rows="3" class="w-full resize-none bg-gray-50 border-b-2 border-gray-200 py-4 px-2 text-sm font-bold outline-none focus:border-soft-black transition-all" placeholder="Enter delivery address..."></textarea>
                    </div>

                    <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                        <div>
                            <label class="text-[10px] font-bold text-gray-400 uppercase tracking-widest ml-1">Select Product</label>
                            <select id="prodSelect" onchange="updateAvailableStock()" class="w-full bg-gray-50 border-b-2 border-gray-200 py-4 px-2 text-sm font-bold outline-none focus:border-soft-black transition-all appearance-none"></select>
                        </div>

                        <div>
                            <label class="text-[10px] font-bold text-gray-400 uppercase tracking-widest ml-1">Current Stock</label>
                            <div class="relative">
                                <input type="text" id="availableQty" disabled class="w-full border-b-2 border-gray-200 py-4 px-2 text-sm font-black text-soft-black outline-none" value="0">
                                <span id="unitLabel" class="absolute right-2 top-1/2 -translate-y-1/2 text-[9px] font-bold text-gray-400 uppercase">Unit</span>
                            </div>
                        </div>

                        <div>
                            <label class="text-[10px] font-bold text-gray-400 uppercase tracking-widest ml-1">Order Amount</label>
                            <input type="number" id="orderQty" class="w-full bg-gray-50 border-b-2 border-gray-200 py-4 px-2 text-sm font-bold outline-none focus:border-soft-black transition-all" placeholder="0">
                        </div>
                    </div>

                    <div>
                        <label class="text-[10px] font-bold text-gray-400 uppercase tracking-widest ml-1">Target Completion Date</label>
                        <input type="date" id="dueDate" class="w-full bg-gray-50 border-b-2 border-gray-200 py-4 px-2 text-sm font-bold outline-none focus:border-soft-black transition-all">
                    </div>
                    </div>

                    <div id="orderStatusField">
                        <label class="text-[10px] font-bold text-gray-400 uppercase tracking-widest ml-1">Order Status</label>
                        <select id="orderStatus" class="w-full bg-gray-50 border-b-2 border-gray-200 py-4 px-2 text-sm font-bold outline-none focus:border-soft-black transition-all appearance-none">
                            <option value="pending">Pending</option>
                            <option value="completed">Completed</option>
                            <option value="late">Late</option>
                            <option value="canceled">Canceled</option>
                        </select>
                    </div>

                    <div id="createOrderActions" class="pt-6 grid grid-cols-1 md:grid-cols-2 gap-3">
                        <button type="button" id="saveOrderButton" onclick="commitOrder()" class="bg-soft-black text-white text-[11px] font-black py-5 rounded-2xl hover:bg-soft-black/50 transition-all uppercase tracking-widest shadow-xl">
                            Confirm Entry
                        </button>
                        <button type="button" onclick="closeOrderModal()" class="py-5 text-[10px] font-bold uppercase text-gray-400 hover:text-red-600 transition-all tracking-widest">
                            Abort
                        </button>
                    </div>

                    <div id="viewOrderActions" class="hidden mt-8 grid grid-cols-1 gap-3 md:grid-cols-4">
                        <button type="button" id="editOrderInfoButton" onclick="startEditOrderInfo()" class="rounded-2xl bg-soft-black px-4 py-4 text-[10px] font-black uppercase tracking-widest text-white hover:bg-soft-black/85 disabled:cursor-not-allowed disabled:opacity-40">
                            Edit Information
                        </button>
                        <button type="button" id="completeOrderButton" onclick="completeViewedOrder()" class="rounded-2xl border border-soft-black/20 bg-soft-black/5 px-4 py-4 text-[10px] font-black uppercase tracking-widest text-soft-black hover:bg-soft-black hover:text-white disabled:cursor-not-allowed disabled:opacity-40">
                            Complete Order
                        </button>
                        <button type="button" id="cancelOrderButton" onclick="cancelViewedOrder()" class="rounded-2xl border border-red-200 bg-red-50 px-4 py-4 text-[10px] font-black uppercase tracking-widest text-red-600 hover:bg-red-100 disabled:cursor-not-allowed disabled:opacity-40">
                            Cancel Order
                        </button>
                        <button type="button" onclick="archiveViewedOrder()" class="rounded-2xl border border-red-200 bg-red-50 px-4 py-4 text-[10px] font-black uppercase tracking-widest text-red-600 hover:bg-red-100">
                            Archive
                        </button>
                    </div>

                    <div id="editInfoActions" class="hidden pt-6 grid grid-cols-1 md:grid-cols-2 gap-3">
                        <button type="button" id="saveInfoButton" onclick="saveOrderInfo()" class="bg-soft-black text-white text-[11px] font-black py-5 rounded-2xl hover:bg-soft-black/50 transition-all uppercase tracking-widest shadow-xl">
                            Save Information
                        </button>
                        <button type="button" onclick="cancelOrderEdit()" class="py-5 text-[10px] font-bold uppercase text-gray-400 hover:text-red-600 transition-all tracking-widest">
                            Cancel
                        </button>
                    </div>

                </div>
            </div>
        </div>
    </div>

    <script>
        window.currentPageId = 'nav-orders';
    </script>
    <script type="module" src="../components/ragsak_navigation.js"></script>
    <script type="module">
        import { getOrders, getOrderFinishedProducts, createOrder, updateOrderInfo, updateOrderStatus, archiveOrder } from '../assets/js/api.js';

        let orders = [];
        let finishedProducts = [];
        let viewedOrder = null;
        let orderModalMode = 'create';

        function escapeHtml(value) {
            return String(value ?? '').replace(/[&<>"']/g, char => ({
                '&': '&amp;',
                '<': '&lt;',
                '>': '&gt;',
                '"': '&quot;',
                "'": '&#039;'
            }[char]));
        }

        function showToast(msg, type) {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = `toast-card show ${type === 'success' ? 'border-soft-black' : 'border-red-600'}`;
            toast.innerHTML = `<p class="text-[10px] font-black uppercase tracking-widest">${escapeHtml(msg)}</p>`;
            container.appendChild(toast);
            setTimeout(() => {
                toast.classList.remove('show');
                setTimeout(() => toast.remove(), 500);
            }, 3000);
        }

        function getSelectedFinishedProduct() {
            const value = document.getElementById('prodSelect').value;
            const productID = Number(value);
            return finishedProducts.find(product =>
                Number(product.productID) === productID
            );
        }

        function loadProductOptions(selectedValue = '') {
            const select = document.getElementById('prodSelect');
            select.innerHTML = '<option value="" disabled selected>Choose Finished Product...</option>' +
                finishedProducts.map(product => {
                    const value = Number(product.productID);
                    return `<option value="${value}">${escapeHtml(product.productName)} [${escapeHtml(product.unitType)}]</option>`;
                }).join('');

            if (selectedValue) {
                select.value = selectedValue;
            }

            updateAvailableStock();
        }

        function updateAvailableStock() {
            const selectedItem = getSelectedFinishedProduct();

            if (selectedItem) {
                document.getElementById('availableQty').value = selectedItem.quantity;
                document.getElementById('unitLabel').innerText = selectedItem.unitType || 'QTY';
                return;
            }

            document.getElementById('availableQty').value = '0';
            document.getElementById('unitLabel').innerText = 'Unit';
        }

        function setOrderFieldsDisabled(disabled, allowStatus = false) {
            document.getElementById('custName').disabled = disabled;
            document.getElementById('custContact').disabled = disabled;
            document.getElementById('custAddress').disabled = disabled;
            document.getElementById('prodSelect').disabled = disabled;
            document.getElementById('orderQty').disabled = disabled;
            document.getElementById('dueDate').disabled = disabled;
            document.getElementById('orderStatus').disabled = disabled && !allowStatus;
        }

        function showOrderActions(mode) {
            orderModalMode = mode;
            document.getElementById('orderViewSummary').classList.toggle('hidden', mode === 'create');
            document.getElementById('orderInfoFields').classList.toggle('hidden', mode === 'view');
            document.getElementById('orderStatusField').classList.add('hidden');
            document.getElementById('createOrderActions').classList.toggle('hidden', mode !== 'create');
            document.getElementById('viewOrderActions').classList.toggle('hidden', mode !== 'view');
            document.getElementById('editInfoActions').classList.toggle('hidden', mode !== 'editInfo');

            if (mode === 'view') {
                const isFinal = viewedOrder && ['completed', 'canceled', 'late'].includes(String(viewedOrder.orderStatus || '').toLowerCase());
                document.getElementById('editOrderInfoButton').disabled = Boolean(isFinal);
                document.getElementById('completeOrderButton').disabled = Boolean(isFinal);
                document.getElementById('cancelOrderButton').disabled = Boolean(isFinal);
            }
        }

        function setOrderStatusActionLoading(isLoading, activeAction = '') {
            const isFinal = viewedOrder && ['completed', 'canceled', 'late'].includes(String(viewedOrder.orderStatus || '').toLowerCase());
            const editButton = document.getElementById('editOrderInfoButton');
            const completeButton = document.getElementById('completeOrderButton');
            const cancelButton = document.getElementById('cancelOrderButton');

            editButton.disabled = isLoading || Boolean(isFinal);
            completeButton.disabled = isLoading || Boolean(isFinal);
            cancelButton.disabled = isLoading || Boolean(isFinal);
            completeButton.textContent = isLoading && activeAction === 'complete' ? 'Completing...' : 'Complete Order';
            cancelButton.textContent = isLoading && activeAction === 'cancel' ? 'Canceling...' : 'Cancel Order';
        }

        function fillOrderSummary(order) {
            document.getElementById('viewOrderProduct').textContent = order?.productName || '-';
            document.getElementById('viewOrderQuantity').textContent = order ? `${order.quantity || 0} ${order.unitType || ''}` : '-';
            document.getElementById('viewOrderStatus').textContent = order?.orderStatus || '-';
            document.getElementById('viewOrderCustomer').textContent = order?.customerName || '-';
            document.getElementById('viewOrderContact').textContent = order?.contactNumber || '-';
            document.getElementById('viewOrderDueDate').textContent = order?.dateCompletion || '-';
            document.getElementById('viewOrderAddress').textContent = order?.customerAddress || '-';
        }

        function fillOrderForm(order) {
            document.getElementById('editOrderId').value = order?.orderID || '';
            document.getElementById('custName').value = order?.customerName || '';
            document.getElementById('custContact').value = order?.contactNumber || '';
            document.getElementById('custAddress').value = order?.customerAddress || '';
            document.getElementById('orderStatus').value = order?.orderStatus || 'pending';
            document.getElementById('orderQty').value = order?.quantity || '';
            document.getElementById('dueDate').value = order?.dateCompletion || '';
            loadProductOptions(order ? String(order.productID) : '');
            fillOrderSummary(order);
        }

        function getStatusClass(status) {
            if (status === 'completed') return 'status-green';
            if (status === 'canceled' || status === 'late') return 'status-red';
            return 'status-yellow';
        }

        function renderOrders() {
            const body = document.getElementById('orderTableBody');
            const search = document.getElementById('orderSearch').value.trim().toLowerCase();
            const visibleOrders = orders.filter(order => {
                const haystack = `${order.customerName} ${order.contactNumber} ${order.customerAddress} ${order.productName} ${order.orderStatus}`.toLowerCase();
                return haystack.includes(search);
            });

            if (visibleOrders.length === 0) {
                body.innerHTML = `
                    <tr>
                        <td colspan="9" class="py-16 text-center text-[10px] font-black uppercase tracking-[0.25em] text-gray-400">
                            No orders found
                        </td>
                    </tr>
                `;
                return;
            }

            body.innerHTML = visibleOrders.map(order => `
                <tr class="border-b border-gray-200 text-soft-black hover:bg-black/[0.02] transition-colors group">
                    <td class="py-4 px-2 text-xs text-soft-black/60 font-mono">${escapeHtml(order.orderID)}</td>
                    <td class="py-4 px-2 text-xs font-bold text-soft-black">
                        ${escapeHtml(order.customerName)}
                    </td>
                    <td class="py-4 px-2">
                        <p class="truncate text-xs font-bold text-soft-black/60">${escapeHtml(order.customerAddress)}</p>
                    </td>
                    <td class="py-4 px-2 text-xs text-soft-black/60 font-mono">${escapeHtml(order.contactNumber)}</td>
                    <td class="py-4 px-2">
                        <span class="text-xs font-bold text-soft-black">${escapeHtml(order.productName)}</span>
                    </td>
                    <td class="py-4 px-2 text-center text-xs text-soft-black/60 font-mono">${escapeHtml(order.quantity)}</td>
                    <td class="py-4 px-2 text-center">
                        <span class="status-pill ${getStatusClass(order.orderStatus)}">
                            ${escapeHtml(order.orderStatus)}
                        </span>
                    </td>
                    <td class="py-4 px-2 text-center text-xs text-soft-black/60 font-mono">${escapeHtml(order.dateCompletion)}</td>
                    <td class="py-4 px-2 text-right">
                        <button type="button" onclick="viewOrder('${escapeHtml(order.orderID)}')" class="rounded-lg bg-soft-black px-3 py-2 text-[9px] font-black uppercase tracking-widest text-white hover:bg-soft-black/80">
                            View
                        </button>
                    </td>
                </tr>
            `).join('');
        }

        async function loadOrderData() {
            const [ordersResponse, productsResponse] = await Promise.all([
                getOrders(),
                getOrderFinishedProducts()
            ]);

            if (!ordersResponse || ordersResponse.status !== 'success') {
                showToast(ordersResponse?.message || 'Failed to load orders', 'error');
                return;
            }

            if (!productsResponse || productsResponse.status !== 'success') {
                showToast(productsResponse?.message || 'Failed to load finished products', 'error');
                return;
            }

            orders = ordersResponse.data || [];
            finishedProducts = productsResponse.data || [];
            loadProductOptions();
            renderOrders();
        }

        function viewOrder(id) {
            const order = orders.find(o => Number(o.orderID) === Number(id));
            if (!order) return;

            viewedOrder = order;
            document.getElementById('modalTitle').innerText = "View Sales Order";
            fillOrderForm(order);
            setOrderFieldsDisabled(true);
            showOrderActions('view');
            document.getElementById('orderModal').classList.remove('hidden');
        }

        function startEditOrderInfo() {
            if (!viewedOrder) return;

            document.getElementById('modalTitle').innerText = "Edit Order Information";
            setOrderFieldsDisabled(false);
            document.getElementById('orderStatus').disabled = true;
            showOrderActions('editInfo');
        }

        function cancelOrderEdit() {
            if (!viewedOrder) return;

            document.getElementById('modalTitle').innerText = "View Sales Order";
            fillOrderForm(viewedOrder);
            setOrderFieldsDisabled(true);
            showOrderActions('view');
        }

        function buildOrderInfoPayload() {
            const selectedItem = getSelectedFinishedProduct();
            const quantity = Number(document.getElementById('orderQty').value);

            return {
                customerName: document.getElementById('custName').value.trim(),
                contactNumber: document.getElementById('custContact').value.trim(),
                customerAddress: document.getElementById('custAddress').value.trim(),
                productID: selectedItem ? Number(selectedItem.productID) : null,
                quantity,
                dateCompletion: document.getElementById('dueDate').value
            };
        }

        function validateOrderInfoPayload(payload) {
            const selectedItem = getSelectedFinishedProduct();

            if (!payload.customerName || !payload.contactNumber || !payload.customerAddress || !payload.productID || !payload.quantity || !payload.dateCompletion) {
                showToast("Missing Fields", "error");
                return false;
            }

            if (!/^09\d{9}$/.test(payload.contactNumber)) {
                showToast("Contact number must be 11 digits and start with 09", "error");
                return false;
            }

            if (payload.quantity <= 0 || !Number.isInteger(payload.quantity)) {
                showToast("Quantity must be a positive whole number", "error");
                return false;
            }

            if (selectedItem && Number(selectedItem.quantity) < payload.quantity) {
                showToast("Order quantity is greater than finished product stock", "error");
                return false;
            }

            return true;
        }

        async function commitOrder() {
            const payload = buildOrderInfoPayload();
            payload.orderStatus = 'pending';

            if (!validateOrderInfoPayload(payload)) return;

            const saveButton = document.getElementById('saveOrderButton');
            saveButton.disabled = true;
            saveButton.textContent = 'Saving Order...';

            try {
                const response = await createOrder(payload);

                if (!response || response.status !== 'success') {
                    showToast(response?.message || 'Order save failed', 'error');
                    return;
                }

                showToast(response.message || 'Order saved', 'success');
                closeOrderModal();
                await loadOrderData();
            } catch (error) {
                showToast("Failed to connect to orders", "error");
            } finally {
                saveButton.disabled = false;
                saveButton.textContent = 'Confirm Entry';
            }
        }

        async function saveOrderInfo() {
            if (!viewedOrder) return;

            const payload = buildOrderInfoPayload();
            payload.orderID = Number(viewedOrder.orderID);

            if (!validateOrderInfoPayload(payload)) return;

            const saveButton = document.getElementById('saveInfoButton');
            saveButton.disabled = true;
            saveButton.textContent = 'Saving...';

            try {
                const response = await updateOrderInfo(payload);

                if (!response || response.status !== 'success') {
                    showToast(response?.message || 'Order information update failed', 'error');
                    return;
                }

                showToast(response.message || 'Order information updated', 'success');
                await loadOrderData();
                viewedOrder = orders.find(order => Number(order.orderID) === Number(payload.orderID)) || viewedOrder;
                cancelOrderEdit();
            } catch (error) {
                showToast("Failed to update order information", "error");
            } finally {
                saveButton.disabled = false;
                saveButton.textContent = 'Save Information';
            }
        }

        async function changeViewedOrderStatus(action) {
            if (!viewedOrder) return;

            const payload = {
                orderID: Number(viewedOrder.orderID),
                action
            };
            const isComplete = action === 'complete';
            const confirmMessage = isComplete
                ? 'Complete this order? If the due date has passed, it will be marked as Completed late.'
                : 'Cancel this order?';

            if (!confirm(confirmMessage)) return;

            setOrderStatusActionLoading(true, action);

            try {
                const response = await updateOrderStatus(payload);

                if (!response || response.status !== 'success') {
                    showToast(response?.message || 'Order action failed', 'error');
                    return;
                }

                showToast(response.message || 'Order updated', 'success');
                await loadOrderData();
                viewedOrder = orders.find(order => Number(order.orderID) === Number(payload.orderID)) || viewedOrder;
                cancelOrderEdit();
            } catch (error) {
                showToast("Failed to update order", "error");
            } finally {
                setOrderStatusActionLoading(false);
            }
        }

        function completeViewedOrder() {
            changeViewedOrderStatus('complete');
        }

        function cancelViewedOrder() {
            changeViewedOrderStatus('cancel');
        }

        async function archiveViewedOrder() {
            if (!viewedOrder) return;
            if (!confirm('Archive this order?')) return;

            try {
                const response = await archiveOrder({ orderID: Number(viewedOrder.orderID) });

                if (!response || response.status !== 'success') {
                    showToast(response?.message || 'Order archive failed', 'error');
                    return;
                }

                showToast(response.message || 'Order archived', 'success');
                closeOrderModal();
                await loadOrderData();
            } catch (error) {
                showToast("Failed to archive order", "error");
            }
        }

        function openOrderModal() {
            viewedOrder = null;
            document.getElementById('modalTitle').innerText = "New Sales Order";
            fillOrderForm(null);
            document.getElementById('orderStatus').value = 'pending';
            setOrderFieldsDisabled(false);
            showOrderActions('create');
            document.getElementById('orderModal').classList.remove('hidden');
        }

        function closeOrderModal() {
            document.getElementById('orderModal').classList.add('hidden');
            viewedOrder = null;
        }

        document.getElementById('orderSearch').addEventListener('input', renderOrders);

        window.openOrderModal = openOrderModal;
        window.closeOrderModal = closeOrderModal;
        window.commitOrder = commitOrder;
        window.viewOrder = viewOrder;
        window.startEditOrderInfo = startEditOrderInfo;
        window.cancelOrderEdit = cancelOrderEdit;
        window.saveOrderInfo = saveOrderInfo;
        window.completeViewedOrder = completeViewedOrder;
        window.cancelViewedOrder = cancelViewedOrder;
        window.archiveViewedOrder = archiveViewedOrder;
        window.updateAvailableStock = updateAvailableStock;

        loadOrderData();
    </script>
</body>
</html>
