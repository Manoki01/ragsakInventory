<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Access Control | Ragsak</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">

    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <style type="text/tailwindcss">
        @theme {
            --color-soft-black: #4A5D23;
            --color-soft-black/50: #8DA067;
            --color-soft-black: #121212;
            --color-off-white: #F4F5F2;
            --font-montserrat: "Montserrat", sans-serif;
        }

        @layer base {
            body {
                font-family: var(--font-montserrat);
                @apply bg-off-white text-soft-black antialiased;
            }
        }

        .stat-card {
            @apply bg-white p-8 rounded-2xl shadow-sm border-b-4 transition-all;
        }

        .custom-scrollbar::-webkit-scrollbar {
            width: 4px;
            height: 4px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
            @apply bg-soft-black;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            @apply bg-soft-black rounded;
        }

        .text-pending { @apply text-soft-black; }
        .text-approved { @apply text-soft-black; }
        .text-denied { @apply text-soft-black; }
    </style>
</head>
<body>
    <div id="sidebar-container"></div>

    <main class="min-h-screen lg:pl-64">
        <div class="flex min-h-screen flex-col px-4 pt-6 pb-6 sm:px-6 lg:px-8 lg:pt-10 overflow-hidden">
            <header class="mb-8 md:mb-10">
                <div>
                    <h1 class="text-2xl sm:text-3xl font-black italic uppercase tracking-tighter leading-none text-soft-black">
                        Access Control
                    </h1>
                    <p class="text-[10px] font-bold text-soft-black uppercase mt-2 tracking-[0.2em]">
                        Presidential Authorization • Ragsak Farm
                    </p>
                </div>
            </header>

            <div class="grid grid-cols-1 gap-6 lg:grid-cols-3 mb-8 md:mb-10">
                <div class="bg-white p-8 rounded-2xl shadow-sm border-b-4 border-soft-black">
                    <p class="text-[10px] font-bold text-gray-400 uppercase mb-1 tracking-widest">Approved Users</p>
                    <p id="count-approved" class="mt-3 text-4xl font-black italic tracking-tighter text-soft-black">00</p>
                    <span class="text-[9px] font-bold uppercase text-soft-black italic">Active Accounts</span>
                </div>

                <div class="bg-white p-8 rounded-2xl shadow-sm border-b-4 border-soft-black">
                    <p class="text-[10px] font-bold text-gray-400 uppercase mb-1 tracking-widest">Pending Users</p>
                    <p id="count-pending" class="mt-3 text-4xl font-black italic tracking-tighter text-soft-black">00</p>
                    <span class="text-[9px] font-bold uppercase text-soft-black italic">For Approval</span>
                </div>

                <div class="bg-white p-8 rounded-2xl shadow-sm border-b-4 border-soft-black">
                    <p class="text-[10px] font-bold text-gray-400 uppercase mb-1 tracking-widest">Denied Users</p>
                    <p id="count-denied" class="mt-3 text-4xl font-black italic tracking-tighter text-soft-black">00</p>
                    <span class="text-[9px] font-bold uppercase text-soft-black italic">Rejected Accounts</span>
                </div>
            </div>

            <div class="flex-1 overflow-hidden bg-white rounded-3xl p-4 sm:p-6 shadow-sm border border-gray-100 flex flex-col min-h-[420px]">
                <div class="flex items-center justify-between mb-6 px-2">
                    <p class="text-[10px] font-bold uppercase tracking-[0.3em] text-gray-500">
                        Pending Credential Queue
                    </p>
                </div>

                <div class="flex-1 overflow-auto custom-scrollbar pr-2">
                    <table class="w-full text-left min-w-[800px] table-fixed">
                        <thead class="sticky top-0 z-10">
                            <tr class="border-b border-gray-200">
                                <th class="pb-6 pt-2 px-2 text-[10px] font-bold uppercase tracking-widest text-gray-600">Username</th>
                                <th class="pb-6 pt-2 text-[10px] font-bold uppercase tracking-widest text-gray-600">Role</th>
                                <th class="pb-6 pt-2 w-[160px] text-center text-[10px] font-bold uppercase text-gray-600">Status</th>
                                <th class="pb-6 pt-2 w-[220px] text-right text-[10px] font-bold uppercase text-gray-600 pr-2">Control</th>
                            </tr>
                        </thead>
                        <tbody id="approvalBody" class="divide-y divide-gray-200"></tbody>
                    </table>

                    <div id="empty-state" class="hidden py-20 text-center">
                        <p class="text-[10px] font-bold uppercase tracking-widest text-gray-300">All credentials verified</p>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script>
        window.currentPageId = 'nav-approval';
    </script>
    <script type="module" src="../components/ragsak_navigation.js"></script>
    <script type="module">
        import { loadApprovalDataset, setApprovalStatus } from '../assets/js/users.js';

        async function renderApprovalList() {
            const response = await loadApprovalDataset();

            if (!response || response.status !== 'success') {
                alert(response?.message || 'Failed to load pending registrations');
                return;
            }

            const users = response.data.pendingUsers || [];
            const summary = response.data.summary || {};
            const tbody = document.getElementById('approvalBody');
            const emptyState = document.getElementById('empty-state');

            document.getElementById('count-approved').innerText = String(summary.approved || 0).padStart(2, '0');
            document.getElementById('count-pending').innerText = String(summary.pending || 0).padStart(2, '0');
            document.getElementById('count-denied').innerText = String(summary.denied || 0).padStart(2, '0');

            tbody.innerHTML = '';

            if (users.length === 0) {
                emptyState.classList.remove('hidden');
            } else {
                emptyState.classList.add('hidden');

                users.forEach(user => {
                    tbody.innerHTML += `
                        <tr class="group hover:bg-gray-50/50 transition-colors">
                            <td class="py-6 px-2 text-sm font-bold text-soft-black uppercase tracking-tight italic">${escapeHtml(user.username)}</td>
                            <td class="py-6">
                                <span class="text-[10px] font-black uppercase text-white bg-soft-black border border-soft-black px-3 py-1 rounded-lg">
                                    ${escapeHtml(user.role || 'Personnel')}
                                </span>
                            </td>
                            <td class="py-6 text-center text-[10px] font-bold text-gray-400 uppercase tracking-widest">
                                Pending
                            </td>
                            <td class="py-6 text-right pr-2">
                                <div class="flex justify-end gap-2">
                                    <button data-user-id="${user.userID}" data-status="approved"
                                        class="bg-soft-black hover:bg-soft-black/50 text-white text-[9px] font-black px-4 py-2 rounded-lg uppercase tracking-widest transition-all shadow-md active:scale-95">
                                        Approve
                                    </button>
                                    <button data-user-id="${user.userID}" data-status="denied"
                                        class="bg-white hover:bg-red-50 border border-gray-200 text-gray-400 hover:text-red-600 hover:border-red-100 text-[9px] font-black px-4 py-2 rounded-lg uppercase tracking-widest transition-all">
                                        Deny
                                    </button>
                                </div>
                            </td>
                        </tr>
                    `;
                });
            }
        }

        function escapeHtml(value) {
            return String(value ?? '').replace(/[&<>"']/g, char => ({
                '&': '&amp;',
                '<': '&lt;',
                '>': '&gt;',
                '"': '&quot;',
                "'": '&#039;'
            }[char]));
        }

        document.getElementById('approvalBody').addEventListener('click', async event => {
            const button = event.target.closest('button[data-user-id]');
            if (!button) return;

            button.disabled = true;
            const response = await setApprovalStatus({
                userID: Number(button.dataset.userId),
                status: button.dataset.status
            });

            if (!response || response.status !== 'success') {
                alert(response?.message || 'Failed to update user');
                button.disabled = false;
                return;
            }

            await renderApprovalList();
        });

        renderApprovalList();
    </script>
</body>
</html>
