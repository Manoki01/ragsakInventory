<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Packaging Management | Ragsak</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">

    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <style type="text/tailwindcss">
        @theme {
            --color-soft-black: #4A5D23;
            --color-moss-light: #8DA067;
            --color-soft-black: #121212;
            --color-off-white: #F4F5F2;
            --font-montserrat: "Montserrat", sans-serif;
        }

        @layer base {
            body {
                font-family: var(--font-montserrat);
                @apply bg-off-white text-soft-black antialiased;
            }
        }

        table th,
        table td {
            text-align: center !important;
            vertical-align: middle;
        }

        .status-pill { @apply inline-block w-28 text-center py-1 rounded text-[9px] font-bold uppercase tracking-tighter; }
        .status-green { @apply bg-soft-black text-white; }
        .status-yellow { @apply border border-soft-black/50 text-yellow-500; }
        .status-red { @apply border border-red-900/50 text-red-500; }

        #packagingModal:not(.hidden) { @apply !flex items-center justify-center; }
        #packagingViewModal:not(.hidden) { @apply !flex items-center justify-center; }

        #toast-container {
            @apply fixed top-10 left-1/2 -translate-x-1/2 z-[100] flex flex-col items-center gap-3 pointer-events-none;
        }
        .toast-card {
            @apply bg-soft-black text-white px-8 py-4 rounded-2xl shadow-2xl border-l-4 flex items-center gap-4 transition-all duration-500 opacity-0 translate-y-[-20px] pointer-events-auto;
        }
        .toast-card.show { @apply opacity-100 translate-y-0; }
        .toast-success { @apply border-soft-black; }
        .toast-error { @apply border-red-600; }

        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-track { @apply bg-soft-black; }
        .custom-scrollbar::-webkit-scrollbar-thumb { @apply bg-soft-black rounded; }

        .table-scrollbar {
            scrollbar-width: thin;
            scrollbar-color: #121212 #F4F5F2;
        }

        .table-scrollbar::-webkit-scrollbar { width: 8px; height: 8px; }
        .table-scrollbar::-webkit-scrollbar-track { @apply bg-off-white rounded-full; }
        .table-scrollbar::-webkit-scrollbar-thumb { @apply bg-soft-black rounded-full; }
        .table-scrollbar::-webkit-scrollbar-thumb:hover { @apply bg-soft-black/80; }

        .view-scrollbar {
            scrollbar-width: thin;
            scrollbar-color: #121212 transparent;
        }

        .view-scrollbar::-webkit-scrollbar { width: 10px; }
        .view-scrollbar::-webkit-scrollbar-track {
            background: transparent;
            margin-block: 72px;
        }
        .view-scrollbar::-webkit-scrollbar-thumb {
            background-color: #121212;
            background-clip: content-box;
            border: 3px solid transparent;
            border-radius: 9999px;
            min-height: 48px;
        }
    </style>
</head>
<body>

    <div id="toast-container"></div>

    <div id="sidebar-container"></div>

    <main class="min-h-screen lg:pl-64">
        <div class="flex min-h-screen flex-col px-4 pt-4 pb-6 md:px-8 md:pt-8 lg:px-8 lg:pt-10">
            <header class="flex flex-col md:flex-row justify-between items-start mb-8 lg:mb-10 gap-6">
                <div>
                    <h1 class="text-3xl font-black italic uppercase tracking-tighter leading-none text-soft-black">Packaging Inventory</h1>
                    <p class="text-[10px] font-bold text-soft-black uppercase mt-2 tracking-[0.2em]">Supply Management • Ragsak Farm</p>
                </div>
                <div class="relative w-full md:w-auto">
                    <input type="text" id="inventorySearch" placeholder="Search supplies..."
                        class="h-11 w-full md:w-72 rounded-xl border border-gray-200 bg-white px-4 text-xs text-soft-black outline-none transition-all shadow-sm focus:border-soft-black focus:ring-2 focus:ring-soft-black/10 placeholder:text-gray-400">
                </div>
            </header>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-8 lg:mb-10">
                <div class="bg-white p-8 rounded-2xl shadow-sm border-b-4 border-soft-black">
                    <p class="text-[10px] font-bold text-gray-400 uppercase mb-1 tracking-widest">Packaging Asset Value</p>
                    <h2 id="grandTotal" class="text-4xl font-black italic tracking-tighter text-soft-black">₱0.00</h2>
                </div>
                <div class="bg-white p-8 rounded-2xl shadow-sm border-b-4 border-soft-black">
                    <p class="text-[10px] font-bold text-gray-400 uppercase mb-1 tracking-widest">Active Supply SKU</p>
                    <h2 id="skuCount" class="text-4xl font-black italic tracking-tighter text-soft-black">00</h2>
                </div>
            </div>

            <div class="overflow-hidden bg-white rounded-3xl p-4 md:p-6 shadow-2xl flex flex-col h-[560px]">
                <div class="flex items-center justify-between mb-6 px-2 gap-4">
                    <p class="text-[10px] font-bold uppercase tracking-[0.3em] text-gray-500">Packaging Supply Stockpile</p>
                    <button id="modalOpen" class="bg-soft-black hover:bg-soft-black/50 text-white text-[9px] font-black px-4 py-2 rounded-lg uppercase tracking-widest transition-all shrink-0">Add Supply Entry</button>
                </div>

                <div class="flex-1 min-h-0 overflow-x-auto overflow-y-auto custom-scrollbar table-scrollbar pr-2">
                    <table class="w-full text-left min-w-[800px] table-fixed">
                        <thead class="sticky top-0 bg-white z-10">
                            <tr class="border-b border-gray-200">
                                <th class="pb-6 pt-2 px-2 text-[10px] font-bold uppercase tracking-widest text-gray-600">Name</th>
                                <th class="pb-6 w-[120px] text-center text-[10px] font-bold uppercase text-gray-600">Stock</th>
                                <th class="pb-6 w-[160px] text-center text-[10px] font-bold uppercase text-gray-600">Status</th>
                                <th class="pb-6 w-[140px] text-right text-[10px] font-bold uppercase text-gray-600">Unit Price</th>
                                <th class="pb-6 w-[160px] text-right text-[10px] font-bold uppercase text-gray-600">Asset Value</th>
                                <th class="pb-6 w-[110px] text-right text-[10px] font-bold uppercase text-gray-600 pr-2">View</th>
                            </tr>
                        </thead>
                        <tbody id="inventoryBody" class="divide-y divide-gray-200"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>

    <div id="packagingModal" class="hidden fixed inset-0 bg-soft-black/30 z-[60] p-4 backdrop-blur-sm">
        <div class="bg-white w-full max-w-2xl rounded-3xl overflow-hidden shadow-2xl border-t-[14px] border-soft-black">
            <div class="p-10 max-h-[90vh] overflow-y-auto custom-scrollbar">
                <h2 id="modalTitle" class="text-2xl font-black italic uppercase tracking-tighter text-soft-black mb-8 border-b border-gray-100 pb-4">Authorize Supply Entry</h2>

                <div class="space-y-8">
                    <div class="grid grid-cols-12 gap-4 items-end">
                        <div class="col-span-12 md:col-span-6 group relative">
                            <label class="text-[10px] font-bold text-gray-400 uppercase tracking-widest ml-1">Supply Name</label>
                            <input type="text" id="packName" class="w-full bg-gray-50 border-b-2 border-gray-200 py-4 px-2 text-sm font-bold outline-none focus:border-soft-black transition-all" placeholder="Search or type name..." autocomplete="off">
                            <ul id="predictiveResults" class="absolute z-50 w-full bg-white shadow-2xl rounded-b-xl border border-gray-100 hidden max-h-40 overflow-y-auto custom-scrollbar top-full mt-1"></ul>
                        </div>

                        <div class="col-span-6 md:col-span-3 group">
                            <label class="text-[10px] font-bold text-gray-400 uppercase tracking-widest ml-1">Quantity</label>
                            <input type="number" id="packQty" class="w-full bg-gray-50 border-b-2 border-gray-200 py-4 px-2 text-sm font-bold outline-none focus:border-soft-black transition-all" placeholder="0">
                        </div>

                        <div class="col-span-6 md:col-span-3 group">
                            <label class="text-[10px] font-bold text-gray-400 uppercase tracking-widest ml-1">Unit</label>
                            <input type="text" id="packUnit" class="w-full bg-gray-50 border-b-2 border-gray-200 py-4 px-2 text-sm font-bold outline-none focus:border-soft-black transition-all" placeholder="pcs / rolls">
                        </div>
                    </div>

                    <div class="flex flex-col gap-3 pt-6">
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-3">
                            <button type="button" id="commitClose" class="bg-soft-black text-white text-[11px] font-black py-5 rounded-2xl hover:bg-soft-black transition-all uppercase tracking-widest shadow-xl">
                                Commit & Close
                            </button>
                            <button type="button" id="commitOpen" class="bg-soft-black/10 text-soft-black border border-soft-black/20 text-[11px] font-black py-5 rounded-2xl hover:bg-soft-black hover:text-white transition-all uppercase tracking-widest">
                                Commit & Add Another
                            </button>
                        </div>
                        <button type="button" id="modalClose" class="w-full py-4 text-[10px] font-bold uppercase text-gray-400 hover:text-red-600 transition-all tracking-widest">
                            Abort Entry
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="packagingViewModal" class="hidden fixed inset-0 bg-soft-black/30 z-[70] p-4 backdrop-blur-sm">
        <div class="bg-white w-full max-w-2xl rounded-3xl overflow-hidden shadow-2xl border-t-[14px] border-soft-black">
            <div class="p-8 md:p-10 max-h-[90vh] overflow-y-auto view-scrollbar">
                <div class="mb-8 flex items-start justify-between gap-4 border-b border-gray-100 pb-4">
                    <h2 id="viewPackagingName" class="text-2xl font-black italic uppercase tracking-tighter text-soft-black">Packaging</h2>
                    <button type="button" id="packagingViewExit" class="rounded-lg border border-gray-200 px-4 py-2 text-[10px] font-black uppercase tracking-widest text-soft-black hover:bg-gray-50">Exit</button>
                </div>
                <div class="grid grid-cols-1 gap-4 py-6 md:grid-cols-4">
                    <div class="rounded-2xl bg-gray-50 p-5"><p class="text-[9px] font-black uppercase tracking-widest text-gray-400">Unit Type</p><p id="viewPackagingUnit" class="mt-2 text-sm font-black uppercase text-soft-black">-</p></div>
                    <div class="rounded-2xl bg-gray-50 p-5"><p class="text-[9px] font-black uppercase tracking-widest text-gray-400">Unit Price</p><p id="viewPackagingPrice" class="mt-2 text-sm font-black uppercase text-soft-black">-</p></div>
                    <div class="rounded-2xl bg-gray-50 p-5"><p class="text-[9px] font-black uppercase tracking-widest text-gray-400">Type</p><p id="viewPackagingType" class="mt-2 text-sm font-black uppercase text-soft-black">-</p></div>
                    <div class="rounded-2xl bg-gray-50 p-5"><p class="text-[9px] font-black uppercase tracking-widest text-gray-400">Stock</p><p id="viewPackagingStock" class="mt-2 text-sm font-black uppercase text-soft-black">-</p></div>
                </div>
                <form id="packagingInfoForm" class="hidden space-y-5 border-t border-gray-100 py-6">
                    <div class="grid grid-cols-1 gap-4 md:grid-cols-4">
                        <div>
                            <label class="text-[10px] font-bold text-gray-400 uppercase tracking-widest ml-1">Packaging Name</label>
                            <input type="text" id="editPackagingName" class="w-full bg-gray-50 border-b-2 border-gray-200 py-4 px-2 text-sm font-bold outline-none focus:border-soft-black transition-all">
                        </div>
                        <div>
                            <label class="text-[10px] font-bold text-gray-400 uppercase tracking-widest ml-1">Unit Type</label>
                            <input type="text" id="editPackagingUnit" class="w-full bg-gray-50 border-b-2 border-gray-200 py-4 px-2 text-sm font-bold outline-none focus:border-soft-black transition-all">
                        </div>
                        <div>
                            <label class="text-[10px] font-bold text-gray-400 uppercase tracking-widest ml-1">Unit Price</label>
                            <input type="number" min="0" step="0.01" id="editPackagingPrice" class="w-full bg-gray-50 border-b-2 border-gray-200 py-4 px-2 text-sm font-bold outline-none focus:border-soft-black transition-all">
                        </div>
                        <div>
                            <label class="text-[10px] font-bold text-gray-400 uppercase tracking-widest ml-1">Type</label>
                            <select id="editPackagingType" class="w-full bg-gray-50 border-b-2 border-gray-200 py-4 px-2 text-sm font-bold outline-none focus:border-soft-black transition-all">
                                <option value="main">Main</option>
                                <option value="alternative">Alternative</option>
                            </select>
                        </div>
                    </div>
                    <div class="grid grid-cols-1 gap-3 md:grid-cols-2">
                        <button type="submit" id="savePackagingInfo" class="rounded-2xl bg-soft-black px-4 py-4 text-[10px] font-black uppercase tracking-widest text-white hover:bg-soft-black/85">Save Changes</button>
                        <button type="button" id="cancelPackagingInfo" class="rounded-2xl border border-gray-200 px-4 py-4 text-[10px] font-black uppercase tracking-widest text-gray-500 hover:text-soft-black">Cancel</button>
                    </div>
                </form>
                <form id="packagingStockForm" class="hidden space-y-5 border-t border-gray-100 py-6">
                    <div>
                        <label class="text-[10px] font-bold text-gray-400 uppercase tracking-widest ml-1">Current Stock</label>
                        <input type="number" min="0" step="1" id="editPackagingStock" class="w-full bg-gray-50 border-b-2 border-gray-200 py-4 px-2 text-sm font-bold outline-none focus:border-soft-black transition-all">
                    </div>
                    <div class="grid grid-cols-1 gap-3 md:grid-cols-2">
                        <button type="submit" id="savePackagingStock" class="rounded-2xl bg-soft-black px-4 py-4 text-[10px] font-black uppercase tracking-widest text-white hover:bg-soft-black/85">Save Stock</button>
                        <button type="button" id="cancelPackagingStock" class="rounded-2xl border border-gray-200 px-4 py-4 text-[10px] font-black uppercase tracking-widest text-gray-500 hover:text-soft-black">Cancel</button>
                    </div>
                </form>
                <div class="grid grid-cols-1 gap-3 md:grid-cols-3">
                    <button type="button" id="editPackagingInfoButton" class="rounded-2xl bg-soft-black px-4 py-4 text-[10px] font-black uppercase tracking-widest text-white hover:bg-soft-black/85">Edit Information</button>
                    <button type="button" id="editPackagingStockButton" class="rounded-2xl border border-soft-black/20 bg-soft-black/5 px-4 py-4 text-[10px] font-black uppercase tracking-widest text-soft-black hover:bg-soft-black hover:text-white">Edit Stock</button>
                    <button type="button" id="deletePackagingButton" class="rounded-2xl border border-red-200 bg-red-50 px-4 py-4 text-[10px] font-black uppercase tracking-widest text-red-600 hover:bg-red-100">Archive Packaging</button>
                </div>
            </div>
        </div>
    </div>

   <script>
        window.currentPageId = 'nav-packaging';
    </script>
    <script type="module" src="../components/ragsak_navigation.js"></script>
    <script type="module">
        import { loadPackaging } from "../assets/js/packaging.js";
        import { checkStockStatus } from '../assets/js/utils.js';
        import { stockinPackaging, editPackagingInfo, editPackagingStock, deletePackaging } from '../assets/js/packaging.js';
        import { showToast } from '../components/notification.js';

        const pacNameInput = document.getElementById('packName');
        const suggestionsUl = document.getElementById('predictiveResults');
        const openModal = document.getElementById('modalOpen');
        const closeModal = document.getElementById('modalClose');
        const closeCommit = document.getElementById('commitClose');
        const openCommit = document.getElementById('commitOpen');
        const packagingViewModal = document.getElementById('packagingViewModal');
        const packagingViewExit = document.getElementById('packagingViewExit');
        const packagingInfoForm = document.getElementById('packagingInfoForm');
        const editPackagingInfoButton = document.getElementById('editPackagingInfoButton');
        const cancelPackagingInfo = document.getElementById('cancelPackagingInfo');
        const packagingStockForm = document.getElementById('packagingStockForm');
        const editPackagingStockButton = document.getElementById('editPackagingStockButton');
        const cancelPackagingStock = document.getElementById('cancelPackagingStock');
        const deletePackagingButton = document.getElementById('deletePackagingButton');

        let selectedPackID;
        let viewedPackagingID;

        window.inventoryData = [];

        async function getPackaging() {
            try {
                const response = await loadPackaging();

                if (!response || response.status !== "success") {
                    console.error("Failed to load packaging:", response);
                    return;
                }

                window.inventoryData = response.data;

                renderPackaging();

            } catch (err) {
                console.error("Load packaging error:", err);
            }
        }

        function renderPackaging(data = window.inventoryData) {
            const tbody = document.getElementById("inventoryBody");
            tbody.innerHTML = "";

            let count = new Set(data.map(item => item.packagingName)).size;

            data = [...data].sort((a, b) =>
                (a.packagingName || "").localeCompare(b.packagingName || "")
            );

            let total = 0;

            data.forEach(item => {

                const status = checkStockStatus(item.quantity);
                const unitPrice = item.packagingPrice || 0;
                const value = item.quantity * unitPrice;

                total += value;

                const row = document.createElement("tr");
                row.className = "border-b border-gray-200 text-soft-black hover:bg-white/[0.02] transition-colors group";

                row.innerHTML = `
                    <td class="py-4 text-xs font-bold px-2 text-soft-black">
                        ${item.packagingName}
                    </td>

                    <td class="py-4 text-center text-xs text-soft-black/60 font-mono">
                        ${item.quantity} ${item.unitType}
                    </td>

                    <td class="py-4 text-center">
                        <span class="status-pill ${
                            status === "Out of Stock" ? "status-red" :
                            status === "Low Stock" ? "status-yellow" :
                            "status-green"
                        }">
                            ${status}
                        </span>
                    </td>

                    <td class="py-4 text-right text-xs text-soft-black/60 font-mono">
                        ₱${parseFloat(unitPrice).toLocaleString("en-PH", {
                            minimumFractionDigits: 2,
                            maximumFractionDigits: 2
                        })}
                    </td>

                    <td class="py-4 text-right text-xs font-bold text-soft-black">
                        ₱${value.toLocaleString("en-PH", {
                            minimumFractionDigits: 2,
                            maximumFractionDigits: 2
                        })}
                    </td>


                    <td class="py-4 pr-2 text-right">
                        <button type="button" data-packaging-view="${item.packagingID}" class="rounded-lg bg-soft-black px-3 py-2 text-[9px] font-black uppercase tracking-widest text-white hover:bg-soft-black/80">View</button>
                    </td>

                `;

                tbody.appendChild(row);
            });

            document.getElementById("skuCount").innerText = count;

            document.getElementById("grandTotal").innerText =
                "₱" + total.toLocaleString("en-PH", {
                    minimumFractionDigits: 2,
                    maximumFractionDigits: 2
                });
        }

        const searchInput = document.getElementById("inventorySearch");

        function openPackagingView(packagingID) {
            const item = (window.inventoryData || []).find(packaging => String(packaging.packagingID) === String(packagingID));
            if (!item) return;

            const price = Number(item.packagingPrice || 0);
            document.getElementById('viewPackagingName').textContent = item.packagingName || 'Packaging';
            document.getElementById('viewPackagingUnit').textContent = item.unitType || '-';
            document.getElementById('viewPackagingPrice').textContent = '\u20b1' + price.toLocaleString('en-PH', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
            document.getElementById('viewPackagingType').textContent = item.packagingType || 'main';
            document.getElementById('viewPackagingStock').textContent = `${Number(item.quantity || 0).toLocaleString('en-PH')} ${item.unitType || ''}`;
            viewedPackagingID = item.packagingID;
            document.getElementById('editPackagingName').value = item.packagingName || '';
            document.getElementById('editPackagingUnit').value = item.unitType || '';
            document.getElementById('editPackagingPrice').value = price;
            document.getElementById('editPackagingType').value = item.packagingType || 'main';
            document.getElementById('editPackagingStock').value = Number(item.quantity || 0);
            packagingInfoForm.classList.add('hidden');
            packagingStockForm.classList.add('hidden');
            packagingViewModal.classList.remove('hidden');
        }

        function closePackagingView() {
            packagingViewModal.classList.add('hidden');
            packagingInfoForm.classList.add('hidden');
            packagingStockForm.classList.add('hidden');
        }

        document.getElementById('inventoryBody').addEventListener('click', (event) => {
            const viewButton = event.target.closest('[data-packaging-view]');
            if (!viewButton) return;
            openPackagingView(viewButton.dataset.packagingView);
        });

        packagingViewExit.addEventListener('click', closePackagingView);

        editPackagingInfoButton.addEventListener('click', () => {
            packagingInfoForm.classList.remove('hidden');
            document.getElementById('editPackagingName').focus();
        });

        cancelPackagingInfo.addEventListener('click', () => {
            packagingInfoForm.classList.add('hidden');
        });

        editPackagingStockButton.addEventListener('click', () => {
            packagingStockForm.classList.remove('hidden');
            document.getElementById('editPackagingStock').focus();
        });

        cancelPackagingStock.addEventListener('click', () => {
            packagingStockForm.classList.add('hidden');
        });

        packagingInfoForm.addEventListener('submit', async (event) => {
            event.preventDefault();

            if (!viewedPackagingID) return;

            const payload = {
                packagingID: Number(viewedPackagingID),
                unitName: document.getElementById('editPackagingName').value.trim(),
                unitType: document.getElementById('editPackagingUnit').value.trim(),
                unitPrice: Number(document.getElementById('editPackagingPrice').value),
                packagingType: document.getElementById('editPackagingType').value
            };

            if (!payload.unitName || !payload.unitType || payload.unitPrice < 0) {
                showToast("Name, unit, and valid price are required", "error");
                return;
            }

            const saveButton = document.getElementById('savePackagingInfo');
            saveButton.disabled = true;

            const response = await editPackagingInfo(payload);
            saveButton.disabled = false;

            if (!response.success) {
                showToast(response.message || "Packaging update failed", "error");
                return;
            }

            await getPackaging();
            openPackagingView(payload.packagingID);
            showToast("Packaging information updated", "success");
        });

        packagingStockForm.addEventListener('submit', async (event) => {
            event.preventDefault();

            if (!viewedPackagingID) return;

            const payload = {
                packagingID: Number(viewedPackagingID),
                quantity: Number(document.getElementById('editPackagingStock').value)
            };

            if (!Number.isInteger(payload.quantity) || payload.quantity < 0) {
                showToast("Stock must be zero or a positive whole number", "error");
                return;
            }

            const saveButton = document.getElementById('savePackagingStock');
            saveButton.disabled = true;

            const response = await editPackagingStock(payload);
            saveButton.disabled = false;

            if (!response.success) {
                showToast(response.message || "Packaging stock update failed", "error");
                return;
            }

            await getPackaging();
            openPackagingView(payload.packagingID);
            showToast("Packaging stock updated", "success");
        });

        deletePackagingButton.addEventListener('click', async () => {
            if (!viewedPackagingID) return;

            const packagingName = document.getElementById('viewPackagingName').textContent || 'this packaging';
            const confirmed = confirm(`Archive ${packagingName}? It will be hidden from the packaging list but kept in the database.`);

            if (!confirmed) return;

            deletePackagingButton.disabled = true;
            const response = await deletePackaging({ packagingID: Number(viewedPackagingID) });
            deletePackagingButton.disabled = false;

            if (!response.success) {
                showToast(response.message || "Packaging archive failed", "error");
                return;
            }

            closePackagingView();
            await getPackaging();
            showToast("Packaging archived", "success");
        });

        searchInput.addEventListener("input", function () {
            const query = this.value.toLowerCase().trim();

            const allItems = window.inventoryData || [];

            if (query.length === 0) {
                renderPackaging(allItems);
                return;
            }

            const filtered = allItems.filter(item =>
                item.packagingName.toLowerCase().includes(query)
            );

            renderPackaging(filtered);
        });

        pacNameInput.addEventListener('input', function () {
            const query = this.value.toLowerCase().trim();

            if (query.length < 1) {
                suggestionsUl.classList.add('hidden');
                return;
            }

            const uniqueNames = [...new Set(
                window.inventoryData.map(item => item.packagingName)
            )];

            const matches = uniqueNames.filter(name =>
                name.toLowerCase().includes(query)
            );

            if (matches.length === 0) {
                suggestionsUl.classList.add('hidden');
                return;
            }

            suggestionsUl.innerHTML = matches.map(name => {
                const itemData = window.inventoryData.find(i => i.packagingName === name);

                return `
                    <li class="px-4 py-3 hover:bg-soft-black/10 cursor-pointer border-b border-gray-50 text-xs font-bold uppercase transition-colors text-soft-black"
                        data-id="${itemData.packagingID}"
                        data-name="${name}"
                        data-unit="${itemData.unitType || ''}">
                        ${name}
                    </li>
                `;
            }).join('');

            suggestionsUl.classList.remove('hidden');
        });

        suggestionsUl.addEventListener('mousedown', function (e) {
            const li = e.target.closest('li');
            if (!li) return;

            pacNameInput.value = li.dataset.name;
            selectedPackID = Number(li.dataset.id);
            document.getElementById('packUnit').value = li.dataset.unit;

            suggestionsUl.classList.add('hidden');

            setTimeout(() => {
                document.getElementById('packQty').focus();
            }, 50);
        });

        closeCommit.addEventListener('click', async () => {
            const qtyInput = Number(document.getElementById('packQty').value);

            if (!selectedPackID || qtyInput <= 0) {
                showToast("Name and Quantity are required", "error");
                return;
            }

            closeCommit.disabled = true;

            let data = {
                packagingID: selectedPackID,
                quantity: qtyInput,
            };

            await handleCloseCommit(data);

            closeCommit.disabled = false;
        });

        async function handleCloseCommit(data) {
            const nameEl = document.getElementById('packName');
            const qtyEl = document.getElementById('packQty');
            const response = await stockinPackaging(data);

            if(response.success) {
                selectedPackID = null;
                nameEl.value = '';
                qtyEl.value = '';
                closePackagingModal();
                await getPackaging();
                showToast(response.message || "Stock In Successful", "success");
            } else {
                showToast(response.message || "Stock In Failed", "error");
            }
        }

        openCommit.addEventListener('click', async () => {
            const qtyInput = Number(document.getElementById('packQty').value);

            if (!selectedPackID || qtyInput <= 0) {
                showToast("Name and Quantity are required", "error");
                return;
            }

            openCommit.disabled = true;

            let data = {
                packagingID: selectedPackID,
                quantity: qtyInput,
            };

            await handleOpenCommit(data);

            openCommit.disabled = false;
        });

        async function handleOpenCommit(data) {
            const nameEl = document.getElementById('packName');
            const qtyEl = document.getElementById('packQty');
            const response = await stockinPackaging(data);

            if(response.success) {
                selectedPackID = null;
                nameEl.value = '';
                qtyEl.value = '';
                await getPackaging();
                nameEl.focus();
                showToast(response.message || "Stock In Successful", "success");
            } else {
                showToast(response.message || "Stock In Failed", "error");
            }
        }

        openModal.addEventListener('click', () => {
            document.getElementById('packagingModal').classList.remove('hidden');
        });

        closeModal.addEventListener('click', () => {
            closePackagingModal();
        });

        function closePackagingModal() {
            document.getElementById('packagingModal').classList.add('hidden');
            suggestionsUl.classList.add('hidden');
        }

        function clearForm() {
            document.getElementById('packName').value = '';
            document.getElementById('packQty').value = '';
            document.getElementById('packUnit').value = '';
            document.getElementById('modalTitle').innerText = "Stock In";
        }

        document.addEventListener('click', (e) => {
            if (!pacNameInput.contains(e.target) && !suggestionsUl.contains(e.target)) {
                suggestionsUl.classList.add('hidden');
            }
        });

        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') closePackagingModal();
        });

        getPackaging();
    </script>
</body>
</html>
