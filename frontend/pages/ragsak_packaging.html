<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Packaging Management | Ragsak</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <style type="text/tailwindcss">
        @theme {
            --color-moss-green: #4A5D23;
            --color-moss-light: #8DA067;
            --color-soft-black: #121212;
            --color-off-white: #F4F5F2;
            --font-montserrat: "Montserrat", sans-serif;
        }

        @layer base {
            body {
                font-family: var(--font-montserrat);
                @apply bg-off-white text-soft-black antialiased;
            }
        }

        .status-pill { @apply inline-block w-28 text-center py-1 rounded text-[9px] font-bold uppercase tracking-tighter; }
        .status-green { @apply bg-moss-green text-white; }
        .status-yellow { @apply border border-moss-green/50 text-moss-light; }
        .status-red { @apply border border-red-900/50 text-red-500; }

        #packagingModal:not(.hidden) { @apply !flex items-center justify-center; }

        .modal-active { animation: modalIn 0.2s ease-out forwards; }
        @keyframes modalIn { 
            from { opacity: 0; transform: scale(0.98); } 
            to { opacity: 1; transform: scale(1); } 
        }

        #toast-container {
            @apply fixed top-10 left-1/2 -translate-x-1/2 z-[100] flex flex-col items-center gap-3 pointer-events-none;
        }
        .toast-card {
            @apply bg-soft-black text-white px-8 py-4 rounded-2xl shadow-2xl border-l-4 flex items-center gap-4 transition-all duration-500 opacity-0 translate-y-[-20px] pointer-events-auto;
        }
        .toast-card.show { @apply opacity-100 translate-y-0; }
        .toast-success { @apply border-moss-green; }
        .toast-error { @apply border-red-600; }
        
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-track { @apply bg-soft-black; }
        .custom-scrollbar::-webkit-scrollbar-thumb { @apply bg-moss-green rounded; }
    </style>
</head>
<body>

    <div id="toast-container"></div>

    <div id="sidebar-container"></div>

    <main class="min-h-screen lg:pl-64">
        <div class="flex min-h-screen flex-col px-4 pt-4 pb-6 md:px-8 md:pt-8 lg:px-8 lg:pt-10">
            <header class="flex flex-col md:flex-row justify-between items-start mb-8 lg:mb-10 gap-6">
                <div>
                    <h1 class="text-3xl font-black italic uppercase tracking-tighter leading-none text-soft-black">Packaging Inventory</h1>
                    <p class="text-[10px] font-bold text-moss-green uppercase mt-2 tracking-[0.2em]">Supply Management • Ragsak Farm</p>
                </div>
                <div class="relative w-full md:w-auto">
                    <input type="text" id="inventorySearch" placeholder="Search supplies..." 
                        class="h-11 w-full md:w-72 rounded-xl border border-gray-200 bg-white px-4 text-xs text-soft-black outline-none transition-all shadow-sm focus:border-moss-green focus:ring-2 focus:ring-moss-green/10 placeholder:text-gray-400">
                </div>
            </header>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-8 lg:mb-10">
                <div class="bg-white p-8 rounded-2xl shadow-sm border-b-4 border-moss-green">
                    <p class="text-[10px] font-bold text-gray-400 uppercase mb-1 tracking-widest">Packaging Asset Value</p>
                    <h2 id="grandTotal" class="text-4xl font-black italic tracking-tighter text-soft-black">₱0.00</h2>
                </div>
                <div class="bg-white p-8 rounded-2xl shadow-sm border-b-4 border-soft-black">
                    <p class="text-[10px] font-bold text-gray-400 uppercase mb-1 tracking-widest">Active Supply SKU</p>
                    <h2 id="skuCount" class="text-4xl font-black italic tracking-tighter text-soft-black">00</h2>
                </div>
            </div>

            <div class="flex-1 overflow-hidden bg-white rounded-3xl p-4 md:p-6 shadow-2xl flex flex-col min-h-[500px]">
                <div class="flex items-center justify-between mb-6 px-2 gap-4">
                    <p class="text-[10px] font-bold uppercase tracking-[0.3em] text-gray-500">Packaging Supply Stockpile</p>
                    <button id="modalOpen" class="bg-soft-black hover:bg-moss-light text-white text-[9px] font-black px-4 py-2 rounded-lg uppercase tracking-widest transition-all shrink-0">Add Supply Entry</button>
                </div>
                
                <div class="flex-1 overflow-x-auto overflow-y-auto custom-scrollbar pr-2">
                    <table class="w-full text-left min-w-[800px] table-fixed">
                        <thead class="sticky top-0 bg-white z-10">
                            <tr class="border-b border-gray-200">
                                <th class="pb-6 pt-2 px-2 text-[10px] font-bold uppercase tracking-widest text-gray-600">Name</th>
                                <th class="pb-6 w-[120px] text-center text-[10px] font-bold uppercase text-gray-600">Stock</th> 
                                <th class="pb-6 w-[160px] text-center text-[10px] font-bold uppercase text-gray-600">Status</th>
                                <th class="pb-6 w-[140px] text-right text-[10px] font-bold uppercase text-gray-600">Unit Price</th>
                                <th class="pb-6 w-[160px] text-right text-[10px] font-bold uppercase text-gray-600">Asset Value</th>
                                <th class="pb-6 w-[100px] text-right text-[10px] font-bold uppercase text-gray-600 pr-2">Ctrl</th>
                            </tr>
                        </thead>
                        <tbody id="inventoryBody" class="divide-y divide-gray-200"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>

    <div id="packagingModal" class="hidden fixed inset-0 bg-soft-black/30 z-[60] p-4 backdrop-blur-sm">
        <div class="bg-white w-full max-w-2xl rounded-3xl overflow-hidden shadow-2xl border-t-[14px] border-soft-black">
            <div class="p-10 max-h-[90vh] overflow-y-auto custom-scrollbar">
                <h2 id="modalTitle" class="text-2xl font-black italic uppercase tracking-tighter text-soft-black mb-8 border-b border-gray-100 pb-4">Authorize Supply Entry</h2>
                
                <div class="space-y-8">
                    <input type="hidden" id="packId">
                    <input type="hidden" id="packProcess" value="Packaging Supply">
                    <input type="hidden" id="packPrice" value="0">
                    
                    <div class="grid grid-cols-12 gap-4 items-end">
                        <div class="col-span-12 md:col-span-6 group relative">
                            <label class="text-[10px] font-bold text-gray-400 uppercase tracking-widest ml-1">Supply Name</label>
                            <input type="text" id="packName" class="w-full bg-gray-50 border-b-2 border-gray-200 py-4 px-2 text-sm font-bold outline-none focus:border-moss-green transition-all" placeholder="Search or type name..." autocomplete="off">
                            <ul id="predictiveResults" class="absolute z-50 w-full bg-white shadow-2xl rounded-b-xl border border-gray-100 hidden max-h-40 overflow-y-auto custom-scrollbar top-full mt-1"></ul>
                        </div>

                        <div class="col-span-6 md:col-span-3 group">
                            <label class="text-[10px] font-bold text-gray-400 uppercase tracking-widest ml-1">Quantity</label>
                            <input type="number" id="packQty" class="w-full bg-gray-50 border-b-2 border-gray-200 py-4 px-2 text-sm font-bold outline-none focus:border-moss-green transition-all" placeholder="0">
                        </div>

                        <div class="col-span-6 md:col-span-3 group">
                            <label class="text-[10px] font-bold text-gray-400 uppercase tracking-widest ml-1">Unit</label>
                            <input type="text" id="packUnit" class="w-full bg-gray-50 border-b-2 border-gray-200 py-4 px-2 text-sm font-bold outline-none focus:border-moss-green transition-all" placeholder="pcs / rolls">
                        </div>
                    </div>

                    <div class="flex flex-col gap-3 pt-6">
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-3">
                            <button type="button" id="commitClose" class="bg-soft-black text-white text-[11px] font-black py-5 rounded-2xl hover:bg-moss-green transition-all uppercase tracking-widest shadow-xl">
                                Commit & Close
                            </button>
                            <button type="button" id="commitOpen" class="bg-moss-green/10 text-moss-green border border-moss-green/20 text-[11px] font-black py-5 rounded-2xl hover:bg-moss-green hover:text-white transition-all uppercase tracking-widest">
                                Commit & Add Another
                            </button>
                        </div>
                        <button type="button" id="modalClose" class="w-full py-4 text-[10px] font-bold uppercase text-gray-400 hover:text-red-600 transition-all tracking-widest">
                            Abort Entry
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>

   <script>
        window.currentPageId = 'nav-packaging';
    </script>
    <script type="module" src="../components/ragsak_navigation.js"></script>
    <script type="module">
        import { loadPackaging } from "../assets/js/packaging.js";
        import { checkStockStatus } from '../assets/js/utils.js';
        import { stockinPackaging } from '../assets/js/packaging.js';
        import { showToast } from '../components/notification.js';

        const pacNameInput = document.getElementById('packName');
        const suggestionsUl = document.getElementById('predictiveResults');
        const openModal = document.getElementById('modalOpen');
        const closeModal = document.getElementById('modalClose');
        const closeCommit = document.getElementById('commitClose');
        const openCommit = document.getElementById('commitOpen');

        let selectedPackID;

        window.inventoryData = [];

        async function getPackaging() {
            try {
                const response = await loadPackaging();

                if (!response || response.status !== "success") {
                    console.error("Failed to load packaging:", response);
                    return;
                }

                window.inventoryData = response.data;

                renderPackaging();

            } catch (err) {
                console.error("Load packaging error:", err);
            }
        }

        function renderPackaging(data = window.inventoryData) {
            const tbody = document.getElementById("inventoryBody");
            tbody.innerHTML = "";

            let count = new Set(data.map(item => item.packagingName)).size;

            data = [...data].sort((a, b) =>
                (a.packagingName || "").localeCompare(b.packagingName || "")
            );

            let total = 0;

            data.forEach(item => {

                const status = checkStockStatus(item.quantity);
                const unitPrice = item.packagingPrice || 0;
                const value = item.quantity * unitPrice;

                total += value;

                const row = document.createElement("tr");
                row.className = "border-b border-gray-200 text-soft-black hover:bg-white/[0.02] transition-colors group";

                row.innerHTML = `
                    <td class="py-4 text-xs font-bold px-2 text-soft-black">
                        ${item.packagingName}
                    </td>

                    <td class="py-4 text-center text-xs text-soft-black/60 font-mono">
                        ${item.quantity} ${item.unitType}
                    </td>

                    <td class="py-4 text-center">
                        <span class="status-pill ${
                            status === "Out of Stock" ? "status-red" :
                            status === "Low Stock" ? "status-yellow" :
                            "status-green"
                        }">
                            ${status}
                        </span>
                    </td>

                    <td class="py-4 text-right text-xs text-soft-black/60 font-mono">
                        ₱${parseFloat(unitPrice).toLocaleString("en-PH", {
                            minimumFractionDigits: 2,
                            maximumFractionDigits: 2
                        })}
                    </td>

                    <td class="py-4 text-right text-xs font-bold text-soft-black">
                        ₱${value.toLocaleString("en-PH", {
                            minimumFractionDigits: 2,
                            maximumFractionDigits: 2
                        })}
                    </td>

                    <td class="py-4 text-right text-xs pr-2">
                        <button class="text-soft-black/40 hover:text-moss-green transition-colors">Edit</button>
                    </td>
                `;

                tbody.appendChild(row);
            });

            document.getElementById("skuCount").innerText = count;

            document.getElementById("grandTotal").innerText =
                "₱" + total.toLocaleString("en-PH", {
                    minimumFractionDigits: 2,
                    maximumFractionDigits: 2
                });
        }

        const searchInput = document.getElementById("inventorySearch");

        searchInput.addEventListener("input", function () {
            const query = this.value.toLowerCase().trim();

            const allItems = window.inventoryData || [];

            if (query.length === 0) {
                renderPackaging(allItems);
                return;
            }

            const filtered = allItems.filter(item =>
                item.packagingName.toLowerCase().includes(query)
            );

            renderPackaging(filtered);
        });

        pacNameInput.addEventListener('input', function () {
            const query = this.value.toLowerCase().trim();

            if (query.length < 1) {
                suggestionsUl.classList.add('hidden');
                return;
            }

            const uniqueNames = [...new Set(
                window.inventoryData.map(item => item.packagingName)
            )];

            const matches = uniqueNames.filter(name =>
                name.toLowerCase().includes(query)
            );

            if (matches.length === 0) {
                suggestionsUl.classList.add('hidden');
                return;
            }

            suggestionsUl.innerHTML = matches.map(name => {
                const itemData = window.inventoryData.find(i => i.packagingName === name);

                return `
                    <li class="px-4 py-3 hover:bg-moss-green/10 cursor-pointer border-b border-gray-50 text-xs font-bold uppercase transition-colors text-soft-black"
                        data-id="${itemData.packagingID}"
                        data-name="${name}"
                        data-unit="${itemData.unitType || ''}">
                        ${name}
                    </li>
                `;
            }).join('');

            suggestionsUl.classList.remove('hidden');
        });

        suggestionsUl.addEventListener('mousedown', function (e) {
            const li = e.target.closest('li');
            if (!li) return;

            pacNameInput.value = li.dataset.name;
            selectedPackID = Number(li.dataset.id);
            document.getElementById('packUnit').value = li.dataset.unit;

            suggestionsUl.classList.add('hidden');

            setTimeout(() => {
                document.getElementById('packQty').focus();
            }, 50);
        });

        closeCommit.addEventListener('click', () => {
            const qtyInput = Number(document.getElementById('packQty').value);

            if (!selectedPackID || qtyInput <= 0) {
                showToast("Name and Quantity are required", "error");
                return;
            }

            closeCommit.disabled = true;

            let data = {
                packagingID: selectedPackID,
                quantity: qtyInput,
            };

            handleCloseCommit(data);

            closeCommit.disabled = false;
        });

        async function handleCloseCommit(data) {
            const nameEl = document.getElementById('packName');
            const qtyEl = document.getElementById('packQty');
            const response = await stockinPackaging(data);

            selectedPackID = null; 
            nameEl.value = '';
            qtyEl.value = '';

            if(response) {
                closePackagingModal();
                await getPackaging();
                showToast("Stock In Successful", "success");
            } else {
                showToast("Stock In Failed", "error");
            }
        }

        openCommit.addEventListener('click', () => {
            const qtyInput = Number(document.getElementById('packQty').value);

            if (!selectedPackID || qtyInput <= 0) {
                showToast("Name and Quantity are required", "error");
                return;
            }

            openCommit.disabled = true;

            let data = {
                packagingID: selectedPackID,
                quantity: qtyInput,
            };

            handleOpenCommit(data);

            openCommit.disabled = false;
        });

        async function handleOpenCommit(data) {
            const nameEl = document.getElementById('packName');
            const qtyEl = document.getElementById('packQty');
            const response = await stockinPackaging(data);
            selectedPackID = null; 
            nameEl.value = '';
            qtyEl.value = '';

            if(response) {
                await getPackaging();
                nameEl.focus(); 
                showToast("Stock In Successful", "success");
            } else {
                showToast("Stock In Failed", "error");
            }
        }

        openModal.addEventListener('click', () => {
            document.getElementById('packagingModal').classList.remove('hidden');
        });

        closeModal.addEventListener('click', () => {
            closePackagingModal();
        });

        function closePackagingModal() {
            document.getElementById('packagingModal').classList.add('hidden');
            suggestionsUl.classList.add('hidden');
        }

        function clearForm() {
            document.getElementById('packId').value = '';
            document.getElementById('packName').value = '';
            document.getElementById('packQty').value = '';
            document.getElementById('packUnit').value = '';
            document.getElementById('packPrice').value = '0';
            document.getElementById('modalTitle').innerText = "Stock In";
        }

        document.addEventListener('click', (e) => {
            if (!pacNameInput.contains(e.target) && !suggestionsUl.contains(e.target)) {
                suggestionsUl.classList.add('hidden');
            }
        });
        
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') closePackagingModal();
        });

        getPackaging();
    </script>
</body>
</html>
