<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Process Registry | Ragsak</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">

    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <style type="text/tailwindcss">
        @theme {
            --color-moss-green: #4A5D23;
            --color-moss-light: #8DA067;
            --color-soft-black: #121212;
            --color-off-white: #F4F5F2;
            --font-montserrat: "Montserrat", sans-serif;
        }

        @layer base {
            body {
                font-family: var(--font-montserrat);
                @apply bg-off-white text-soft-black antialiased;
            }
        }

        .custom-scrollbar::-webkit-scrollbar {
            width: 4px;
            height: 4px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
            @apply bg-soft-black;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            @apply bg-soft-black rounded;
        }

        .table-scrollbar {
            scrollbar-width: thin;
            scrollbar-color: #121212 #F4F5F2;
        }

        .table-scrollbar::-webkit-scrollbar { width: 8px; height: 8px; }
        .table-scrollbar::-webkit-scrollbar-track { @apply bg-off-white rounded-full; }
        .table-scrollbar::-webkit-scrollbar-thumb { @apply bg-soft-black rounded-full; }
        .table-scrollbar::-webkit-scrollbar-thumb:hover { @apply bg-soft-black/80; }

        .view-scrollbar {
            scrollbar-width: thin;
            scrollbar-color: #121212 transparent;
        }

        .view-scrollbar::-webkit-scrollbar { width: 10px; }
        .view-scrollbar::-webkit-scrollbar-track {
            background: transparent;
            margin-block: 72px;
        }
        .view-scrollbar::-webkit-scrollbar-thumb {
            background-color: #121212;
            background-clip: content-box;
            border: 3px solid transparent;
            border-radius: 9999px;
            min-height: 48px;
        }

        #processViewModal:not(.hidden) {
            @apply flex items-center justify-center;
        }

        #toast-container {
            @apply fixed top-10 left-1/2 -translate-x-1/2 z-[100] flex flex-col items-center gap-3 pointer-events-none;
        }
        .toast-card {
            @apply bg-soft-black text-white px-8 py-4 rounded-2xl shadow-2xl border-l-4 flex items-center gap-4 transition-all duration-500 opacity-0 translate-y-[-20px] pointer-events-auto;
        }
        .toast-card.show { @apply opacity-100 translate-y-0; }
        .toast-success { @apply border-soft-black; }
        .toast-error { @apply border-red-600; }
    </style>
</head>
<body>
    <div id="toast-container"></div>

    <div id="sidebar-container"></div>

    <main class="min-h-screen lg:pl-64">
        <div class="flex min-h-screen flex-col px-4 pt-6 pb-6 sm:px-6 lg:px-8 lg:pt-10">
            <header class="mb-8 md:mb-10">
                <div>
                    <h1 class="text-2xl sm:text-3xl font-black italic uppercase tracking-tighter leading-none text-soft-black">
                        Process Registry
                    </h1>
                    <p class="mt-2 text-[10px] font-bold text-moss-green uppercase tracking-[0.2em]">
                        Production Process Management
                    </p>
                </div>
            </header>

            <div class="grid grid-cols-1 lg:grid-cols-3 gap-6 lg:gap-8 flex-1">
                <div class="lg:col-span-1">
                    <div class="bg-white p-6 sm:p-8 rounded-3xl shadow-xl border-t-[12px] border-soft-black">
                        <h2 id="processFormTitle" class="text-lg sm:text-xl font-black italic uppercase tracking-tighter text-soft-black mb-6">
                            Register Process
                        </h2>

                        <form id="processForm" class="space-y-6">
                            <input type="hidden" id="processID">

                            <div>
                                <label class="text-[10px] font-bold text-gray-400 uppercase tracking-widest ml-1">
                                    Process Name
                                </label>
                                <input
                                    type="text"
                                    id="processName"
                                    required
                                    maxlength="50"
                                    class="w-full bg-gray-50 border-b-2 border-gray-200 py-3 px-2 text-sm font-bold outline-none focus:border-moss-green uppercase"
                                    placeholder="e.g. FERMENTATION"
                                >
                            </div>

                            <div>
                                <label class="text-[10px] font-bold text-gray-400 uppercase tracking-widest ml-1">
                                    Process Description
                                </label>
                                <textarea
                                    id="processDescription"
                                    maxlength="255"
                                    rows="5"
                                    class="w-full resize-none bg-gray-50 border-b-2 border-gray-200 py-3 px-2 text-sm font-bold outline-none focus:border-moss-green"
                                    placeholder="Describe what happens in this production step..."
                                ></textarea>
                            </div>

                            <div class="grid grid-cols-1 gap-3">
                                <button
                                    type="submit"
                                    id="saveProcessButton"
                                    class="w-full bg-soft-black text-white text-xs font-black py-5 rounded-2xl hover:bg-moss-light transition-all uppercase tracking-[0.2em] shadow-lg"
                                >
                                    Register Process
                                </button>
                                <button
                                    type="button"
                                    id="cancelEditButton"
                                    class="hidden w-full border border-gray-200 text-gray-500 text-[10px] font-black py-4 rounded-2xl hover:text-soft-black transition-all uppercase tracking-[0.2em]"
                                >
                                    Cancel Edit
                                </button>
                            </div>
                        </form>
                    </div>
                </div>

                <div class="lg:col-span-2 flex flex-col bg-white rounded-3xl p-4 sm:p-6 lg:p-8 shadow-2xl overflow-hidden min-h-[420px]">
                    <div class="flex items-center justify-between mb-6 sm:mb-8">
                        <p class="text-[10px] font-bold uppercase tracking-[0.3em] text-gray-500">
                            Registered Processes
                        </p>
                        <p id="processCount" class="text-[10px] font-black uppercase tracking-[0.2em] text-moss-green">0 Items</p>
                    </div>

                    <div class="flex-1 min-h-0 overflow-x-auto overflow-y-auto custom-scrollbar table-scrollbar pr-2 sm:pr-4">
                        <table class="w-full min-w-[680px] text-left">
                            <thead class="sticky top-0 z-10 bg-white">
                                <tr class="border-b border-gray-200">
                                    <th class="pb-4 pt-2 text-[9px] font-bold uppercase tracking-widest text-gray-600">Process Name</th>
                                    <th class="pb-4 pt-2 text-[9px] font-bold uppercase tracking-widest text-gray-600">Process Description</th>
                                    <th class="pb-4 pt-2 text-right text-[9px] font-bold uppercase tracking-widest text-gray-600">View</th>
                                </tr>
                            </thead>
                            <tbody id="processTableBody" class="divide-y divide-gray-200"></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <div id="processViewModal" class="hidden fixed inset-0 z-[70] bg-soft-black/30 p-4 backdrop-blur-sm">
        <div class="w-full max-w-3xl rounded-3xl bg-white shadow-2xl border-t-[14px] border-soft-black">
            <div class="max-h-[90vh] overflow-y-auto p-8 md:p-10 view-scrollbar">
                <div class="mb-8 flex items-start justify-between gap-4 border-b border-gray-100 pb-4">
                    <div>
                        <p class="text-[10px] font-black uppercase tracking-[0.3em] text-moss-green">Process Information</p>
                        <h2 id="viewProcessName" class="mt-2 text-2xl font-black italic uppercase tracking-tighter text-soft-black">Process</h2>
                    </div>
                    <button type="button" id="processViewExit" class="rounded-lg border border-gray-200 px-4 py-2 text-[10px] font-black uppercase tracking-widest text-soft-black hover:bg-gray-50">Exit</button>
                </div>

                <section class="rounded-2xl bg-gray-50 p-5">
                    <p class="text-[9px] font-black uppercase tracking-widest text-gray-400">Description</p>
                    <p id="viewProcessDescription" class="mt-3 text-sm font-bold leading-relaxed text-soft-black/70"></p>
                </section>

                <section class="mt-6">
                    <div class="mb-3 flex items-center justify-between gap-3">
                        <p class="text-[10px] font-black uppercase tracking-[0.2em] text-soft-black/50">Registered Products</p>
                        <p id="viewProcessProductCount" class="text-[10px] font-black uppercase tracking-[0.2em] text-moss-green">0 Items</p>
                    </div>
                    <div id="viewProcessProducts" class="space-y-3"></div>
                </section>

                <div class="mt-8 grid grid-cols-1 gap-3 md:grid-cols-2">
                    <button type="button" id="editProcessInfoButton" class="rounded-2xl bg-soft-black px-4 py-4 text-[10px] font-black uppercase tracking-widest text-white hover:bg-soft-black/85">Edit Information</button>
                    <button type="button" id="archiveProcessButton" class="rounded-2xl border border-red-200 bg-red-50 px-4 py-4 text-[10px] font-black uppercase tracking-widest text-red-600 hover:bg-red-100">Archive</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        window.currentPageId = 'nav-process';
    </script>
    <script type="module" src="../components/ragsak_navigation.js"></script>
    <script type="module">
        import { getProcesses, createProcess, updateProcess, getProcessDetails, archiveProcess } from '../assets/js/api.js';
        import { showToast } from '../components/notification.js';

        const processForm = document.getElementById('processForm');
        const processIDInput = document.getElementById('processID');
        const processNameInput = document.getElementById('processName');
        const processDescriptionInput = document.getElementById('processDescription');
        const processFormTitle = document.getElementById('processFormTitle');
        const saveProcessButton = document.getElementById('saveProcessButton');
        const cancelEditButton = document.getElementById('cancelEditButton');
        const processTableBody = document.getElementById('processTableBody');
        const processCount = document.getElementById('processCount');
        const processViewModal = document.getElementById('processViewModal');
        const processViewExit = document.getElementById('processViewExit');
        const editProcessInfoButton = document.getElementById('editProcessInfoButton');
        const archiveProcessButton = document.getElementById('archiveProcessButton');

        let processData = [];
        let viewedProcess = null;

        function escapeHtml(value) {
            return String(value ?? '').replace(/[&<>"']/g, char => ({
                '&': '&amp;',
                '<': '&lt;',
                '>': '&gt;',
                '"': '&quot;',
                "'": '&#039;'
            }[char]));
        }

        function resetProcessForm() {
            processIDInput.value = '';
            processNameInput.value = '';
            processDescriptionInput.value = '';
            processFormTitle.textContent = 'Register Process';
            saveProcessButton.textContent = 'Register Process';
            cancelEditButton.classList.add('hidden');
        }

        function fillEditForm(process) {
            processIDInput.value = process.processID;
            processNameInput.value = process.processName || '';
            processDescriptionInput.value = process.processDescription || '';
            processFormTitle.textContent = 'Edit Process';
            saveProcessButton.textContent = 'Save Process';
            cancelEditButton.classList.remove('hidden');
            processNameInput.focus();
        }

        function setProcessFormSaving(isSaving, isEditing) {
            saveProcessButton.disabled = isSaving;
            cancelEditButton.disabled = isSaving;
            saveProcessButton.textContent = isSaving
                ? 'Saving Process...'
                : (isEditing ? 'Save Process' : 'Register Process');
        }

        function hasDuplicateProcessName(processName, currentProcessID = null) {
            const normalizedName = processName.trim().toLowerCase();

            return processData.some(process => {
                const isSameProcess = currentProcessID && Number(process.processID) === Number(currentProcessID);
                return !isSameProcess && String(process.processName || '').trim().toLowerCase() === normalizedName;
            });
        }

        function renderProcesses() {
            processTableBody.innerHTML = '';
            processCount.textContent = `${processData.length} ${processData.length === 1 ? 'Item' : 'Items'}`;

            if (processData.length === 0) {
                processTableBody.innerHTML = `
                    <tr>
                        <td colspan="3" class="py-16 text-center text-[10px] font-black uppercase tracking-[0.25em] text-gray-400">
                            No processes registered
                        </td>
                    </tr>
                `;
                return;
            }

            processData.forEach(process => {
                const row = document.createElement('tr');
                row.className = 'hover:bg-black/[0.02] transition';
                row.innerHTML = `
                    <td class="py-6 pr-4 text-xs font-black text-soft-black uppercase italic tracking-tighter">
                        ${escapeHtml(process.processName)}
                    </td>
                    <td class="py-6 pr-4 text-xs font-bold text-soft-black/60 leading-relaxed">
                        ${escapeHtml(process.processDescription)}
                    </td>
                    <td class="py-6 text-right">
                        <button type="button" data-process-view="${escapeHtml(process.processID)}" class="rounded-xl border border-soft-black/15 bg-soft-black/5 px-4 py-3 text-[9px] font-black uppercase tracking-widest text-soft-black hover:bg-soft-black hover:text-white">
                            View
                        </button>
                    </td>
                `;
                processTableBody.appendChild(row);
            });
        }

        async function loadProcessData() {
            try {
                const response = await getProcesses();

                if (!response || response.status !== 'success') {
                    showToast(response?.message || 'Failed to load processes', 'error');
                    return;
                }

                processData = response.data || [];
                renderProcesses();
            } catch (error) {
                showToast('Failed to connect to process registry', 'error');
            }
        }

        function renderProcessProducts(products = []) {
            const container = document.getElementById('viewProcessProducts');
            const count = document.getElementById('viewProcessProductCount');
            count.textContent = `${products.length} ${products.length === 1 ? 'Item' : 'Items'}`;

            if (products.length === 0) {
                container.innerHTML = `
                    <div class="rounded-2xl border border-dashed border-gray-200 bg-gray-50 p-5">
                        <p class="text-[10px] font-black uppercase tracking-[0.18em] text-gray-400">No products registered on this process</p>
                    </div>
                `;
                return;
            }

            container.innerHTML = products.map(product => `
                <div class="grid grid-cols-12 items-center gap-3 rounded-2xl border border-gray-100 bg-white p-4 shadow-sm">
                    <div class="col-span-8">
                        <p class="text-xs font-black uppercase tracking-tight text-soft-black">${escapeHtml(product.productName)}</p>
                        <p class="mt-1 text-[10px] font-bold uppercase tracking-[0.16em] text-gray-400">${escapeHtml(product.unitType || '-')}</p>
                    </div>
                    <div class="col-span-4 text-right text-xs font-mono font-bold text-soft-black/60">
                        ${Number(product.productPrice || 0).toLocaleString('en-PH', {
                            minimumFractionDigits: 2,
                            maximumFractionDigits: 2
                        })}
                    </div>
                </div>
            `).join('');
        }

        async function openProcessView(processID) {
            const response = await getProcessDetails(processID);

            if (!response || response.status !== 'success') {
                showToast(response?.message || 'Failed to load process', 'error');
                return;
            }

            viewedProcess = response.data;
            document.getElementById('viewProcessName').textContent = viewedProcess.processName || 'Process';
            document.getElementById('viewProcessDescription').textContent = viewedProcess.processDescription || '-';
            renderProcessProducts(viewedProcess.products || []);
            processViewModal.classList.remove('hidden');
        }

        function closeProcessView() {
            processViewModal.classList.add('hidden');
            viewedProcess = null;
        }

        processTableBody.addEventListener('click', event => {
            const viewButton = event.target.closest('[data-process-view]');
            if (!viewButton) return;
            openProcessView(viewButton.dataset.processView);
        });

        processViewExit.addEventListener('click', closeProcessView);

        processViewModal.addEventListener('click', event => {
            if (event.target === processViewModal) {
                closeProcessView();
            }
        });

        editProcessInfoButton.addEventListener('click', () => {
            if (!viewedProcess) return;
            const process = { ...viewedProcess };
            closeProcessView();
            fillEditForm(process);
        });

        archiveProcessButton.addEventListener('click', async () => {
            if (!viewedProcess) return;

            const confirmed = confirm(`Archive ${viewedProcess.processName}? It will be hidden from the process registry but kept in the database.`);
            if (!confirmed) return;

            archiveProcessButton.disabled = true;
            const response = await archiveProcess({ processID: Number(viewedProcess.processID) });
            archiveProcessButton.disabled = false;

            if (!response || response.status !== 'success') {
                showToast(response?.message || 'Process archive failed', 'error');
                return;
            }

            showToast(response.message || 'Process archived', 'success');
            closeProcessView();
            resetProcessForm();
            await loadProcessData();
        });

        cancelEditButton.addEventListener('click', resetProcessForm);

        processForm.addEventListener('submit', async event => {
            event.preventDefault();

            const payload = {
                processName: processNameInput.value.trim(),
                processDescription: processDescriptionInput.value.trim() || 'No Description'
            };

            if (!payload.processName || !payload.processDescription) {
                showToast('Process name and description are required', 'error');
                return;
            }

            if (!/^[A-Za-z0-9][A-Za-z0-9\s().,&\/-]*$/.test(payload.processName)) {
                showToast('Process name contains invalid characters', 'error');
                processNameInput.focus();
                return;
            }

            if (/[<>{}]/.test(payload.processDescription)) {
                showToast('Process description contains invalid characters', 'error');
                processDescriptionInput.focus();
                return;
            }

            const isEditing = Boolean(processIDInput.value);

            if (hasDuplicateProcessName(payload.processName, isEditing ? processIDInput.value : null)) {
                showToast('Process already exists, including archived records', 'error');
                processNameInput.focus();
                return;
            }

            if (isEditing) {
                payload.processID = Number(processIDInput.value);
            }

            setProcessFormSaving(true, isEditing);

            try {
                const response = isEditing
                    ? await updateProcess(payload)
                    : await createProcess(payload);

                if (!response || response.status !== 'success') {
                    showToast(response?.message || 'Process save failed', 'error');
                    return;
                }

                showToast(response.message || 'Process saved', 'success');
                resetProcessForm();
                await loadProcessData();
            } catch (error) {
                showToast('Failed to connect to process registry', 'error');
            } finally {
                setProcessFormSaving(false, Boolean(processIDInput.value));
            }
        });

        loadProcessData();
    </script>
</body>
</html>
