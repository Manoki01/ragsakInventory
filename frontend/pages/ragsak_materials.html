<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Materials Management | Ragsak</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <style type="text/tailwindcss">
        @theme {
            --color-moss-green: #4A5D23;
            --color-moss-light: #8DA067;
            --color-soft-black: #121212;
            --color-off-white: #F4F5F2;
            --font-montserrat: "Montserrat", sans-serif;
        }

        @layer base {
            body {
                font-family: var(--font-montserrat);
                @apply bg-off-white text-soft-black antialiased;
            }
        }

        .status-pill { @apply inline-block w-28 text-center py-1 rounded text-[9px] font-bold uppercase tracking-tighter; }
        .status-green { @apply bg-moss-green text-white; }
        .status-yellow { @apply border border-moss-green/50 text-moss-light; }
        .status-red { @apply border border-red-900/50 text-red-500; }

        #materialModal:not(.hidden) { @apply !flex items-center justify-center; }

        .modal-active { animation: modalIn 0.2s ease-out forwards; }
        @keyframes modalIn { 
            from { opacity: 0; transform: scale(0.98); } 
            to { opacity: 1; transform: scale(1); } 
        }

        #toast-container {
            @apply fixed top-10 left-1/2 -translate-x-1/2 z-[100] flex flex-col items-center gap-3 pointer-events-none;
        }
        .toast-card {
            @apply bg-soft-black text-white px-8 py-4 rounded-2xl shadow-2xl border-l-4 flex items-center gap-4 transition-all duration-500 opacity-0 translate-y-[-20px] pointer-events-auto;
        }
        .toast-card.show { @apply opacity-100 translate-y-0; }
        .toast-success { @apply border-moss-green; }
        .toast-error { @apply border-red-600; }
        
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-track { @apply bg-soft-black; }
        .custom-scrollbar::-webkit-scrollbar-thumb { @apply bg-moss-green rounded; }
    </style>
</head>
<body>

    <div id="toast-container"></div>

    <div class="grid grid-cols-1 lg:grid-cols-8">
        <div class="lg:col-span-1">
            <div id="sidebar-container"></div>
        </div>

        <div class="flex h-screen flex-col lg:col-span-7 px-8 pt-10 pb-6">
            <header class="flex flex-col md:flex-row justify-between items-start mb-10 gap-6">
                <div>
                    <h1 class="text-3xl font-black italic uppercase tracking-tighter leading-none text-soft-black">Materials Inventory</h1>
                    <p class="text-[10px] font-bold text-moss-green uppercase mt-2 tracking-[0.2em]">Raw Resource Management • Ragsak Farm</p>
                </div>
                <div class="relative">
                    <input type="text" id="inventorySearch" placeholder="Search resources..." 
                        class="h-11 w-72 rounded-xl border border-gray-200 bg-white px-4 text-xs text-soft-black outline-none transition-all shadow-sm focus:border-moss-green focus:ring-2 focus:ring-moss-green/10 placeholder:text-gray-400">
                </div>
            </header>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-10">
                <div class="bg-white p-8 rounded-2xl shadow-sm border-b-4 border-moss-green">
                    <p class="text-[10px] font-bold text-gray-400 uppercase mb-1 tracking-widest">Material Asset Value</p>
                    <h2 id="grandTotal" class="text-4xl font-black italic tracking-tighter">₱0.00</h2>
                </div>
                <div class="bg-white p-8 rounded-2xl shadow-sm border-b-4 border-soft-black">
                    <p class="text-[10px] font-bold text-gray-400 uppercase mb-1 tracking-widest">Active Material SKU</p>
                    <h2 id="skuCount" class="text-4xl font-black italic tracking-tighter">00</h2>
                </div>
            </div>

            <div class="flex-1 overflow-hidden bg-soft-black rounded-3xl p-6 shadow-2xl flex flex-col">
                <div class="flex items-center justify-between mb-6 px-2">
                    <p class="text-[10px] font-bold uppercase tracking-[0.3em] text-white/50">Raw Resource Stockpile</p>
                    <button id="modalOpen" class="bg-white/10 hover:bg-white/20 text-white text-[9px] font-black px-4 py-2 rounded-lg uppercase tracking-widest transition-all">Add Stock Entry</button>
                </div>
                
                <div class="flex-1 overflow-y-auto custom-scrollbar pr-2">
                    <table class="w-full text-left min-w-[800px] table-fixed">
                        <thead class="sticky top-0 bg-soft-black z-10">
                            <tr class="border-b border-white/5">
                                <th class="pb-6 px-2 text-[10px] font-bold uppercase tracking-widest text-white/60">Name</th>
                                <th class="pb-6 w-[120px] text-center text-[10px] font-bold uppercase text-white/60">Stock</th> 
                                <th class="pb-6 w-[160px] text-center text-[10px] font-bold uppercase text-white/60">Status</th>
                                <th class="pb-6 w-[140px] text-right text-[10px] font-bold uppercase text-white/60">Unit Price</th>
                                <th class="pb-6 w-[160px] text-right text-[10px] font-bold uppercase text-white/60">Asset Value</th>
                                <th class="pb-6 w-[100px] text-right text-[10px] font-bold uppercase text-white/60 pr-2">Ctrl</th>
                            </tr>
                        </thead>
                        <tbody id="inventoryBody" class="divide-y divide-white/5"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <div id="materialModal" class="hidden fixed inset-0 bg-soft-black/30 z-[60] p-4 backdrop-blur-sm">
        <div class="bg-white w-full max-w-2xl rounded-3xl overflow-hidden shadow-2xl border-t-[14px] border-moss-green">
            <div class="p-10 max-h-[90vh] overflow-y-auto custom-scrollbar">
                <h2 id="modalTitle" class="text-2xl font-black italic uppercase tracking-tighter text-soft-black mb-8 border-b border-gray-100 pb-4">Authorize Stock Entry</h2>
                
                <div class="space-y-8">
                    <input type="hidden" id="matId">
                    <input type="hidden" id="matProcess" value="Raw Material">
                    <input type="hidden" id="matPrice" value="0">
                    
                    <div class="grid grid-cols-12 gap-4 items-end">
                        <div class="col-span-12 md:col-span-6 group relative">
                            <label class="text-[10px] font-bold text-gray-400 uppercase tracking-widest ml-1">Material Name</label>
                            <input type="text" id="matName" class="w-full bg-gray-50 border-b-2 border-gray-200 py-4 px-2 text-sm font-bold outline-none focus:border-moss-green transition-all" placeholder="Search or type name..." autocomplete="off">
                            <ul id="predictiveResults" class="absolute z-50 w-full bg-white shadow-2xl rounded-b-xl border border-gray-100 hidden max-h-40 overflow-y-auto custom-scrollbar top-full mt-1"></ul>
                        </div>

                        <div class="col-span-6 md:col-span-3 group">
                            <label class="text-[10px] font-bold text-gray-400 uppercase tracking-widest ml-1">Quantity</label>
                            <input type="number" id="matQty" class="w-full bg-gray-50 border-b-2 border-gray-200 py-4 px-2 text-sm font-bold outline-none focus:border-moss-green transition-all" placeholder="0">
                        </div>

                        <div class="col-span-6 md:col-span-3 group">
                            <label class="text-[10px] font-bold text-gray-400 uppercase tracking-widest ml-1">Unit</label>
                            <input type="text" id="matUnit" class="w-full bg-gray-50 border-b-2 border-gray-200 py-4 px-2 text-sm font-bold outline-none focus:border-moss-green transition-all" placeholder="kg / sack">
                        </div>
                    </div>

                    <div class="flex flex-col gap-3 pt-6">
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-3">
                            <button type="button" id="commitClose" class="bg-soft-black text-white text-[11px] font-black py-5 rounded-2xl hover:bg-moss-green transition-all uppercase tracking-widest shadow-xl">
                                Commit & Close
                            </button>
                            <button type="button" id="commitOpen" class="bg-moss-green/10 text-moss-green border border-moss-green/20 text-[11px] font-black py-5 rounded-2xl hover:bg-moss-green hover:text-white transition-all uppercase tracking-widest">
                                Commit & Add Another
                            </button>
                        </div>
                        <button type="button" id="modalClose" class="w-full py-4 text-[10px] font-bold uppercase text-gray-400 hover:text-red-600 transition-all tracking-widest">
                            Abort Entry
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="../components/ragsak_navigation.js"></script>

    <script type="module">
        import { loadRawMaterials } from "../assets/js/raw_materials.js";
        import { checkStockStatus } from '../assets/js/utils.js';
        import { stockinRawMaterial } from '../assets/js/raw_materials.js';
        import { showToast } from '../components/notification.js';

        const matNameInput = document.getElementById('matName');
        const suggestionsUl = document.getElementById('predictiveResults');
        const openModal = document.getElementById('modalOpen');
        const closeModal = document.getElementById('modalClose');
        const closeCommit = document.getElementById('commitClose');
        const openCommit = document.getElementById('commitOpen');

        injectNavigation('nav-products');

        window.inventoryData = [];

        async function getRawMaterials() {
            try {
                const response = await loadRawMaterials();

                if (!response || response.status !== "success") {
                    console.error("Failed to load raw materials:", response);
                    return;
                }

                window.inventoryData = response.data;

                renderRawMaterials();

            } catch (err) {
                console.error("Load products error:", err);
            }
        }

        function renderRawMaterials(data = window.inventoryData, count = 0) {
            const tbody = document.getElementById("inventoryBody");
            tbody.innerHTML = "";

            if (!data || data.length === 0) return;

            // ✅ sort by product name only
            data = [...data].sort((a, b) =>
                (a.rawMaterialName || "").localeCompare(b.rawMaterialName || "")
            );

            let total = 0;

            data.forEach(item => {

                const status = checkStockStatus(item.quantity);
                const unitPrice = item.rawMaterialPrice || 0;
                const value = item.quantity * unitPrice;

                total += value;
                count++;

                const row = document.createElement("tr");
                row.className = "text-white/80";

                row.innerHTML = `
                    <!-- NAME -->
                    <td class="py-4 text-xs font-bold px-2">
                        ${item.rawMaterialName}
                    </td>

                    <!-- STOCK -->
                    <td class="py-4 text-center text-xs">
                        ${item.quantity} ${item.unitType}
                    </td>

                    <!-- STATUS -->
                    <td class="py-4 text-center">
                        <span class="status-pill ${
                            status === "Out of Stock" ? "status-red" :
                            status === "Low Stock" ? "status-yellow" :
                            "status-green"
                        }">
                            ${status}
                        </span>
                    </td>

                    <!-- UNIT PRICE -->
                    <td class="py-4 text-right text-xs">
                        ₱${parseFloat(unitPrice).toLocaleString("en-PH", {
                            minimumFractionDigits: 2,
                            maximumFractionDigits: 2
                        })}
                    </td>

                    <!-- VALUE -->
                    <td class="py-4 text-right text-xs font-bold">
                        ₱${value.toLocaleString("en-PH", {
                            minimumFractionDigits: 2,
                            maximumFractionDigits: 2
                        })}
                    </td>

                    <!-- CTRL -->
                    <td class="py-4 text-right text-xs pr-2">
                        <button class="text-white/40 hover:text-white">Edit</button>
                    </td>
                `;

                tbody.appendChild(row);
            });

            document.getElementById("skuCount").innerText = count;

            document.getElementById("grandTotal").innerText =
                "₱" + total.toLocaleString("en-PH", {
                    minimumFractionDigits: 2,
                    maximumFractionDigits: 2
                });
        }

        const searchInput = document.getElementById("inventorySearch");

            searchInput.addEventListener("input", function () {
                const query = this.value.toLowerCase().trim();

                const allItems = window.inventoryData || [];

                if (query.length === 0) {
                    renderRawMaterials(allItems);
                    return;
                }

                const filtered = allItems.filter(item =>
                    item.rawMaterialName.toLowerCase().includes(query)
                );

                renderRawMaterials(filtered);
            });

        // Predictive Search Logic (FIXED Undefined)
        matNameInput.addEventListener('input', function () {
            const query = this.value.toLowerCase().trim();

            if (query.length < 1) {
                suggestionsUl.classList.add('hidden');
                return;
            }

            const uniqueNames = [...new Set(
                currentItems.map(item => item.rawMaterialName)
            )];

            const matches = uniqueNames.filter(name =>
                name.toLowerCase().includes(query)
            );

            if (matches.length === 0) {
                suggestionsUl.classList.add('hidden');
                return;
            }

            suggestionsUl.innerHTML = matches.map(name => {
                const itemData = currentItems.find(i => i.rawMaterialName === name);

                return `
                    <li class="px-4 py-3 hover:bg-moss-green/10 cursor-pointer border-b border-gray-50 text-xs font-bold uppercase transition-colors"
                        data-id="${itemData.rawMaterialID}"
                        data-name="${name}"
                        data-unit="${itemData.unitType || ''}">
                        ${name}
                    </li>
                `;
            }).join('');

            suggestionsUl.classList.remove('hidden');
        });

        suggestionsUl.addEventListener('mousedown', function (e) {
            const li = e.target.closest('li');
            if (!li) return;

            matNameInput.value = li.dataset.name;
            selectedProductID = Number(li.dataset.id);
            document.getElementById('matUnit').value = li.dataset.unit;

            suggestionsUl.classList.add('hidden');

            setTimeout(() => {
                document.getElementById('matQty').focus();
            }, 50);
        });

        closeCommit.addEventListener('click', () => {
            const qtyInput = Number(document.getElementById('matQty').value);;

            if (!selectedProductID || qtyInput <= 0) {
                showToast("Name and Quantity are required", "error");
                return;
            }

            closeCommit.disabled = true;

             let data = {
                productID: selectedProductID,
                quantity: qtyInput,
            };

            handleCloseCommit(data);

            closeCommit.disabled = false;
           
        });

        async function handleCloseCommit(data) {
            console.log(data);
            await stockinProduct(data);
            closeMaterialModal();
            await getRawMaterials();
            showToast("Stock In Sccessful", "success");
        }

        openCommit.addEventListener('click', () => {
            const qtyInput = Number(document.getElementById('prodQty').value);
            const prodProc = Number(document.getElementById('prodProcess').value);

            if (!selectedProductID || qtyInput <= 0 || !prodProc) {
                showToast("Name, Quantity, and Process are required", "error");
                return;
            }

            openCommit.disabled = true;

             let data = {
                productID: selectedProductID,
                quantity: qtyInput,
                processID: prodProc
            };

            handleOpenCommit(data);

            openCommit.disabled = false;
           
        });

        function handleOpenCommit(data) {
            const procEl = document.getElementById('prodProcess')
            const nameEl = document.getElementById('prodName');
            const qtyEl = document.getElementById('prodQty');

            console.log(data);
            stockinProduct(data);
            selectedProductID = null; 
            procEl.value = '';  
            nameEl.value = '';
            qtyEl.value = '';
            nameEl.focus(); 
            showToast("Stock In Sccessful", "success");
        }

        openModal.addEventListener('click', () => {
                //clearForm(); 
                document.getElementById('materialModal').classList.remove('hidden');
         });
            

        closeModal.addEventListener('click', () => {
            closeMaterialModal();
        });

        function closeMaterialModal() {
            document.getElementById('materialModal').classList.add('hidden');
            suggestionsUl.classList.add('hidden');
        }
            

        function clearForm() {
            document.getElementById('prodId').value = '';
            document.getElementById('prodProcess').value = '';
            document.getElementById('prodName').value = '';
            document.getElementById('prodQty').value = '';
            document.getElementById('prodUnit').value = '';
            document.getElementById('prodPrice').value = '0';
            document.getElementById('modalTitle').innerText = "Stock In";
        }

        document.addEventListener('click', (e) => {
            if (!matNameInput.contains(e.target) && !suggestionsUl.contains(e.target)) {
                suggestionsUl.classList.add('hidden');
            }
        });
        
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') closeModal();
        });

        getRawMaterials();
    </script>
</body>
</html>
