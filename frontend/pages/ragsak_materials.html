<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Materials Management | Ragsak</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">

    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <style type="text/tailwindcss">
        @theme {
            --color-soft-black: #4A5D23;
            --color-moss-light: #8DA067;
            --color-soft-black: #121212;
            --color-off-white: #F4F5F2;
            --font-montserrat: "Montserrat", sans-serif;
        }

        @layer base {
            body {
                font-family: var(--font-montserrat);
                @apply bg-off-white text-soft-black antialiased;
            }
        }

        .status-pill { @apply inline-block w-28 text-center py-1 rounded text-[9px] font-bold uppercase tracking-tighter; }
        .status-green { @apply bg-soft-black text-white; }
        .status-yellow { @apply border border-soft-black/50 text-yellow-500; }
        .status-red { @apply border border-red-900/50 text-red-500; }

        #materialModal:not(.hidden) { @apply !flex items-center justify-center; }
        #materialViewModal:not(.hidden) { @apply !flex items-center justify-center; }

        #toast-container {
            @apply fixed top-10 left-1/2 -translate-x-1/2 z-[100] flex flex-col items-center gap-3 pointer-events-none;
        }
        .toast-card {
            @apply bg-soft-black text-white px-8 py-4 rounded-2xl shadow-2xl border-l-4 flex items-center gap-4 transition-all duration-500 opacity-0 translate-y-[-20px] pointer-events-auto;
        }
        .toast-card.show { @apply opacity-100 translate-y-0; }
        .toast-success { @apply border-soft-black; }
        .toast-error { @apply border-red-600; }

        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-track { @apply bg-soft-black; }
        .custom-scrollbar::-webkit-scrollbar-thumb { @apply bg-soft-black rounded; }

        .table-scrollbar {
            scrollbar-width: thin;
            scrollbar-color: #121212 #F4F5F2;
        }

        .table-scrollbar::-webkit-scrollbar { width: 8px; height: 8px; }
        .table-scrollbar::-webkit-scrollbar-track { @apply bg-off-white rounded-full; }
        .table-scrollbar::-webkit-scrollbar-thumb { @apply bg-soft-black rounded-full; }
        .table-scrollbar::-webkit-scrollbar-thumb:hover { @apply bg-soft-black/80; }

        .view-scrollbar {
            scrollbar-width: thin;
            scrollbar-color: #121212 transparent;
        }

        .view-scrollbar::-webkit-scrollbar { width: 10px; }
        .view-scrollbar::-webkit-scrollbar-track {
            background: transparent;
            margin-block: 72px;
        }
        .view-scrollbar::-webkit-scrollbar-thumb {
            background-color: #121212;
            background-clip: content-box;
            border: 3px solid transparent;
            border-radius: 9999px;
            min-height: 48px;
        }
    </style>
</head>
<body>

    <div id="toast-container"></div>

    <div id="sidebar-container"></div>

    <main class="min-h-screen lg:pl-64">
        <div class="flex min-h-screen flex-col px-4 pt-4 pb-6 md:px-8 md:pt-8 lg:px-8 lg:pt-10">
            <header class="flex flex-col md:flex-row justify-between items-start mb-8 lg:mb-10 gap-6">
                <div>
                    <h1 class="text-3xl font-black italic uppercase tracking-tighter leading-none text-soft-black">Materials Inventory</h1>
                    <p class="text-[10px] font-bold text-soft-black uppercase mt-2 tracking-[0.2em]">Raw Resource Management • Ragsak Farm</p>
                </div>
                <div class="relative w-full md:w-auto">
                    <input type="text" id="inventorySearch" placeholder="Search resources..."
                        class="h-11 w-full md:w-72 rounded-xl border border-gray-200 bg-white px-4 text-xs text-soft-black outline-none transition-all shadow-sm focus:border-soft-black focus:ring-2 focus:ring-soft-black/10 placeholder:text-gray-400">
                </div>
            </header>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-8 lg:mb-10">
                <div class="bg-white p-8 rounded-2xl shadow-sm border-b-4 border-soft-black">
                    <p class="text-[10px] font-bold text-gray-400 uppercase mb-1 tracking-widest">Material Asset Value</p>
                    <h2 id="grandTotal" class="text-4xl font-black italic tracking-tighter text-soft-black">₱0.00</h2>
                </div>
                <div class="bg-white p-8 rounded-2xl shadow-sm border-b-4 border-soft-black">
                    <p class="text-[10px] font-bold text-gray-400 uppercase mb-1 tracking-widest">Active Material SKU</p>
                    <h2 id="skuCount" class="text-4xl font-black italic tracking-tighter text-soft-black">00</h2>
                </div>
            </div>

            <div class="overflow-hidden bg-white rounded-3xl p-4 md:p-6 shadow-2xl flex flex-col h-[560px]">
                <div class="flex items-center justify-between mb-6 px-2 gap-4">
                    <p class="text-[10px] font-bold uppercase tracking-[0.3em] text-gray-500">Raw Resource Stockpile</p>
                    <button id="modalOpen" class="bg-soft-black hover:bg-soft-black/50 text-white text-[9px] font-black px-4 py-2 rounded-lg uppercase tracking-widest transition-all shrink-0">Add Stock Entry</button>
                </div>

                <div class="flex-1 min-h-0 overflow-x-auto overflow-y-auto custom-scrollbar table-scrollbar pr-2">
                    <table class="w-full text-left min-w-[800px] table-fixed">
                        <thead class="sticky top-0 bg-white z-10">
                            <tr class="border-b border-gray-200">
                                <th class="pb-6 pt-2 px-2 text-[10px] font-bold uppercase tracking-widest text-gray-600">Name</th>
                                <th class="pb-6 w-[120px] text-center text-[10px] font-bold uppercase text-gray-600">Stock</th>
                                <th class="pb-6 w-[160px] text-center text-[10px] font-bold uppercase text-gray-600">Status</th>
                                <th class="pb-6 w-[140px] text-right text-[10px] font-bold uppercase text-gray-600">Unit Price</th>
                                <th class="pb-6 w-[160px] text-right text-[10px] font-bold uppercase text-gray-600">Asset Value</th>
                                <th class="pb-6 w-[110px] text-right text-[10px] font-bold uppercase text-gray-600 pr-2">View</th>
                            </tr>
                        </thead>
                        <tbody id="inventoryBody" class="divide-y divide-gray-200"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>

    <div id="materialModal" class="hidden fixed inset-0 bg-soft-black/30 z-[60] p-4 backdrop-blur-sm">
        <div class="bg-white w-full max-w-2xl rounded-3xl overflow-hidden shadow-2xl border-t-[14px] border-soft-black">
            <div class="p-10 max-h-[90vh] overflow-y-auto custom-scrollbar">
                <h2 id="modalTitle" class="text-2xl font-black italic uppercase tracking-tighter text-soft-black mb-8 border-b border-gray-100 pb-4">Authorize Stock Entry</h2>

                <div class="space-y-8">
                    <div class="grid grid-cols-12 gap-4 items-end">
                        <div class="col-span-12 md:col-span-6 group relative">
                            <label class="text-[10px] font-bold text-gray-400 uppercase tracking-widest ml-1">Material Name</label>
                            <input type="text" id="matName" class="w-full bg-gray-50 border-b-2 border-gray-200 py-4 px-2 text-sm font-bold outline-none focus:border-soft-black transition-all" placeholder="Search or type name..." autocomplete="off">
                            <ul id="predictiveResults" class="absolute z-50 w-full bg-white shadow-2xl rounded-b-xl border border-gray-100 hidden max-h-40 overflow-y-auto custom-scrollbar top-full mt-1"></ul>
                        </div>

                        <div class="col-span-6 md:col-span-3 group">
                            <label class="text-[10px] font-bold text-gray-400 uppercase tracking-widest ml-1">Quantity</label>
                            <input type="number" id="matQty" class="w-full bg-gray-50 border-b-2 border-gray-200 py-4 px-2 text-sm font-bold outline-none focus:border-soft-black transition-all" placeholder="0">
                        </div>

                        <div class="col-span-6 md:col-span-3 group">
                            <label class="text-[10px] font-bold text-gray-400 uppercase tracking-widest ml-1">Unit</label>
                            <input type="text" id="matUnit" class="w-full bg-gray-50 border-b-2 border-gray-200 py-4 px-2 text-sm font-bold outline-none focus:border-soft-black transition-all" placeholder="kg / sack">
                        </div>
                    </div>

                    <div class="flex flex-col gap-3 pt-6">
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-3">
                            <button type="button" id="commitClose" class="bg-soft-black text-white text-[11px] font-black py-5 rounded-2xl hover:bg-soft-black transition-all uppercase tracking-widest shadow-xl">
                                Commit & Close
                            </button>
                            <button type="button" id="commitOpen" class="bg-soft-black/10 text-soft-black border border-soft-black/20 text-[11px] font-black py-5 rounded-2xl hover:bg-soft-black hover:text-white transition-all uppercase tracking-widest">
                                Commit & Add Another
                            </button>
                        </div>
                        <button type="button" id="modalClose" class="w-full py-4 text-[10px] font-bold uppercase text-gray-400 hover:text-red-600 transition-all tracking-widest">
                            Abort Entry
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="materialViewModal" class="hidden fixed inset-0 bg-soft-black/30 z-[70] p-4 backdrop-blur-sm">
        <div class="bg-white w-full max-w-2xl rounded-3xl overflow-hidden shadow-2xl border-t-[14px] border-soft-black">
            <div class="p-8 md:p-10 max-h-[90vh] overflow-y-auto view-scrollbar">
                <div class="mb-8 flex items-start justify-between gap-4 border-b border-gray-100 pb-4">
                    <h2 id="viewMaterialName" class="text-2xl font-black italic uppercase tracking-tighter text-soft-black">Material</h2>
                    <button type="button" id="materialViewExit" class="rounded-lg border border-gray-200 px-4 py-2 text-[10px] font-black uppercase tracking-widest text-soft-black hover:bg-gray-50">Exit</button>
                </div>
                <div class="grid grid-cols-1 gap-4 py-6 md:grid-cols-3">
                    <div class="rounded-2xl bg-gray-50 p-5"><p class="text-[9px] font-black uppercase tracking-widest text-gray-400">Unit Type</p><p id="viewMaterialUnit" class="mt-2 text-sm font-black uppercase text-soft-black">-</p></div>
                    <div class="rounded-2xl bg-gray-50 p-5"><p class="text-[9px] font-black uppercase tracking-widest text-gray-400">Unit Price</p><p id="viewMaterialPrice" class="mt-2 text-sm font-black uppercase text-soft-black">-</p></div>
                    <div class="rounded-2xl bg-gray-50 p-5"><p class="text-[9px] font-black uppercase tracking-widest text-gray-400">Stock</p><p id="viewMaterialStock" class="mt-2 text-sm font-black uppercase text-soft-black">-</p></div>
                </div>
                <div class="grid grid-cols-1 gap-3 md:grid-cols-3">
                    <button type="button" class="rounded-2xl bg-soft-black px-4 py-4 text-[10px] font-black uppercase tracking-widest text-white hover:bg-soft-black/85">Edit Information</button>
                    <button type="button" class="rounded-2xl border border-soft-black/20 bg-soft-black/5 px-4 py-4 text-[10px] font-black uppercase tracking-widest text-soft-black hover:bg-soft-black hover:text-white">Edit Stock</button>
                    <button type="button" class="rounded-2xl border border-red-200 bg-red-50 px-4 py-4 text-[10px] font-black uppercase tracking-widest text-red-600 hover:bg-red-100">Delete Material</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        window.currentPageId = 'nav-materials';
    </script>
    <script type="module" src="../components/ragsak_navigation.js"></script>

    <script type="module">
        import { loadRawMaterials } from "../assets/js/raw_materials.js";
        import { checkStockStatus } from '../assets/js/utils.js';
        import { stockinRawMaterial } from '../assets/js/raw_materials.js';
        import { showToast } from '../components/notification.js';

        const matNameInput = document.getElementById('matName');
        const suggestionsUl = document.getElementById('predictiveResults');
        const openModal = document.getElementById('modalOpen');
        const closeModal = document.getElementById('modalClose');
        const closeCommit = document.getElementById('commitClose');
        const openCommit = document.getElementById('commitOpen');;
        const materialViewModal = document.getElementById('materialViewModal');
        const materialViewExit = document.getElementById('materialViewExit');

        let selectedMatID;

        window.inventoryData = [];

        async function getRawMaterials() {
            try {
                const response = await loadRawMaterials();

                if (!response || response.status !== "success") {
                    console.error("Failed to load raw materials:", response);
                    return;
                }

                window.inventoryData = response.data;

                renderRawMaterials();

            } catch (err) {
                console.error("Load raw materials error:", err);
            }
        }

        function renderRawMaterials(data = window.inventoryData) {
            const tbody = document.getElementById("inventoryBody");
            tbody.innerHTML = "";

            let count = new Set(data.map(item => item.rawMaterialName)).size;

            data = [...data].sort((a, b) =>
                (a.rawMaterialName || "").localeCompare(b.rawMaterialName || "")
            );

            let total = 0;

            data.forEach(item => {

                const status = checkStockStatus(item.quantity);
                const unitPrice = item.rawMaterialPrice || 0;
                const value = item.quantity * unitPrice;

                total += value;

                const row = document.createElement("tr");
                row.className = "border-b border-gray-200 text-soft-black hover:bg-white/[0.02] transition-colors group";

                row.innerHTML = `
                    <td class="py-4 text-xs font-bold px-2 text-soft-black">
                        ${item.rawMaterialName}
                    </td>

                    <td class="py-4 text-center text-xs text-soft-black/60 font-mono">
                        ${item.quantity} ${item.unitType}
                    </td>

                    <td class="py-4 text-center">
                        <span class="status-pill ${
                            status === "Out of Stock" ? "status-red" :
                            status === "Low Stock" ? "status-yellow" :
                            "status-green"
                        }">
                            ${status}
                        </span>
                    </td>

                    <td class="py-4 text-right text-xs text-soft-black/60 font-mono">
                        ₱${parseFloat(unitPrice).toLocaleString("en-PH", {
                            minimumFractionDigits: 2,
                            maximumFractionDigits: 2
                        })}
                    </td>

                    <td class="py-4 text-right text-xs font-bold text-soft-black">
                        ₱${value.toLocaleString("en-PH", {
                            minimumFractionDigits: 2,
                            maximumFractionDigits: 2
                        })}
                    </td>


                    <td class="py-4 pr-2 text-right">
                        <button type="button" data-material-view="${item.rawMaterialID}" class="rounded-lg bg-soft-black px-3 py-2 text-[9px] font-black uppercase tracking-widest text-white hover:bg-soft-black/80">View</button>
                    </td>

                `;

                tbody.appendChild(row);
            });

            document.getElementById("skuCount").innerText = count;

            document.getElementById("grandTotal").innerText =
                "₱" + total.toLocaleString("en-PH", {
                    minimumFractionDigits: 2,
                    maximumFractionDigits: 2
                });
        }

        const searchInput = document.getElementById("inventorySearch");

        function openMaterialView(rawMaterialID) {
            const item = (window.inventoryData || []).find(material => String(material.rawMaterialID) === String(rawMaterialID));
            if (!item) return;

            const price = Number(item.rawMaterialPrice || 0);
            document.getElementById('viewMaterialName').textContent = item.rawMaterialName || 'Material';
            document.getElementById('viewMaterialUnit').textContent = item.unitType || '-';
            document.getElementById('viewMaterialPrice').textContent = '\u20b1' + price.toLocaleString('en-PH', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
            document.getElementById('viewMaterialStock').textContent = `${Number(item.quantity || 0).toLocaleString('en-PH')} ${item.unitType || ''}`;
            materialViewModal.classList.remove('hidden');
        }

        function closeMaterialView() {
            materialViewModal.classList.add('hidden');
        }

        document.getElementById('inventoryBody').addEventListener('click', (event) => {
            const viewButton = event.target.closest('[data-material-view]');
            if (!viewButton) return;
            openMaterialView(viewButton.dataset.materialView);
        });

        materialViewExit.addEventListener('click', closeMaterialView);

        searchInput.addEventListener("input", function () {
            const query = this.value.toLowerCase().trim();

            const allItems = window.inventoryData || [];

            if (query.length === 0) {
                renderRawMaterials(allItems);
                return;
            }

            const filtered = allItems.filter(item =>
                item.rawMaterialName.toLowerCase().includes(query)
            );

            renderRawMaterials(filtered);
        });

        matNameInput.addEventListener('input', function () {
            const query = this.value.toLowerCase().trim();

            if (query.length < 1) {
                suggestionsUl.classList.add('hidden');
                return;
            }

            const uniqueNames = [...new Set(
                window.inventoryData.map(item => item.rawMaterialName)
            )];

            const matches = uniqueNames.filter(name =>
                name.toLowerCase().includes(query)
            );

            if (matches.length === 0) {
                suggestionsUl.classList.add('hidden');
                return;
            }

            suggestionsUl.innerHTML = matches.map(name => {
                const itemData = window.inventoryData.find(i => i.rawMaterialName === name);

                return `
                    <li class="px-4 py-3 hover:bg-soft-black/10 cursor-pointer border-b border-gray-50 text-xs font-bold uppercase transition-colors text-soft-black"
                        data-id="${itemData.rawMaterialID}"
                        data-name="${name}"
                        data-unit="${itemData.unitType || ''}">
                        ${name}
                    </li>
                `;
            }).join('');

            suggestionsUl.classList.remove('hidden');
        });

        suggestionsUl.addEventListener('mousedown', function (e) {
            const li = e.target.closest('li');
            if (!li) return;

            matNameInput.value = li.dataset.name;
            selectedMatID = Number(li.dataset.id);
            document.getElementById('matUnit').value = li.dataset.unit;

            suggestionsUl.classList.add('hidden');

            setTimeout(() => {
                document.getElementById('matQty').focus();
            }, 50);
        });

        closeCommit.addEventListener('click', () => {
            const qtyInput = Number(document.getElementById('matQty').value);

            if (!selectedMatID || qtyInput <= 0) {
                showToast("Name and Quantity are required", "error");
                return;
            }

            closeCommit.disabled = true;

            let data = {
                rawMaterialID: selectedMatID,
                quantity: qtyInput,
            };

            handleCloseCommit(data);

            closeCommit.disabled = false;
        });

        async function handleCloseCommit(data) {
            const nameEl = document.getElementById('matName');
            const qtyEl = document.getElementById('matQty');
            const response = await stockinRawMaterial(data);

            selectedMatID = null;
            nameEl.value = '';
            qtyEl.value = '';

            if(response) {
                closeMaterialModal();
                await getRawMaterials();
                showToast("Stock In Successful", "success");
            } else {
                showToast("Stock In Failed", "error");
            }
        }

        openCommit.addEventListener('click', () => {
            const qtyInput = Number(document.getElementById('matQty').value);

            if (!selectedMatID || qtyInput <= 0) {
                showToast("Name and Quantity are required", "error");
                return;
            }

            openCommit.disabled = true;

            let data = {
                rawMaterialID: selectedMatID,
                quantity: qtyInput,
            };

            handleOpenCommit(data);

            openCommit.disabled = false;
        });

        async function handleOpenCommit(data) {
            const nameEl = document.getElementById('matName');
            const qtyEl = document.getElementById('matQty');
            const response = await stockinRawMaterial(data);

            selectedMatID = null;
            nameEl.value = '';
            qtyEl.value = '';

            if(response) {
                await getRawMaterials();
                nameEl.focus();
                showToast("Stock In Successful", "success");
            } else {
                showToast("Stock In Failed", "error");
            }
        }

        openModal.addEventListener('click', () => {
            document.getElementById('materialModal').classList.remove('hidden');
        });

        closeModal.addEventListener('click', () => {
            closeMaterialModal();
        });

        function closeMaterialModal() {
            document.getElementById('materialModal').classList.add('hidden');
            suggestionsUl.classList.add('hidden');
        }

        function clearForm() {
            document.getElementById('matName').value = '';
            document.getElementById('matQty').value = '';
            document.getElementById('matUnit').value = '';
            document.getElementById('modalTitle').innerText = "Stock In";
        }

        document.addEventListener('click', (e) => {
            if (!matNameInput.contains(e.target) && !suggestionsUl.contains(e.target)) {
                suggestionsUl.classList.add('hidden');
            }
        });

        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') closeMaterialModal();
        });

        getRawMaterials();
    </script>
</body>
</html>
