<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ragsak Systems | Register</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style type="text/tailwindcss">
        @theme {
            --color-soft-black: #4A5D23; --color-moss-light: #8DA067;
            --color-soft-black: #121212; --color-off-white: #F4F5F2;
            --font-montserrat: "Montserrat", sans-serif;
        }
        @layer base { body { font-family: var(--font-montserrat); @apply bg-off-white text-soft-black antialiased; } }
        .input-field { @apply w-full rounded-xl border border-gray-200 bg-gray-50/50 p-4 text-sm transition-all outline-none focus:border-soft-black focus:ring-2 focus:ring-soft-black/10; }
    </style>
</head>
<body class="flex min-h-screen items-center justify-center p-4">

    <div class="flex w-full max-w-lg overflow-hidden rounded-3xl bg-white shadow-2xl border border-gray-100">
        <div class="flex w-full flex-col justify-between p-10 lg:p-12">
            
            <header class="text-center">
                <div class="inline-flex items-center gap-3 mb-6">
                    <div class="h-8 w-8 rounded-lg bg-soft-black flex items-center justify-center"><span class="text-white font-bold">R</span></div>
                    <span class="font-black uppercase tracking-tighter text-soft-black">Ragsak Village</span>
                </div>
                <h2 class="text-3xl font-extrabold tracking-tight text-soft-black uppercase italic">Account Creation</h2>
                <p class="mt-2 text-[10px] font-bold text-gray-400 uppercase tracking-widest leading-relaxed">Inventory Registration System</p>
            </header>

            <form id="registerForm" class="mt-8 space-y-5">
                <div class="space-y-1">
                    <label class="text-[10px] font-bold uppercase tracking-widest text-soft-black ml-1">Name</label>
                    <input type="text" id="regUsername" required placeholder="Ex. Juan Dela Cruzr" class="input-field" autocomplete="off" aria-label="Username" aria-describedby="userHint" />
                    <p id="userHint" class="text-[8px] text-gray-400 uppercase mt-1 ml-1 font-bold">At least 4 characters long.</p>
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <div class="space-y-1">
                        <label class="text-[10px] font-bold uppercase tracking-widest text-soft-black ml-1">Passcode</label>
                        <div class="relative">
                            <input type="password" id="regPassword" required placeholder="••••••••" class="input-field pr-10" aria-label="Password" aria-describedby="passwordHelp" />
                            <button type="button" id="toggleRegPassword" class="absolute right-3 top-1/2 transform -translate-y-1/2 text-gray-400 hover:text-soft-black" aria-label="Toggle password visibility">
                                <svg class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
                                </svg>
                            </button>
                        </div>
                    </div>
                    <div class="space-y-1">
                        <label class="text-[10px] font-bold uppercase tracking-widest text-soft-black ml-1">Confirm</label>
                        <div class="relative">
                            <input type="password" id="confirmPassword" required placeholder="••••••••" class="input-field pr-10" aria-label="Confirm Password" />
                            <button type="button" id="toggleConfirmPassword" class="absolute right-3 top-1/2 transform -translate-y-1/2 text-gray-400 hover:text-soft-black" aria-label="Toggle confirm password visibility">
                                <svg class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
                                </svg>
                            </button>
                        </div>
                    </div>
                </div>

                <div class="space-y-1">
                    <label class="text-[10px] font-bold uppercase tracking-widest text-soft-black ml-1">Assigned Role</label>
                    <select id="regRole" class="input-field appearance-none font-bold">
                        <option disabled selected>-- Select an Option --</option>
                        <option value="Chairman">Chairman</option>
                        <option value="President">President</option>
                        <option value="Supervisor">Supervisor</option>
                        <option value="Manufacturing">Manufacturing</option>
                    </select>
                </div>

                <div id="errorMsg" class="text-[10px] font-bold text-red-600 uppercase text-center hidden"></div>

                <div class="flex items-center justify-center mb-4">
                    <input type="checkbox" id="regCaptcha" required class="mr-2" aria-label="Verify you are not a robot" />
                    <label for="regCaptcha" class="text-[10px] font-bold uppercase tracking-widest text-soft-black">I'm not a robot</label>
                </div>

                <button type="submit" id="regBtn" class="w-full rounded-xl bg-soft-black py-4 text-xs font-bold uppercase tracking-widest text-white transition-all hover:bg-soft-black/50 active:scale-95 shadow-lg" aria-label="Submit registration form">
                    Register Personnel
                </button>
            </form>

            <p class="mt-8 text-center text-[10px] font-bold uppercase tracking-widest text-gray-400">
                Existing personnel? <a href="../index.html" class="text-soft-black hover:underline">Sign In</a>
            </p>
        </div>
    </div>

    <script type="module">
        import { registerUsers } from '../assets/js/users.js';

        const regForm = document.getElementById('registerForm');
        const usernameInput = document.getElementById('regUsername');
        const errorDiv = document.getElementById('errorMsg');
        const toggleRegPasswordBtn = document.getElementById('toggleRegPassword');
        const toggleConfirmPasswordBtn = document.getElementById('toggleConfirmPassword');

        // Password visibility toggles
        toggleRegPasswordBtn.addEventListener('click', () => {
            const input = document.getElementById('regPassword');
            const type = input.type === 'password' ? 'text' : 'password';
            input.type = type;
            const icon = toggleRegPasswordBtn.querySelector('svg');
            if (type === 'text') {
                icon.innerHTML = '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.878 9.878L3 3m6.878 6.878L21 21" />';
            } else {
                icon.innerHTML = '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" /><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />';
            }
        });

        toggleConfirmPasswordBtn.addEventListener('click', () => {
            const input = document.getElementById('confirmPassword');
            const type = input.type === 'password' ? 'text' : 'password';
            input.type = type;
            const icon = toggleConfirmPasswordBtn.querySelector('svg');
            if (type === 'text') {
                icon.innerHTML = '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.878 9.878L3 3m6.878 6.878L21 21" />';
            } else {
                icon.innerHTML = '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" /><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />';
            }
        });

        regForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            errorDiv.classList.add('hidden');

            // Simple rate limiting: max 3 registration attempts per hour
            const now = Date.now();
            const attempts = JSON.parse(localStorage.getItem('regAttempts') || '[]');
            const recentAttempts = attempts.filter(time => now - time < 3600000); // 1 hour
            if (recentAttempts.length >= 3) {
                errorDiv.innerText = "Too many registration attempts. Please try again later.";
                errorDiv.classList.remove('hidden');
                return;
            }
            recentAttempts.push(now);
            localStorage.setItem('regAttempts', JSON.stringify(recentAttempts));

            const username = usernameInput.value.trim();
            const password = document.getElementById('regPassword').value;
            const confirm = document.getElementById('confirmPassword').value;
            const role = document.getElementById('regRole').value;

            // Validate CAPTCHA
            const captcha = document.getElementById('regCaptcha');
            if (!captcha.checked) {
                errorDiv.innerText = "Please verify you are not a robot.";
                errorDiv.classList.remove('hidden');
                return;
            }

            // Validate username: at least 4 characters
            if (username.length < 4 || username.length > 50) {
                errorDiv.innerText = "Username must be 4-50 characters long.";
                errorDiv.classList.remove('hidden');
                return;
            }

            // Validate password: at least 6 characters, one uppercase, one lowercase, one number
            const passwordRegex = /^(?=.*[a-z])(?=.*[A-Z])(?=.*\d).{6,}$/;
            if (!passwordRegex.test(password)) {
                errorDiv.innerText = "Password must be at least 6 characters long and contain at least one uppercase letter, one lowercase letter, and one number.";
                errorDiv.classList.remove('hidden');
                return;
            }

            // Simple Validation
            if (password !== confirm) {
                errorDiv.innerText = "Passcodes do not match";
                errorDiv.classList.remove('hidden');
                return;
            }

            if (!role || role === '-- Select an Option --') {
                errorDiv.innerText = "Please select a role.";
                errorDiv.classList.remove('hidden');
                return;
            }

            let data = {
                username,
                password,
                role
            };

            console.log("Passing data:", data);

            const response = await registerUsers(data);
            if (response.status === "success") {
                errorDiv.innerText = response.message || "Registration submitted for approval.";
                errorDiv.classList.remove('hidden');
                errorDiv.classList.remove('text-red-600');
                errorDiv.classList.add('text-soft-black');
                setTimeout(() => {
                    window.location.href = '../../index.html';
                }, 1800);
            } else {
                errorDiv.innerText = response.message || "Registration failed";
                errorDiv.classList.add('text-red-600');
                errorDiv.classList.remove('text-soft-black');
                errorDiv.classList.remove('hidden');
            }
        });
    </script>
</body>
</html>
