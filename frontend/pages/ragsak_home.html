<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Inventory Management System | Ragsak</title>
        
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    
        <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

        <style type="text/tailwindcss">
            @theme {
                --color-moss-green: #4A5D23;
                --color-moss-light: #8DA067;
                --color-soft-black: #121212;
                --color-off-white: #F4F5F2;
                --font-montserrat: "Montserrat", sans-serif;
            }

            @layer base {
                body {
                    font-family: var(--font-montserrat);
                    @apply bg-off-white text-soft-black antialiased;
                }
            }

            /* Custom scrollbar for the table area */
            .custom-scrollbar::-webkit-scrollbar {
                width: 4px;
            }
            .custom-scrollbar::-webkit-scrollbar-track {
                @apply bg-soft-black;
            }
            .custom-scrollbar::-webkit-scrollbar-thumb {
                @apply bg-moss-green rounded;
            }
        </style>
    </head>
    
    <body>
       <div class="grid grid-cols-1 lg:grid-cols-8">
        <div class="lg:col-span-1">
            <div id="sidebar-container"></div>
        </div>
        
        <div class="flex h-screen flex-col lg:col-span-7 px-8 pt-10 pb-6">
            
            <div class="mb-8">
                <div class="flex items-center justify-between">
                    <div>
                        <h1 class="text-3xl font-black text-soft-black uppercase tracking-tighter italic">
                            Home Dashboard
                        </h1>
                        <p class="text-[10px] font-bold text-moss-green uppercase tracking-[0.2em] mt-1">
                            Operational Overview • Philippines Tarlac
                        </p>
                    </div>
                    <div class="relative">
                        <input type="text" id="dashboardSearch" onkeyup="filterDashboard()" placeholder="Search resources..." 
                               class="h-11 w-72 rounded-xl border border-gray-200 bg-white px-4 text-xs focus:border-moss-green focus:ring-2 focus:ring-moss-green/10 outline-none transition-all shadow-sm">
                    </div>
                </div>
            </div>

            <div class="grid grid-cols-1 gap-6 lg:grid-cols-3">
                <div class="group relative h-36 rounded-2xl bg-white p-5 flex flex-col justify-between overflow-hidden shadow-xl">
                    <div class="absolute top-0 right-0 w-24 h-24 bg-moss-green/10 rounded-full -mr-12 -mt-12 blur-2xl"></div>
                    <p class="text-[10px] font-bold uppercase tracking-widest text-black/40">Total Unique SKUs</p>
                    <p id="totalItems" class="text-5xl font-black text-moss-green self-center mb-6">00</p>
                    <div class="h-1 w-full bg-moss-green absolute bottom-0 left-0"></div>
                </div>

                <div class="group relative h-36 rounded-2xl bg-white border border-gray-100 p-5 flex flex-col justify-between shadow-sm overflow-hidden">
                    <p class="text-[10px] font-bold uppercase tracking-widest text-gray-400">Low on Stock</p>
                    <p id="lowStockCount" class="text-5xl font-black text-orange-500 self-center">00</p>
                    <span class="text-[9px] font-bold uppercase text-orange-500 self-end italic">Action Required</span>
                    <div class="h-1 w-full bg-orange-500 absolute bottom-0 left-0"></div>
                </div>

                <div class="group relative h-36 rounded-2xl bg-white border border-gray-100 p-5 flex flex-col justify-between shadow-sm overflow-hidden">
                    <p class="text-[10px] font-bold uppercase tracking-widest text-gray-400">Out of Stock</p>
                    <p id="outOfStockCount" class="text-5xl font-black text-red-500 self-center">00</p>
                    <span class="text-[9px] font-bold uppercase text-red-500 self-end italic">Critical</span>
                    <div class="h-1 w-full bg-red-500 absolute bottom-0 left-0"></div>
                </div>
            </div>

            <div class="mt-8 flex-1 overflow-hidden">
                <div class="flex h-full flex-col rounded-2xl bg-soft-black p-6 shadow-2xl">
                    <div class="flex items-center justify-between mb-6">
                        <p class="text-[10px] font-bold uppercase tracking-[0.3em] text-white/50">
                            Recently Authorized Entries
                        </p>
                        <button onclick="loadDashboardData()" class="text-[9px] font-bold uppercase tracking-widest text-moss-light hover:text-white transition-colors">
                            Refresh Logs
                        </button>
                    </div>

                    <div class="flex-1 overflow-y-auto custom-scrollbar pr-2">
                        <table class="w-full text-left border-collapse">
                            <thead class="sticky top-0 bg-soft-black z-10">
                                <tr class="border-b border-white/5">
                                    <th class="py-4 px-2 text-[10px] font-bold uppercase tracking-widest text-white/60">Item Name</th>
                                    <th class="py-4 px-2 text-[10px] font-bold uppercase tracking-widest text-white/60">Category</th>
                                    <th class="py-4 px-2 text-[10px] font-bold uppercase tracking-widest text-white/60">Quantity</th>
                                    <th class="py-4 px-2 text-[10px] font-bold uppercase tracking-widest text-white/60">Unit Price</th>
                                    <th class="py-4 px-2 text-[10px] font-bold uppercase tracking-widest text-white/60 text-right">Status</th>
                                </tr>
                            </thead>

                            <tbody id="recentEntriesBody" class="divide-y divide-white/5">
                                </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="../components/ragsak_navigation.js"></script>

        <script type="module">
            injectNavigation('nav-home');

            let masterData = []; 

            function loadDashboardData() {
                // Pull from ALL THREE LocalStorage keys
                const products = JSON.parse(localStorage.getItem('ragsak_products_inv')) || [];
                const materials = JSON.parse(localStorage.getItem('ragsak_materials_inv')) || [];
                const packaging = JSON.parse(localStorage.getItem('ragsak_packaging_inv')) || [];

                // Combine and tag categories
                masterData = [
                    ...products.map(p => ({ ...p, category: 'Product' })),
                    ...materials.map(m => ({ ...m, category: 'Material' })),
                    ...packaging.map(pk => ({ ...pk, category: 'Packaging' }))
                ];

                // 1. Update Top Stat Cards
                document.getElementById('totalItems').innerText = masterData.length.toString().padStart(2, '0');
                
                // Use different thresholds if desired (e.g., Packaging often has higher 'low' limits)
                const lowStock = masterData.filter(item => {
                    if (item.category === 'Packaging') return item.qty > 0 && item.qty <= 50;
                    return item.qty > 0 && item.qty <= 15;
                }).length;
                
                document.getElementById('lowStockCount').innerText = lowStock.toString().padStart(2, '0');
                
                const outOfStock = masterData.filter(item => item.qty <= 0).length;
                document.getElementById('outOfStockCount').innerText = outOfStock.toString().padStart(2, '0');

                // 2. Sort by ID (Timestamp) to get most recent and render
                renderTable(masterData.sort((a, b) => b.id - a.id).slice(0, 8));
            }

            function renderTable(data) {
                const tableBody = document.getElementById('recentEntriesBody');
                
                if (data.length === 0) {
                    tableBody.innerHTML = `<tr><td colspan="5" class="py-10 text-center text-white/20 text-xs uppercase font-bold tracking-widest">No matching resources found</td></tr>`;
                    return;
                }

                tableBody.innerHTML = data.map(item => {
                    let statusHTML = '';
                    // Define thresholds based on category
                    const isLow = (item.category === 'Packaging' ? item.qty <= 50 : item.qty <= 15);

                    if (item.qty <= 0) {
                        statusHTML = `<span class="rounded border border-red-900/50 text-red-500 px-3 py-1 text-[9px] font-bold uppercase tracking-tighter">Out of Stock</span>`;
                    } else if (isLow) {
                        statusHTML = `<span class="rounded border border-moss-green/50 text-moss-light px-3 py-1 text-[9px] font-bold uppercase tracking-tighter">Low Stock</span>`;
                    } else {
                        statusHTML = `<span class="rounded bg-moss-green px-3 py-1 text-[9px] font-bold text-white uppercase tracking-tighter">In Stock</span>`;
                    }

                    return `
                        <tr class="hover:bg-white/[0.02] transition-colors group">
                            <td class="py-5 px-2 text-sm font-medium text-white">${item.name}</td>
                            <td class="py-5 px-2 text-[10px] font-bold uppercase text-white/40">${item.category}</td>
                            <td class="py-5 px-2 text-sm text-white/60 font-mono">${item.qty} ${item.unit}</td>
                            <td class="py-5 px-2 text-sm text-white/60 font-mono">₱${parseFloat(item.price).toLocaleString()}</td>
                            <td class="py-5 px-2 text-right">${statusHTML}</td>
                        </tr>
                    `;
                }).join('');
            }

            function filterDashboard() {
                const query = document.getElementById('dashboardSearch').value.toLowerCase();
                const filtered = masterData.filter(item => 
                    item.name.toLowerCase().includes(query) || 
                    item.category.toLowerCase().includes(query)
                );
                renderTable(filtered);
            }

            loadDashboardData();
        </script>
    </body>
</html>
