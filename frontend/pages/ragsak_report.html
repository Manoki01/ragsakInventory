<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Report Engine | Ragsak Inventory</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <style type="text/tailwindcss">
        @theme {
            --color-soft-black: #121212;
            --color-off-white: #F4F5F2;
            --font-montserrat: "Montserrat", sans-serif;
        }

        @layer base {
            body {
                font-family: var(--font-montserrat);
                @apply bg-off-white text-soft-black antialiased;
            }
        }

        @media print {
            body * { visibility: hidden; }
            #printableReport, #printableReport * { visibility: visible; }
            #printableReport {
                position: absolute;
                left: 0;
                top: 0;
                width: 100%;
                display: block !important;
                background: white !important;
            }
            .no-print { display: none !important; }
            * { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }
            .report-block, .report-group {
                break-inside: avoid;
                page-break-inside: avoid;
            }
            .report-group {
                break-before: auto;
                page-break-before: auto;
            }
        }
    </style>
</head>
<body>
    <div class="no-print">
        <div id="sidebar-container"></div>

        <main class="min-h-screen lg:pl-64">
            <div class="min-h-screen px-4 pt-6 pb-6 sm:px-6 lg:px-8 lg:pt-10">
                <header class="mb-10">
                    <h1 class="text-2xl sm:text-3xl font-black text-soft-black uppercase tracking-tighter italic leading-none">
                        Report Engine
                    </h1>
                    <p class="text-[10px] font-bold text-soft-black uppercase tracking-[0.2em] mt-2">
                        Templated Exports - PDF / Excel
                    </p>
                </header>

                <section class="rounded-2xl bg-white border border-gray-100 shadow-xl overflow-hidden">
                    <div class="bg-soft-black p-4">
                        <p class="text-[10px] font-bold uppercase tracking-[0.3em] text-white/80">01. Report template details</p>
                    </div>

                    <div class="p-5 sm:p-8">
                        <div class="mb-8 grid grid-cols-1 gap-4 md:grid-cols-3">
                            <div>
                                <label class="ml-1 text-[10px] font-bold uppercase tracking-widest text-soft-black">Report Name</label>
                                <input type="text" id="reportName" maxlength="100" class="mt-2 w-full rounded-xl border border-gray-200 bg-gray-50/50 p-4 text-sm font-bold outline-none focus:border-soft-black" placeholder="Monthly Inventory Report">
                            </div>
                            <div>
                                <label class="ml-1 text-[10px] font-bold uppercase tracking-widest text-soft-black">Start Date</label>
                                <input type="date" id="dateFrom" class="mt-2 w-full rounded-xl border border-gray-200 bg-gray-50/50 p-4 text-sm font-bold outline-none focus:border-soft-black">
                            </div>
                            <div>
                                <label class="ml-1 text-[10px] font-bold uppercase tracking-widest text-soft-black">End Date</label>
                                <input type="date" id="dateUntil" class="mt-2 w-full rounded-xl border border-gray-200 bg-gray-50/50 p-4 text-sm font-bold outline-none focus:border-soft-black">
                            </div>
                        </div>

                        <p class="mb-4 text-[10px] font-bold uppercase tracking-[0.3em] text-soft-black">02. Choose reports to export</p>
                        <div id="reportOptions" class="grid grid-cols-1 md:grid-cols-2 gap-4"></div>

                        <div class="mt-8 flex flex-col gap-4 sm:flex-row sm:items-center sm:justify-end">
                            <button type="button" id="resetReports" class="text-[10px] font-bold uppercase tracking-widest text-gray-400 hover:text-soft-black">
                                Reset
                            </button>
                            <button type="button" id="exportExcel" class="rounded-xl border border-soft-black/20 bg-soft-black/5 px-8 py-4 text-[11px] font-black uppercase tracking-widest text-soft-black hover:bg-soft-black hover:text-white">
                                Export Excel
                            </button>
                            <button type="button" id="exportPdf" class="rounded-xl bg-soft-black px-8 py-4 text-[11px] font-black uppercase tracking-widest text-white hover:bg-soft-black/80">
                                Export PDF / Print
                            </button>
                        </div>
                    </div>
                </section>

                <section class="mt-6 rounded-2xl bg-white border border-gray-100 shadow-sm overflow-hidden">
                    <div class="bg-soft-black p-4">
                        <p class="text-[10px] font-bold uppercase tracking-[0.3em] text-white/80">03. Export transactions</p>
                    </div>
                    <div class="p-5 sm:p-6">
                        <div id="reportTransactionList" class="space-y-3">
                            <p class="text-[10px] font-bold uppercase tracking-widest text-gray-400">Export a report to record a transaction.</p>
                        </div>
                    </div>
                </section>
            </div>
        </main>
    </div>

    <div id="printableReport" class="hidden p-12 bg-white min-h-screen">
        <div class="flex justify-between items-end border-b-8 border-soft-black pb-6 mb-10">
            <div>
                <h1 class="text-5xl font-black uppercase tracking-tighter italic leading-none">RAGSAK</h1>
                <p class="text-sm font-bold uppercase tracking-[0.4em] text-soft-black">Inventory Report Export</p>
            </div>
            <div class="text-right">
                <p id="printDate" class="text-xs font-mono font-bold mb-1"></p>
                <p id="reportRef" class="text-[10px] font-bold text-gray-400 uppercase tracking-widest"></p>
            </div>
        </div>

        <div id="report-content-area" class="space-y-12"></div>
    </div>

    <script>
        window.currentPageId = 'nav-reports';
    </script>
    <script type="module" src="../components/ragsak_navigation.js"></script>
    <script type="module">
        import { getReportDataset, logReportExport } from '../assets/js/api.js';

        const REPORTS = [
            ['inventoryStock', 'Inventory Stock Report', 'Products by process, raw materials, packaging'],
            ['stockMovement', 'Stock Movement Report', 'All product, raw material, and packaging changelogs'],
            ['orderFulfillment', 'Order Fulfillment Report', 'Orders with total revenue'],
            ['completedLateOrders', 'Completed / Late Orders Report', 'Completed and late order revenue'],
            ['archivedRecords', 'Archived Records Report', 'Grouped archived records without IDs'],
            ['userActivity', 'User Activity Report', 'Order activity grouped by user'],
            ['productConsumption', 'Production Consumption Report', 'BOM usage grouped by product process'],
            ['salesDemand', 'Sales Demand Report', 'Demand, earned revenue, pending revenue, expected revenue']
        ];

        let reportDataset = null;
        let reportDatasetRangeKey = '';

        const peso = value => Number(value || 0).toLocaleString('en-PH', {
            style: 'currency',
            currency: 'PHP'
        });

        const number = value => Number(value || 0).toLocaleString('en-PH');

        function formatDateWords(value) {
            if (!value) return '';
            const date = new Date(`${value}T00:00:00`);
            if (Number.isNaN(date.getTime())) return value;
            return date.toLocaleDateString('en-US', {
                month: 'long',
                day: 'numeric',
                year: 'numeric'
            });
        }

        function escapeHtml(value) {
            return String(value ?? '').replace(/[&<>"']/g, char => ({
                '&': '&amp;',
                '<': '&lt;',
                '>': '&gt;',
                '"': '&quot;',
                "'": '&#039;'
            }[char]));
        }

        function groupBy(rows, key) {
            return rows.reduce((groups, row) => {
                const value = row[key] || 'Unclassified';
                groups[value] = groups[value] || [];
                groups[value].push(row);
                return groups;
            }, {});
        }

        function section(title, body) {
            return `
                <section class="report-block">
                    <h2 class="mb-4 flex items-center text-xl font-black uppercase italic tracking-tight">
                        <span class="mr-3 flex h-8 w-8 items-center justify-center bg-soft-black text-xs text-white not-italic">RS</span>
                        ${escapeHtml(title)}
                    </h2>
                    ${body}
                </section>
            `;
        }

        function table(headers, rows) {
            return `
                <table class="w-full border-collapse text-left text-[11px]">
                    <thead>
                        <tr class="border-b-2 border-soft-black text-[9px] font-black uppercase italic tracking-widest text-gray-400">
                            ${headers.map(header => `<th class="py-2 pr-3">${escapeHtml(header)}</th>`).join('')}
                        </tr>
                    </thead>
                    <tbody class="divide-y divide-gray-100">
                        ${rows || `<tr><td class="py-4 text-gray-400" colspan="${headers.length}">No records found</td></tr>`}
                    </tbody>
                </table>
            `;
        }

        function groupedTables(groups, headers, renderRow) {
            const entries = Object.entries(groups);
            if (!entries.length) return '<p class="py-4 text-xs font-bold uppercase text-gray-400">No records found</p>';

            return entries.map(([group, rows]) => `
                <div class="report-group mb-8">
                    <p class="mb-3 border-l-8 border-soft-black bg-off-white px-4 py-3 text-[11px] font-black uppercase tracking-[0.25em] text-soft-black">${escapeHtml(group)}</p>
                    ${table(headers, rows.map(renderRow).join(''))}
                </div>
            `).join('');
        }

        function inventoryStockReport(data) {
            const productGroups = groupBy(data.inventory.products, 'processName');

            return section('Inventory Stock Report', `
                <p class="mb-4 border-l-8 border-soft-black bg-off-white px-4 py-3 text-[11px] font-black uppercase tracking-[0.25em] text-soft-black">Products</p>
                ${groupedTables(productGroups, ['Product', 'Stock', 'Unit', 'Unit Price', 'Asset Value'], row => `
                    <tr>
                        <td class="py-3 pr-3 font-bold uppercase">${escapeHtml(row.productName)}</td>
                        <td class="py-3 pr-3 font-mono">${number(row.quantity)}</td>
                        <td class="py-3 pr-3">${escapeHtml(row.unitType)}</td>
                        <td class="py-3 pr-3 font-mono">${peso(row.productPrice)}</td>
                        <td class="py-3 pr-3 font-mono font-black">${peso(Number(row.quantity) * Number(row.productPrice))}</td>
                    </tr>
                `)}
                <div class="report-group">
                <p class="mb-4 mt-8 border-l-8 border-soft-black bg-off-white px-4 py-3 text-[11px] font-black uppercase tracking-[0.25em] text-soft-black">Raw Materials</p>
                ${table(['Raw Material', 'Stock', 'Unit', 'Type', 'Unit Price', 'Asset Value'], data.inventory.rawMaterials.map(row => `
                    <tr><td class="py-3 pr-3 font-bold uppercase">${escapeHtml(row.rawMaterialName)}</td><td class="py-3 pr-3 font-mono">${number(row.quantity)}</td><td>${escapeHtml(row.unitType)}</td><td>${escapeHtml(row.matType)}</td><td class="font-mono">${peso(row.rawMaterialPrice)}</td><td class="font-mono font-black">${peso(Number(row.quantity) * Number(row.rawMaterialPrice))}</td></tr>
                `).join(''))}
                </div>
                <div class="report-group">
                <p class="mb-4 mt-8 border-l-8 border-soft-black bg-off-white px-4 py-3 text-[11px] font-black uppercase tracking-[0.25em] text-soft-black">Packaging</p>
                ${table(['Packaging', 'Stock', 'Unit', 'Type', 'Unit Price', 'Asset Value'], data.inventory.packaging.map(row => `
                    <tr><td class="py-3 pr-3 font-bold uppercase">${escapeHtml(row.packagingName)}</td><td class="py-3 pr-3 font-mono">${number(row.quantity)}</td><td>${escapeHtml(row.unitType)}</td><td>${escapeHtml(row.packagingType)}</td><td class="font-mono">${peso(row.packagingPrice)}</td><td class="font-mono font-black">${peso(Number(row.quantity) * Number(row.packagingPrice))}</td></tr>
                `).join(''))}
                </div>
            `);
        }

        function stockMovementReport(data) {
            return section('Stock Movement Report', table(
                ['Date', 'Type', 'Item', 'Group', 'Action', 'Qty', 'Initial', 'Final', 'Reason'],
                data.stockMovements.map(row => `
                    <tr><td class="py-3 pr-3 font-mono">${escapeHtml(row.date)}</td><td>${escapeHtml(row.itemType)}</td><td class="font-bold uppercase">${escapeHtml(row.itemName)}</td><td>${escapeHtml(row.groupName)}</td><td>${escapeHtml(row.action)}</td><td class="font-mono">${number(row.quantity)}</td><td class="font-mono">${number(row.initialQuantity)}</td><td class="font-mono">${number(row.finalQuantity)}</td><td>${escapeHtml(row.reason)}</td></tr>
                `).join('')
            ));
        }

        function orderFulfillmentReport(data, completedOnly = false) {
            const rows = completedOnly
                ? data.orders.filter(row => ['completed', 'late'].includes(row.orderStatus))
                : data.orders;
            const title = completedOnly ? 'Completed / Late Orders Report' : 'Order Fulfillment Report';

            return section(title, table(
                ['Order ID', 'Customer', 'Product', 'Qty', 'Status', 'Due Date', 'Unit Price', 'Total Revenue'],
                rows.map(row => `
                    <tr><td class="py-3 pr-3 font-mono">${row.orderID}</td><td class="font-bold uppercase">${escapeHtml(row.customerName)}</td><td>${escapeHtml(row.productName)}</td><td class="font-mono">${number(row.quantity)}</td><td>${escapeHtml(row.orderStatus)}</td><td class="font-mono">${escapeHtml(row.dateCompletion)}</td><td class="font-mono">${peso(row.productPrice)}</td><td class="font-mono font-black">${peso(row.totalRevenue)}</td></tr>
                `).join('')
            ));
        }

        function archivedRecordsReport(data) {
            const labels = {
                products: 'Products',
                rawMaterials: 'Raw Materials',
                packaging: 'Packaging',
                processes: 'Processes',
                orders: 'Orders'
            };

            return section('Archived Records Report', Object.entries(data.archivedRecords).map(([key, rows]) => `
                <div class="mb-8">
                    <p class="mb-3 rounded-xl bg-soft-black px-4 py-3 text-[10px] font-black uppercase tracking-[0.25em] text-white">${labels[key]}</p>
                    ${table(['Record', 'Archived Date'], rows.map(row => `
                        <tr><td class="py-3 pr-3 font-bold uppercase">${escapeHtml(row.name)}</td><td class="font-mono">${escapeHtml(row.deleted_at)}</td></tr>
                    `).join(''))}
                </div>
            `).join(''));
        }

        function userActivityReport(data) {
            return section('User Activity Report', groupedTables(
                groupBy(data.userActivity, 'username'),
                ['Date', 'Order ID', 'Action'],
                row => `<tr><td class="py-3 pr-3 font-mono">${escapeHtml(row.date)}</td><td class="font-mono">${row.orderID}</td><td class="font-bold uppercase">${escapeHtml(row.action)}</td></tr>`
            ));
        }

        function productConsumptionReport(data) {
            const rows = data.productConsumption.map(row => ({
                ...row,
                group: `${row.productName} - ${row.processName}`
            }));

            return section('Production Consumption Report', groupedTables(
                groupBy(rows, 'group'),
                ['Item Type', 'Item', 'Qty Required', 'Unit'],
                row => `<tr><td class="py-3 pr-3">${escapeHtml(row.itemType)}</td><td class="font-bold uppercase">${escapeHtml(row.itemName)}</td><td class="font-mono">${number(row.quantityRequired)}</td><td>${escapeHtml(row.unitType)}</td></tr>`
            ));
        }

        function salesDemandReport(data) {
            return section('Sales Demand Report', table(
                ['Product', 'Orders', 'Ordered Qty', 'Completed Qty', 'Late Qty', 'Pending Qty', 'Total Revenue', 'Pending Revenue', 'Expected Revenue'],
                data.salesDemand.map(row => `
                    <tr><td class="py-3 pr-3 font-bold uppercase">${escapeHtml(row.productName)}</td><td class="font-mono">${number(row.totalOrders)}</td><td class="font-mono">${number(row.totalQtyOrdered)}</td><td class="font-mono">${number(row.completedQty)}</td><td class="font-mono">${number(row.lateQty)}</td><td class="font-mono">${number(row.pendingQty)}</td><td class="font-mono font-black">${peso(row.totalRevenue)}</td><td class="font-mono">${peso(row.pendingRevenue)}</td><td class="font-mono font-black">${peso(row.expectedRevenue)}</td></tr>
                `).join('')
            ));
        }

        function renderReportTransactions() {
            const list = document.getElementById('reportTransactionList');
            const rows = reportDataset?.reportTransactions || [];

            if (!rows.length) {
                list.innerHTML = '<p class="text-[10px] font-bold uppercase tracking-widest text-gray-400">No report exports found for this timeframe.</p>';
                return;
            }

            list.innerHTML = rows.slice(0, 8).map(row => `
                <div class="rounded-2xl border border-gray-100 bg-off-white/60 p-4">
                    <div class="flex flex-col gap-2 md:flex-row md:items-start md:justify-between">
                        <div>
                            <p class="text-xs font-black uppercase italic text-soft-black">${escapeHtml(row.reportName)}</p>
                            <p class="mt-1 text-[9px] font-bold uppercase tracking-widest text-gray-400">${escapeHtml(row.reportTypes)}</p>
                            <p class="mt-2 text-[9px] font-bold uppercase tracking-widest text-soft-black/60">Timeframe: ${escapeHtml(row.dateFrom ? formatDateWords(row.dateFrom) : 'Start')} To ${escapeHtml(row.dateUntil ? formatDateWords(row.dateUntil) : 'End')}</p>
                        </div>
                        <div class="text-left md:text-right">
                            <p class="text-[9px] font-black uppercase tracking-widest text-soft-black">${escapeHtml(row.exportFormat)}</p>
                            <p class="mt-1 text-[10px] font-mono text-gray-500">${escapeHtml(row.date)}</p>
                            <p class="mt-1 text-[9px] font-bold uppercase tracking-widest text-gray-400">${escapeHtml(row.username)}</p>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        const renderers = {
            inventoryStock: inventoryStockReport,
            stockMovement: stockMovementReport,
            orderFulfillment: data => orderFulfillmentReport(data, false),
            completedLateOrders: data => orderFulfillmentReport(data, true),
            archivedRecords: archivedRecordsReport,
            userActivity: userActivityReport,
            productConsumption: productConsumptionReport,
            salesDemand: salesDemandReport
        };

        function selectedReportKeys() {
            return REPORTS.map(([key]) => key).filter(key => document.getElementById(`report-${key}`).checked);
        }

        function buildReportHtml(keys) {
            if (!reportDataset) return '';
            const rangeLabel = getRangeLabel();
            const timeframeNotice = `
                <div class="mb-8 rounded-2xl border border-soft-black/10 bg-off-white p-5">
                    <p class="text-[9px] font-black uppercase tracking-[0.25em] text-gray-400">Timeframe</p>
                    <p class="mt-2 text-sm font-black uppercase text-soft-black">${escapeHtml(rangeLabel)}</p>
                </div>
            `;
            return timeframeNotice + keys.map(key => renderers[key](reportDataset)).join('');
        }

        function getDateRange() {
            return {
                dateFrom: document.getElementById('dateFrom').value || '',
                dateUntil: document.getElementById('dateUntil').value || ''
            };
        }

        function getRangeLabel() {
            const { dateFrom, dateUntil } = getDateRange();

            if (dateFrom && dateUntil) return `${formatDateWords(dateFrom)} To ${formatDateWords(dateUntil)}`;
            if (dateFrom) return `${formatDateWords(dateFrom)} Onward`;
            if (dateUntil) return `Until ${formatDateWords(dateUntil)}`;
            return 'All available dates';
        }

        function getReportName() {
            return document.getElementById('reportName').value.trim() || `Ragsak Report ${new Date().toISOString().slice(0, 10)}`;
        }

        function sanitizeFileName(value) {
            return String(value || 'ragsak_report')
                .trim()
                .replace(/[<>:"/\\|?*]+/g, '')
                .replace(/\s+/g, '_')
                .slice(0, 90) || 'ragsak_report';
        }

        function getExportFileName(format) {
            const extension = format === 'excel' ? 'xls' : 'pdf';
            return `${sanitizeFileName(getReportName())}.${extension}`;
        }

        async function loadDataset() {
            const range = getDateRange();
            const response = await getReportDataset(range);

            if (!response || response.status !== 'success') {
                alert(response?.message || 'Failed to load report dataset');
                return false;
            }

            reportDataset = response.data;
            reportDatasetRangeKey = `${range.dateFrom}|${range.dateUntil}`;
            renderReportTransactions();
            return true;
        }

        async function prepareReport() {
            const keys = selectedReportKeys();
            const range = getDateRange();
            const rangeKey = `${range.dateFrom}|${range.dateUntil}`;

            if (keys.length === 0) {
                alert('Select at least one report.');
                return false;
            }

            if (range.dateFrom && range.dateUntil && range.dateFrom > range.dateUntil) {
                alert('Start date must be earlier than or equal to end date.');
                return false;
            }

            if (!reportDataset || reportDatasetRangeKey !== rangeKey) {
                if (!(await loadDataset())) return false;
            }

            document.getElementById('printDate').textContent = new Date().toLocaleString('en-PH').toUpperCase();
            document.getElementById('reportRef').textContent = `${getReportName()} - REF: RSK-RPT-${Date.now()}`;
            document.getElementById('report-content-area').innerHTML = buildReportHtml(keys);
            return true;
        }

        async function recordExport(format) {
            const keys = selectedReportKeys();
            const range = getDateRange();
            const typeLabels = REPORTS
                .filter(([key]) => keys.includes(key))
                .map(([, title]) => title)
                .join(', ');

            const response = await logReportExport({
                reportName: getExportFileName(format),
                reportTypes: typeLabels,
                exportFormat: format,
                dateFrom: range.dateFrom,
                dateUntil: range.dateUntil
            });

            if (!response || response.status !== 'success') {
                alert(response?.message || 'Failed to record report export');
                return false;
            }

            await loadDataset();

            return true;
        }

        function exportExcelDocument() {
            const html = `
                <html>
                    <head>
                        <meta charset="UTF-8">
                        <style>
                            body { font-family: Montserrat, Arial, sans-serif; }
                            table { border-collapse: collapse; width: 100%; margin-bottom: 24px; }
                            th { background: #121212; color: #ffffff; text-transform: uppercase; }
                            th, td { border: 1px solid #d9d9d9; padding: 8px; font-size: 11px; }
                            h2 { margin-top: 24px; text-transform: uppercase; }
                            p { font-weight: bold; }
                        </style>
                    </head>
                    <body>${document.getElementById('printableReport').innerHTML}</body>
                </html>
            `;
            const blob = new Blob([html], { type: 'application/vnd.ms-excel' });
            const url = URL.createObjectURL(blob);
            const link = document.createElement('a');
            link.href = url;
            link.download = getExportFileName('excel');
            link.click();
            URL.revokeObjectURL(url);
        }

        document.getElementById('reportOptions').innerHTML = REPORTS.map(([key, title, description]) => `
            <label class="group flex items-center justify-between rounded-xl border border-gray-100 bg-off-white/50 p-4 transition-all hover:border-soft-black">
                <div class="pr-4">
                    <span class="text-xs font-black uppercase tracking-tight">${title}</span>
                    <p class="mt-1 text-[9px] font-bold uppercase italic text-soft-black/60">${description}</p>
                </div>
                <input type="checkbox" id="report-${key}" class="h-5 w-5 accent-soft-black">
            </label>
        `).join('');

        document.getElementById('resetReports').addEventListener('click', () => {
            REPORTS.forEach(([key]) => document.getElementById(`report-${key}`).checked = false);
            document.getElementById('reportName').value = '';
            document.getElementById('dateFrom').value = '';
            document.getElementById('dateUntil').value = '';
            reportDataset = null;
            reportDatasetRangeKey = '';
            renderReportTransactions();
        });

        loadDataset();

        document.getElementById('exportPdf').addEventListener('click', async () => {
            if (!(await prepareReport())) return;
            if (!(await recordExport('pdf'))) return;
            document.fonts.ready.then(() => setTimeout(() => window.print(), 300));
        });

        document.getElementById('exportExcel').addEventListener('click', async () => {
            if (!(await prepareReport())) return;
            if (!(await recordExport('excel'))) return;
            exportExcelDocument();
        });
    </script>
</body>
</html>
