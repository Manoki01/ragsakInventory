<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Report Engine | Ragsak Inventory</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdn.jsdelivr.net/npm/exceljs@4.4.0/dist/exceljs.min.js"></script>

    <style type="text/tailwindcss">
        @theme {
            --color-soft-black: #121212;
            --color-off-white: #F4F5F2;
            --font-montserrat: "Montserrat", sans-serif;
        }

        @layer base {
            body {
                font-family: var(--font-montserrat);
                @apply bg-off-white text-soft-black antialiased;
            }
        }

        table th,
        table td {
            text-align: center !important;
            vertical-align: middle;
        }

        .pdf-main-heading {
            margin-top: 56px;
            margin-bottom: 24px;
            border-bottom: 4px solid #121212;
            padding-bottom: 12px;
            font-size: 18px;
            font-weight: 900;
            font-style: italic;
            text-transform: uppercase;
            letter-spacing: 0;
            color: #121212;
        }

        .pdf-sub-heading {
            margin-top: 8px;
            margin-bottom: 12px;
            border-left: 4px solid #121212;
            background: #f7f7f7;
            padding: 8px 12px;
            font-size: 12px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 0.18em;
            color: #121212;
        }

        @media print {
            @page { margin: 14mm; }
            html, body {
                margin: 0 !important;
                padding: 0 !important;
                background: #ffffff !important;
            }
            body * { visibility: hidden; }
            #printableReport, #printableReport * { visibility: visible; }
            #printableReport {
                position: static;
                left: 0;
                top: 0;
                width: 100%;
                display: block !important;
                min-height: 0 !important;
                height: auto !important;
                padding: 0 !important;
                background: white !important;
                box-shadow: none !important;
            }
            #report-content-area { display: block !important; }
            .no-print { display: none !important; }
            * { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }
            .report-block, .report-group { break-inside: auto; page-break-inside: auto; }
            .report-group { margin-bottom: 18px !important; }
            h2, thead, .report-heading { break-after: avoid; page-break-after: avoid; }
            tr { break-inside: avoid; page-break-inside: avoid; }
            table { break-inside: auto; page-break-inside: auto; }
        }
    </style>
</head>
<body>
    <div class="no-print">
        <div id="sidebar-container"></div>

        <main class="min-h-screen lg:pl-64">
            <div class="min-h-screen px-4 pt-6 pb-6 sm:px-6 lg:px-8 lg:pt-10">
                <header class="mb-10">
                    <h1 class="text-2xl sm:text-3xl font-black text-soft-black uppercase tracking-tighter italic leading-none">
                        Report Engine
                    </h1>
                    <p class="text-[10px] font-bold text-soft-black uppercase tracking-[0.2em] mt-2">
                        Templated Exports - PDF / Excel
                    </p>
                </header>

                <section class="rounded-2xl bg-white border border-gray-100 shadow-xl overflow-hidden">
                    <div class="bg-soft-black p-4">
                        <p class="text-[10px] font-bold uppercase tracking-[0.3em] text-white/80">01. Report template details</p>
                    </div>

                    <div class="p-5 sm:p-8">
                        <div class="mb-8 grid grid-cols-1 gap-4 md:grid-cols-3">
                            <div>
                                <label class="ml-1 text-[10px] font-bold uppercase tracking-widest text-soft-black">Report Name</label>
                                <input type="text" id="reportName" maxlength="100" class="mt-2 w-full rounded-xl border border-gray-200 bg-gray-50/50 p-4 text-sm font-bold outline-none focus:border-soft-black" placeholder="Monthly Inventory Report">
                            </div>
                            <div>
                                <label class="ml-1 text-[10px] font-bold uppercase tracking-widest text-soft-black">Start Date</label>
                                <input type="date" id="dateFrom" class="mt-2 w-full rounded-xl border border-gray-200 bg-gray-50/50 p-4 text-sm font-bold outline-none focus:border-soft-black">
                            </div>
                            <div>
                                <label class="ml-1 text-[10px] font-bold uppercase tracking-widest text-soft-black">End Date</label>
                                <input type="date" id="dateUntil" class="mt-2 w-full rounded-xl border border-gray-200 bg-gray-50/50 p-4 text-sm font-bold outline-none focus:border-soft-black">
                            </div>
                        </div>

                        <p class="mb-4 text-[10px] font-bold uppercase tracking-[0.3em] text-soft-black">02. Choose reports to export</p>
                        <div id="reportOptions" class="grid grid-cols-1 md:grid-cols-2 gap-4"></div>

                        <div class="mt-8 flex flex-col gap-4 sm:flex-row sm:items-center sm:justify-end">
                            <button type="button" id="resetReports" class="text-[10px] font-bold uppercase tracking-widest text-gray-400 hover:text-soft-black">
                                Reset
                            </button>
                            <button type="button" id="exportExcel" class="rounded-xl border border-soft-black/20 bg-soft-black/5 px-8 py-4 text-[11px] font-black uppercase tracking-widest text-soft-black hover:bg-soft-black hover:text-white">
                                Export Excel
                            </button>
                            <button type="button" id="exportPdf" class="rounded-xl bg-soft-black px-8 py-4 text-[11px] font-black uppercase tracking-widest text-white hover:bg-soft-black/80">
                                Export PDF / Print
                            </button>
                        </div>
                    </div>
                </section>

                <section class="mt-6 rounded-2xl bg-white border border-gray-100 shadow-sm overflow-hidden">
                    <div class="bg-soft-black p-4">
                        <p class="text-[10px] font-bold uppercase tracking-[0.3em] text-white/80">03. Export transactions</p>
                    </div>
                    <div class="p-5 sm:p-6">
                        <div id="reportTransactionList" class="space-y-3">
                            <p class="text-[10px] font-bold uppercase tracking-widest text-gray-400">Export a report to record a transaction.</p>
                        </div>
                    </div>
                </section>
            </div>
        </main>
    </div>

    <div id="printableReport" class="hidden p-12 bg-white">
        <div class="flex justify-between items-end border-b-8 border-soft-black pb-6 mb-10">
            <div>
                <h1 class="text-5xl font-black uppercase tracking-tighter italic leading-none">RAGSAK</h1>
                <p class="text-sm font-bold uppercase tracking-[0.4em] text-soft-black">Inventory Report Export</p>
            </div>
            <div class="text-right">
                <p id="printDate" class="text-xs font-mono font-bold mb-1"></p>
            </div>
        </div>

        <div id="report-content-area" class="space-y-12"></div>
    </div>

    <script>
        window.currentPageId = 'nav-reports';
    </script>
    <script type="module" src="../components/ragsak_navigation.js"></script>
    <script type="module">
        import { getReportDataset, logReportExport } from '../assets/js/api.js';

        const REPORTS = [
            ['inventoryStock', 'Inventory Stock Report', 'Products by process, raw materials, packaging'],
            ['stockMovement', 'Stock Movement Report', 'All product, raw material, and packaging changelogs'],
            ['orderFulfillment', 'Order Fulfillment Report', 'Orders with total revenue'],
            ['completedLateOrders', 'Completed / Late Orders Report', 'Completed and late order revenue'],
            ['archivedRecords', 'Archived Records Report', 'Grouped archived records without IDs'],
            ['userActivity', 'User Activity Report', 'Product, material, packaging, process, and order activity'],
            ['productConsumption', 'Production Consumption Report', 'Raw material and packaging use from product stock-in logs'],
            ['salesDemand', 'Sales Demand Report', 'Completed and late sales with total revenue']
        ];

        let reportDataset = null;
        let reportDatasetRangeKey = '';
        let pendingPdfExportRecord = false;

        const peso = value => Number(value || 0).toLocaleString('en-PH', {
            style: 'currency',
            currency: 'PHP'
        });

        const number = value => Number(value || 0).toLocaleString('en-PH');

        function formatDateWords(value) {
            if (!value) return '';
            const date = new Date(`${value}T00:00:00`);
            if (Number.isNaN(date.getTime())) return value;
            return date.toLocaleDateString('en-US', {
                month: 'long',
                day: 'numeric',
                year: 'numeric'
            });
        }

        function escapeHtml(value) {
            return String(value ?? '').replace(/[&<>"']/g, char => ({
                '&': '&amp;',
                '<': '&lt;',
                '>': '&gt;',
                '"': '&quot;',
                "'": '&#039;'
            }[char]));
        }

        function groupBy(rows, key) {
            return rows.reduce((groups, row) => {
                const value = row[key] || 'Unclassified';
                groups[value] = groups[value] || [];
                groups[value].push(row);
                return groups;
            }, {});
        }

        function section(title, body) {
            return `
                <section class="report-block">
                    <h2 class="mb-5 flex items-center border-b-4 border-soft-black pb-3 text-xl font-black uppercase italic tracking-tight">
                        <span class="mr-3 flex h-8 w-8 items-center justify-center bg-soft-black text-xs text-white not-italic">RS</span>
                        ${escapeHtml(title)}
                    </h2>
                    ${body}
                </section>
            `;
        }

        function sectionLabel(title) {
            return `<h3 class="report-heading pdf-main-heading">${escapeHtml(title)}</h3>`;
        }

        function groupLabel(title) {
            return `<h4 class="report-heading pdf-sub-heading">${escapeHtml(title)}</h4>`;
        }

        function table(headers, rows) {
            return `
                <table class="w-full border-collapse text-left text-[11px]">
                    <thead>
                        <tr class="border-b-2 border-soft-black text-[9px] font-black uppercase italic tracking-widest text-gray-400">
                            ${headers.map(header => `<th class="py-2 pr-3">${escapeHtml(header)}</th>`).join('')}
                        </tr>
                    </thead>
                    <tbody class="divide-y divide-gray-100">
                        ${rows || `<tr><td class="py-4 text-gray-400" colspan="${headers.length}">No records found</td></tr>`}
                    </tbody>
                </table>
            `;
        }

        function groupedTables(groups, headers, renderRow) {
            const entries = Object.entries(groups);
            if (!entries.length) return '<p class="py-4 text-xs font-bold uppercase text-gray-400">No records found</p>';

            return entries.map(([group, rows]) => `
                <div class="report-group mb-8">
                    ${groupLabel(group)}
                    ${table(headers, rows.map(renderRow).join(''))}
                </div>
            `).join('');
        }

        function mainTables(groups, headers, renderRow) {
            const entries = Object.entries(groups);
            if (!entries.length) return `${sectionLabel('No Records')}<p class="py-4 text-xs font-bold uppercase text-gray-400">No records found</p>`;

            return entries.map(([group, rows]) => `
                <div class="report-group">
                    ${sectionLabel(group)}
                    ${table(headers, rows.map(renderRow).join(''))}
                </div>
            `).join('');
        }

        function nestedTables(rows, mainKey, subKey, headers, renderRow, mainLabels = {}) {
            const mainGroups = groupBy(rows, mainKey);
            const entries = Object.entries(mainGroups);
            if (!entries.length) return `${sectionLabel('No Records')}<p class="py-4 text-xs font-bold uppercase text-gray-400">No records found</p>`;

            return entries.map(([mainGroup, mainRows]) => `
                <div class="report-group">
                    ${sectionLabel(mainLabels[mainGroup] || mainGroup)}
                    ${groupedTables(groupBy(mainRows, subKey), headers, renderRow)}
                </div>
            `).join('');
        }

        function inventoryStockReport(data) {
            const productGroups = groupBy(data.inventory.products, 'processName');

            return section('Inventory Stock Report', `
                ${sectionLabel('Products')}
                ${groupedTables(productGroups, ['Product', 'Stock', 'Unit', 'Unit Price', 'Asset Value'], row => `
                    <tr>
                        <td class="py-3 pr-3 font-bold uppercase">${escapeHtml(row.productName)}</td>
                        <td class="py-3 pr-3 font-mono">${number(row.quantity)}</td>
                        <td class="py-3 pr-3">${escapeHtml(row.unitType)}</td>
                        <td class="py-3 pr-3 font-mono">${peso(row.productPrice)}</td>
                        <td class="py-3 pr-3 font-mono font-black">${peso(Number(row.quantity) * Number(row.productPrice))}</td>
                    </tr>
                `)}
                <div class="report-group">
                ${sectionLabel('Raw Materials')}
                ${table(['Raw Material', 'Stock', 'Unit', 'Type', 'Unit Price', 'Asset Value'], data.inventory.rawMaterials.map(row => `
                    <tr><td class="py-3 pr-3 font-bold uppercase">${escapeHtml(row.rawMaterialName)}</td><td class="py-3 pr-3 font-mono">${number(row.quantity)}</td><td>${escapeHtml(row.unitType)}</td><td>${escapeHtml(row.matType)}</td><td class="font-mono">${peso(row.rawMaterialPrice)}</td><td class="font-mono font-black">${peso(Number(row.quantity) * Number(row.rawMaterialPrice))}</td></tr>
                `).join(''))}
                </div>
                <div class="report-group">
                ${sectionLabel('Packaging')}
                ${table(['Packaging', 'Stock', 'Unit', 'Type', 'Unit Price', 'Asset Value'], data.inventory.packaging.map(row => `
                    <tr><td class="py-3 pr-3 font-bold uppercase">${escapeHtml(row.packagingName)}</td><td class="py-3 pr-3 font-mono">${number(row.quantity)}</td><td>${escapeHtml(row.unitType)}</td><td>${escapeHtml(row.packagingType)}</td><td class="font-mono">${peso(row.packagingPrice)}</td><td class="font-mono font-black">${peso(Number(row.quantity) * Number(row.packagingPrice))}</td></tr>
                `).join(''))}
                </div>
            `);
        }

        function stockMovementReport(data) {
            const labels = {
                Product: 'Products',
                'Raw Material': 'Raw Materials',
                Packaging: 'Packaging'
            };

            return section('Stock Movement Report', nestedTables(
                data.stockMovements,
                'itemType',
                'groupName',
                ['Date', 'Item', 'Action', 'Qty', 'Initial', 'Final', 'Reason'],
                row => `
                    <tr><td class="py-3 pr-3 font-mono">${escapeHtml(row.date)}</td><td class="font-bold uppercase">${escapeHtml(row.itemName)}</td><td>${escapeHtml(row.action)}</td><td class="font-mono">${number(row.quantity)}</td><td class="font-mono">${number(row.initialQuantity)}</td><td class="font-mono">${number(row.finalQuantity)}</td><td>${escapeHtml(row.reason)}</td></tr>
                `,
                labels
            ));
        }

        function orderStatusLabel(status) {
            return {
                pending: 'Pending Orders',
                completed: 'Completed Orders',
                late: 'Completed Late Orders',
                canceled: 'Canceled Orders'
            }[status] || status;
        }

        function orderRowsByStatus(rows) {
            return rows.map(row => ({
                ...row,
                statusGroup: orderStatusLabel(row.orderStatus),
                productGroup: row.productName || 'Unclassified Product'
            }));
        }

        function renderOrderRow(row) {
            return `
                <tr><td class="py-3 pr-3 font-mono">${row.orderID}</td><td class="font-bold uppercase">${escapeHtml(row.customerName)}</td><td class="font-mono">${number(row.quantity)}</td><td class="font-mono">${escapeHtml(row.dateCompletion)}</td><td class="font-mono">${peso(row.productPrice)}</td><td class="font-mono font-black">${peso(row.totalRevenue)}</td></tr>
            `;
        }

        function orderFulfillmentReport(data, completedOnly = false) {
            const rows = completedOnly
                ? data.orders.filter(row => ['completed', 'late'].includes(row.orderStatus))
                : data.orders;
            const title = completedOnly ? 'Completed / Late Orders Report' : 'Order Fulfillment Report';

            return section(title, nestedTables(
                orderRowsByStatus(rows),
                'statusGroup',
                'productGroup',
                ['Order ID', 'Customer', 'Qty', 'Due Date', 'Unit Price', 'Total Revenue'],
                renderOrderRow
            ));
        }

        function archivedRecordsReport(data) {
            const labels = {
                products: 'Products',
                rawMaterials: 'Raw Materials',
                packaging: 'Packaging',
                processes: 'Processes',
                orders: 'Orders'
            };

            return section('Archived Records Report', Object.entries(data.archivedRecords).map(([key, rows]) => `
                <div class="report-group">
                    ${sectionLabel(labels[key] || key)}
                    ${table(['Record', 'Archived Date'], rows.map(row => `
                        <tr><td class="py-3 pr-3 font-bold uppercase">${escapeHtml(row.name)}</td><td class="font-mono">${escapeHtml(row.deleted_at)}</td></tr>
                    `).join(''))}
                </div>
            `).join(''));
        }

        function userActivityReport(data) {
            const userGroups = groupBy(data.userActivity, 'username');

            return section('User Activity Report', Object.entries(userGroups).map(([username, rows]) => {
                return `
                    <div class="report-group">
                        ${sectionLabel(username)}
                        ${Object.entries(groupBy(rows, 'moduleType')).map(([moduleType, moduleRows]) => {
                            const isOrders = moduleType === 'Orders';

                            return `
                                <div class="report-group mb-8">
                                    ${groupLabel(moduleType)}
                                    ${table(
                                        isOrders
                                            ? ['Date', 'Order ID', 'Record', 'Action']
                                            : ['Date', 'Record', 'Action'],
                                        moduleRows.map(row => isOrders
                                            ? `<tr><td class="py-3 pr-3 font-mono">${escapeHtml(row.date)}</td><td class="font-mono">${escapeHtml(row.orderID || '')}</td><td class="font-bold uppercase">${escapeHtml(row.recordName)}</td><td>${escapeHtml(row.action)}</td></tr>`
                                            : `<tr><td class="py-3 pr-3 font-mono">${escapeHtml(row.date)}</td><td class="font-bold uppercase">${escapeHtml(row.recordName)}</td><td>${escapeHtml(row.action)}</td></tr>`
                                        ).join('')
                                    )}
                                </div>
                            `;
                        }).join('')}
                    </div>
                `;
            }).join(''));
        }

        function productConsumptionReport(data) {
            const rawTotal = data.productConsumption
                .filter(row => row.itemType === 'Raw Material')
                .reduce((total, row) => total + Number(row.quantityConsumed || 0), 0);
            const packagingTotal = data.productConsumption
                .filter(row => row.itemType === 'Packaging')
                .reduce((total, row) => total + Number(row.quantityConsumed || 0), 0);
            const assetValueTotal = data.productConsumption
                .reduce((total, row) => total + Number(row.assetValue || 0), 0);

            return section('Production Consumption Report', `
                ${sectionLabel('Consumption Summary')}
                <div class="mb-8 border-l-8 border-soft-black bg-white px-6 py-5">
                    <div class="grid grid-cols-1 gap-5 sm:grid-cols-3">
                        <div>
                            <p class="text-[10px] font-black uppercase tracking-[0.3em] text-gray-400">Raw Materials Used</p>
                            <p class="mt-2 text-3xl font-black uppercase italic text-soft-black">${number(rawTotal)}</p>
                        </div>
                        <div>
                            <p class="text-[10px] font-black uppercase tracking-[0.3em] text-gray-400">Packaging Used</p>
                            <p class="mt-2 text-3xl font-black uppercase italic text-soft-black">${number(packagingTotal)}</p>
                        </div>
                        <div>
                            <p class="text-[10px] font-black uppercase tracking-[0.3em] text-gray-400">Asset Value Used</p>
                            <p class="mt-2 text-3xl font-black uppercase italic text-soft-black">${peso(assetValueTotal)}</p>
                        </div>
                    </div>
                </div>
                ${mainTables(
                    groupBy(data.productConsumption, 'itemType'),
                    ['Date', 'Item', 'Qty Used', 'Unit', 'Unit Price', 'Asset Value', 'Reason'],
                    row => `<tr><td class="py-3 pr-3 font-mono">${escapeHtml(row.date)}</td><td class="font-bold uppercase">${escapeHtml(row.itemName)}</td><td class="font-mono">${number(row.quantityConsumed)}</td><td>${escapeHtml(row.unitType)}</td><td class="font-mono">${peso(row.unitPrice)}</td><td class="font-mono font-black">${peso(row.assetValue)}</td><td>${escapeHtml(row.reason)}</td></tr>`
                )}
            `);
        }

        function salesDemandReport(data) {
            const summary = data.salesDemandSummary || {};

            return section('Sales Demand Report', `
                ${sectionLabel('Revenue Summary')}
                <div class="mb-8 border-l-8 border-soft-black bg-white px-6 py-5">
                    <div class="grid grid-cols-1 gap-5 sm:grid-cols-2">
                        <div>
                            <p class="text-[10px] font-black uppercase tracking-[0.3em] text-gray-400">Total Orders</p>
                            <p class="mt-2 text-3xl font-black uppercase italic text-soft-black">${number(summary.totalOrders)}</p>
                        </div>
                        <div>
                            <p class="text-[10px] font-black uppercase tracking-[0.3em] text-gray-400">Total Revenue</p>
                            <p class="mt-2 text-3xl font-black uppercase italic text-soft-black">${peso(summary.totalRevenue)}</p>
                        </div>
                    </div>
                </div>
                ${mainTables(
                    { 'Completed / Late Sales Demand': data.salesDemand },
                    ['Product', 'Orders', 'Ordered Qty', 'Completed Qty', 'Late Qty', 'Unit Price', 'Total Revenue'],
                    row => `
                        <tr><td class="py-3 pr-3 font-bold uppercase">${escapeHtml(row.productName)}</td><td class="font-mono">${number(row.totalOrders)}</td><td class="font-mono">${number(row.totalQtyOrdered)}</td><td class="font-mono">${number(row.completedQty)}</td><td class="font-mono">${number(row.lateQty)}</td><td class="font-mono">${peso(row.productPrice)}</td><td class="font-mono font-black">${peso(row.totalRevenue)}</td></tr>
                    `
                )}
            `);
        }

        function renderReportTransactions() {
            const list = document.getElementById('reportTransactionList');
            const rows = reportDataset?.reportTransactions || [];

            if (!rows.length) {
                list.innerHTML = '<p class="text-[10px] font-bold uppercase tracking-widest text-gray-400">No report exports found for this timeframe.</p>';
                return;
            }

            list.innerHTML = rows.slice(0, 8).map(row => `
                <div class="rounded-2xl border border-gray-100 bg-off-white/60 p-4">
                    <div class="flex flex-col gap-2 md:flex-row md:items-start md:justify-between">
                        <div>
                            <p class="text-xs font-black uppercase italic text-soft-black">${escapeHtml(row.reportName)}</p>
                            <p class="mt-1 text-[9px] font-bold uppercase tracking-widest text-gray-400">${escapeHtml(row.reportTypes)}</p>
                            <p class="mt-2 text-[9px] font-bold uppercase tracking-widest text-soft-black/60">Timeframe: ${escapeHtml(row.dateFrom ? formatDateWords(row.dateFrom) : 'Start')} To ${escapeHtml(row.dateUntil ? formatDateWords(row.dateUntil) : 'End')}</p>
                        </div>
                        <div class="text-left md:text-right">
                            <p class="text-[9px] font-black uppercase tracking-widest text-soft-black">${escapeHtml(row.exportFormat)}</p>
                            <p class="mt-1 text-[10px] font-mono text-gray-500">${escapeHtml(row.date)}</p>
                            <p class="mt-1 text-[9px] font-bold uppercase tracking-widest text-gray-400">${escapeHtml(row.username)}</p>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        const renderers = {
            inventoryStock: inventoryStockReport,
            stockMovement: stockMovementReport,
            orderFulfillment: data => orderFulfillmentReport(data, false),
            completedLateOrders: data => orderFulfillmentReport(data, true),
            archivedRecords: archivedRecordsReport,
            userActivity: userActivityReport,
            productConsumption: productConsumptionReport,
            salesDemand: salesDemandReport
        };

        function selectedReportKeys() {
            return REPORTS.map(([key]) => key).filter(key => document.getElementById(`report-${key}`).checked);
        }

        function buildReportHtml(keys) {
            if (!reportDataset) return '';
            const rangeLabel = getRangeLabel();
            const timeframeNotice = `
                <div class="mb-8 border border-soft-black/20 bg-white p-4">
                    <p class="text-[9px] font-black uppercase tracking-[0.25em] text-gray-400">Timeframe</p>
                    <p class="mt-2 text-sm font-black uppercase text-soft-black">${escapeHtml(rangeLabel)}</p>
                </div>
            `;
            return timeframeNotice + keys.map(key => renderers[key](reportDataset)).join('');
        }

        function getDateRange() {
            return {
                dateFrom: document.getElementById('dateFrom').value || '',
                dateUntil: document.getElementById('dateUntil').value || ''
            };
        }

        function getRangeLabel() {
            const { dateFrom, dateUntil } = getDateRange();

            if (dateFrom && dateUntil) return `${formatDateWords(dateFrom)} To ${formatDateWords(dateUntil)}`;
            if (dateFrom) return `${formatDateWords(dateFrom)} Onward`;
            if (dateUntil) return `Until ${formatDateWords(dateUntil)}`;
            return 'All available dates';
        }

        function getReportName() {
            return document.getElementById('reportName').value.trim() || `Ragsak Report ${new Date().toISOString().slice(0, 10)}`;
        }

        function sanitizeFileName(value) {
            return String(value || 'ragsak_report')
                .trim()
                .replace(/[<>:"/\\|?*]+/g, '')
                .replace(/\s+/g, '_')
                .slice(0, 90) || 'ragsak_report';
        }

        function getExportFileName(format) {
            const extension = format === 'excel' ? 'xlsx' : 'pdf';
            return `${sanitizeFileName(getReportName())}.${extension}`;
        }

        async function loadDataset() {
            const range = getDateRange();
            const response = await getReportDataset(range);

            if (!response || response.status !== 'success') {
                alert(response?.message || 'Failed to load report dataset');
                return false;
            }

            reportDataset = response.data;
            reportDatasetRangeKey = `${range.dateFrom}|${range.dateUntil}`;
            renderReportTransactions();
            return true;
        }

        async function prepareReport() {
            const keys = selectedReportKeys();
            const range = getDateRange();
            const rangeKey = `${range.dateFrom}|${range.dateUntil}`;

            if (keys.length === 0) {
                alert('Select at least one report.');
                return false;
            }

            if (range.dateFrom && range.dateUntil && range.dateFrom > range.dateUntil) {
                alert('Start date must be earlier than or equal to end date.');
                return false;
            }

            if (!reportDataset || reportDatasetRangeKey !== rangeKey) {
                if (!(await loadDataset())) return false;
            }

            document.getElementById('printDate').textContent = new Date().toLocaleString('en-PH').toUpperCase();
            document.getElementById('report-content-area').innerHTML = buildReportHtml(keys);
            return true;
        }

        async function recordExport(format) {
            const keys = selectedReportKeys();
            const range = getDateRange();
            const typeLabels = REPORTS
                .filter(([key]) => keys.includes(key))
                .map(([, title]) => title)
                .join(', ');

            const response = await logReportExport({
                reportName: getExportFileName(format),
                reportTypes: typeLabels,
                exportFormat: format,
                dateFrom: range.dateFrom,
                dateUntil: range.dateUntil
            });

            if (!response || response.status !== 'success') {
                alert(response?.message || 'Failed to record report export');
                return false;
            }

            await loadDataset();

            return true;
        }

        function excelTableName(sheetName, index) {
            return `${sheetName.replace(/[^A-Za-z0-9]/g, '')}Table${index}`;
        }

        function setupWorksheet(worksheet, title) {
            worksheet.properties.defaultRowHeight = 18;
            worksheet.views = [{ state: 'frozen', ySplit: 6 }];
            worksheet.columns = Array.from({ length: 10 }, () => ({ width: 22 }));

            worksheet.mergeCells('A1:J1');
            worksheet.getCell('A1').value = 'RAGSAK INVENTORY REPORT EXPORT';
            worksheet.getCell('A1').font = { bold: true, size: 16, color: { argb: 'FFFFFFFF' } };
            worksheet.getCell('A1').fill = { type: 'pattern', pattern: 'solid', fgColor: { argb: 'FF121212' } };
            worksheet.getCell('A1').alignment = { vertical: 'middle' };
            worksheet.getRow(1).height = 28;

            [
                ['Report', title],
                ['Report Name', getReportName()],
                ['Timeframe', getRangeLabel()],
                ['Generated', new Date().toLocaleString('en-PH')]
            ].forEach((row, index) => {
                const excelRow = worksheet.getRow(index + 2);
                excelRow.getCell(1).value = row[0];
                excelRow.getCell(2).value = row[1];
                excelRow.getCell(1).font = { bold: true };
            });

            return { row: 7, tableIndex: 1 };
        }

        function addHeading(worksheet, state, title, level = 'main') {
            worksheet.mergeCells(state.row, 1, state.row, 10);
            const cell = worksheet.getCell(state.row, 1);
            cell.value = title;
            cell.font = {
                bold: true,
                size: level === 'main' ? 13 : 11,
                color: { argb: level === 'main' ? 'FF121212' : 'FF555555' }
            };
            cell.fill = {
                type: 'pattern',
                pattern: 'solid',
                fgColor: { argb: level === 'main' ? 'FFEFEFEF' : 'FFF7F7F7' }
            };
            cell.alignment = { vertical: 'middle' };
            worksheet.getRow(state.row).height = level === 'main' ? 24 : 20;
            state.row += 1;
        }

        function addExcelTable(worksheet, state, headers, records, sheetName) {
            const rows = records.length ? records : [headers.map((_, index) => index === 0 ? 'No records found' : '')];
            const ref = `A${state.row}`;

            worksheet.addTable({
                name: excelTableName(sheetName, state.tableIndex++),
                ref,
                headerRow: true,
                totalsRow: false,
                style: {
                    theme: 'TableStyleMedium2',
                    showRowStripes: true
                },
                columns: headers.map(header => ({ name: header, filterButton: true })),
                rows
            });

            const headerRow = worksheet.getRow(state.row);
            headerRow.font = { bold: true, color: { argb: 'FFFFFFFF' } };
            state.row += rows.length + 2;
        }

        function buildInventoryStockSheet(worksheet, data, sheetName) {
            const state = setupWorksheet(worksheet, 'Inventory Stock Report');

            addHeading(worksheet, state, 'Products', 'main');
            Object.entries(groupBy(data.inventory.products, 'processName')).forEach(([processName, rows]) => {
                addHeading(worksheet, state, processName, 'sub');
                addExcelTable(
                    worksheet,
                    state,
                    ['Product', 'Stock', 'Unit', 'Unit Price', 'Asset Value'],
                    rows.map(row => [
                        row.productName,
                        Number(row.quantity || 0),
                        row.unitType,
                        Number(row.productPrice || 0),
                        Number(row.quantity || 0) * Number(row.productPrice || 0)
                    ]),
                    sheetName
                );
            });

            addHeading(worksheet, state, 'Raw Materials', 'main');
            addExcelTable(
                worksheet,
                state,
                ['Raw Material', 'Stock', 'Unit', 'Type', 'Unit Price', 'Asset Value'],
                data.inventory.rawMaterials.map(row => [
                    row.rawMaterialName,
                    Number(row.quantity || 0),
                    row.unitType,
                    row.matType,
                    Number(row.rawMaterialPrice || 0),
                    Number(row.quantity || 0) * Number(row.rawMaterialPrice || 0)
                ]),
                sheetName
            );

            addHeading(worksheet, state, 'Packaging', 'main');
            addExcelTable(
                worksheet,
                state,
                ['Packaging', 'Stock', 'Unit', 'Type', 'Unit Price', 'Asset Value'],
                data.inventory.packaging.map(row => [
                    row.packagingName,
                    Number(row.quantity || 0),
                    row.unitType,
                    row.packagingType,
                    Number(row.packagingPrice || 0),
                    Number(row.quantity || 0) * Number(row.packagingPrice || 0)
                ]),
                sheetName
            );
        }

        function buildFlatSheet(worksheet, title, mainHeading, headers, records, sheetName) {
            const state = setupWorksheet(worksheet, title);
            addHeading(worksheet, state, mainHeading, 'main');
            addExcelTable(worksheet, state, headers, records, sheetName);
        }

        function buildGroupedSheet(worksheet, title, groups, headers, renderRow, sheetName) {
            const state = setupWorksheet(worksheet, title);
            const entries = Object.entries(groups);

            if (!entries.length) {
                addHeading(worksheet, state, 'No Records', 'main');
                addExcelTable(worksheet, state, headers, [], sheetName);
                return;
            }

            entries.forEach(([group, rows]) => {
                addHeading(worksheet, state, group, 'main');
                addExcelTable(worksheet, state, headers, rows.map(renderRow), sheetName);
            });
        }

        function buildNestedSheet(worksheet, title, rows, mainKey, subKey, headers, renderRow, sheetName, mainLabels = {}) {
            const state = setupWorksheet(worksheet, title);
            const entries = Object.entries(groupBy(rows, mainKey));

            if (!entries.length) {
                addHeading(worksheet, state, 'No Records', 'main');
                addExcelTable(worksheet, state, headers, [], sheetName);
                return;
            }

            entries.forEach(([mainGroup, mainRows]) => {
                addHeading(worksheet, state, mainLabels[mainGroup] || mainGroup, 'main');
                Object.entries(groupBy(mainRows, subKey)).forEach(([subGroup, subRows]) => {
                    addHeading(worksheet, state, subGroup, 'sub');
                    addExcelTable(worksheet, state, headers, subRows.map(renderRow), sheetName);
                });
            });
        }

        const sheetBuilders = {
            inventoryStock: ['Inventory Stock', buildInventoryStockSheet],
            stockMovement: ['Stock Movement', (worksheet, data, sheetName) => buildFlatSheet(
                worksheet,
                'Stock Movement Report',
                'Stock Movement',
                ['Date', 'Type', 'Item', 'Group', 'Action', 'Qty', 'Initial', 'Final', 'Reason'],
                data.stockMovements.map(row => [
                    row.date,
                    row.itemType,
                    row.itemName,
                    row.groupName,
                    row.action,
                    Number(row.quantity || 0),
                    Number(row.initialQuantity || 0),
                    Number(row.finalQuantity || 0),
                    row.reason
                ]),
                sheetName
            )],
            orderFulfillment: ['Order Fulfillment', (worksheet, data, sheetName) => buildFlatSheet(
                worksheet,
                'Order Fulfillment Report',
                'Orders',
                ['Order ID', 'Customer', 'Product', 'Qty', 'Status', 'Due Date', 'Unit Price', 'Total Revenue'],
                data.orders.map(row => [
                    Number(row.orderID || 0),
                    row.customerName,
                    row.productName,
                    Number(row.quantity || 0),
                    row.orderStatus,
                    row.dateCompletion,
                    Number(row.productPrice || 0),
                    Number(row.totalRevenue || 0)
                ]),
                sheetName
            )],
            completedLateOrders: ['Completed Late', (worksheet, data, sheetName) => buildFlatSheet(
                worksheet,
                'Completed / Late Orders Report',
                'Completed / Late Orders',
                ['Order ID', 'Customer', 'Product', 'Qty', 'Status', 'Due Date', 'Unit Price', 'Total Revenue'],
                data.orders.filter(row => ['completed', 'late'].includes(row.orderStatus)).map(row => [
                    Number(row.orderID || 0),
                    row.customerName,
                    row.productName,
                    Number(row.quantity || 0),
                    row.orderStatus,
                    row.dateCompletion,
                    Number(row.productPrice || 0),
                    Number(row.totalRevenue || 0)
                ]),
                sheetName
            )],
            archivedRecords: ['Archived Records', (worksheet, data, sheetName) => {
                const labels = {
                    products: 'Products',
                    rawMaterials: 'Raw Materials',
                    packaging: 'Packaging',
                    processes: 'Processes',
                    orders: 'Orders'
                };
                const state = setupWorksheet(worksheet, 'Archived Records Report');
                Object.entries(data.archivedRecords).forEach(([key, rows]) => {
                    addHeading(worksheet, state, labels[key] || key, 'main');
                    addExcelTable(
                        worksheet,
                        state,
                        ['Record', 'Archived Date'],
                        rows.map(row => [row.name, row.deleted_at]),
                        sheetName
                    );
                });
            }],
            userActivity: ['User Activity', (worksheet, data, sheetName) => {
                const state = setupWorksheet(worksheet, 'User Activity Report');
                Object.entries(groupBy(data.userActivity, 'username')).forEach(([username, rows]) => {
                    addHeading(worksheet, state, username, 'main');
                    Object.entries(groupBy(rows, 'moduleType')).forEach(([moduleType, moduleRows]) => {
                        const isOrders = moduleType === 'Orders';

                        addHeading(worksheet, state, moduleType, 'sub');
                        addExcelTable(
                            worksheet,
                            state,
                            isOrders
                                ? ['Date', 'Order ID', 'Record', 'Action']
                                : ['Date', 'Record', 'Action'],
                            moduleRows.map(row => isOrders
                                ? [
                                    row.date,
                                    row.orderID ? Number(row.orderID) : '',
                                    row.recordName,
                                    row.action
                                ]
                                : [
                                    row.date,
                                    row.recordName,
                                    row.action
                                ]
                            ),
                            sheetName
                        );
                    });
                });
            }],
            productConsumption: ['Product Consumption', (worksheet, data, sheetName) => {
                const worksheetState = setupWorksheet(worksheet, 'Production Consumption Report');
                const rawTotal = data.productConsumption
                    .filter(row => row.itemType === 'Raw Material')
                    .reduce((total, row) => total + Number(row.quantityConsumed || 0), 0);
                const packagingTotal = data.productConsumption
                    .filter(row => row.itemType === 'Packaging')
                    .reduce((total, row) => total + Number(row.quantityConsumed || 0), 0);
                const assetValueTotal = data.productConsumption
                    .reduce((total, row) => total + Number(row.assetValue || 0), 0);

                addHeading(worksheet, worksheetState, 'Consumption Summary', 'main');
                addExcelTable(
                    worksheet,
                    worksheetState,
                    ['Total Raw Materials Used', 'Total Packaging Used', 'Total Asset Value Used'],
                    [[rawTotal, packagingTotal, assetValueTotal]],
                    sheetName
                );

                Object.entries(groupBy(data.productConsumption, 'itemType')).forEach(([itemType, rows]) => {
                    addHeading(worksheet, worksheetState, itemType, 'main');
                    addExcelTable(
                        worksheet,
                        worksheetState,
                        ['Date', 'Item', 'Qty Used', 'Unit', 'Unit Price', 'Asset Value', 'Reason'],
                        rows.map(row => [
                            row.date,
                            row.itemName,
                            Number(row.quantityConsumed || 0),
                            row.unitType,
                            Number(row.unitPrice || 0),
                            Number(row.assetValue || 0),
                            row.reason
                        ]),
                        sheetName
                    );
                });
            }],
            salesDemand: ['Sales Demand', (worksheet, data, sheetName) => {
                const state = setupWorksheet(worksheet, 'Sales Demand Report');
                const summary = data.salesDemandSummary || {};

                addHeading(worksheet, state, 'Revenue Summary', 'main');
                addExcelTable(
                    worksheet,
                    state,
                    ['Total Orders', 'Total Revenue'],
                    [[Number(summary.totalOrders || 0), Number(summary.totalRevenue || 0)]],
                    sheetName
                );

                addHeading(worksheet, state, 'Completed / Late Sales Demand', 'main');
                addExcelTable(
                    worksheet,
                    state,
                    ['Product', 'Orders', 'Ordered Qty', 'Completed Qty', 'Late Qty', 'Unit Price', 'Total Revenue'],
                    data.salesDemand.map(row => [
                        row.productName,
                        Number(row.totalOrders || 0),
                        Number(row.totalQtyOrdered || 0),
                        Number(row.completedQty || 0),
                        Number(row.lateQty || 0),
                        Number(row.productPrice || 0),
                        Number(row.totalRevenue || 0)
                    ]),
                    sheetName
                );
            }]
        };

        async function exportExcelDocument(keys) {
            if (!window.ExcelJS) {
                alert('Excel export library did not load. Please check your internet connection and try again.');
                return false;
            }

            const workbook = new ExcelJS.Workbook();
            workbook.creator = 'Ragsak Inventory';
            workbook.created = new Date();

            keys.forEach(key => {
                const [sheetName, buildRows] = sheetBuilders[key];
                const worksheet = workbook.addWorksheet(sheetName.slice(0, 31));
                buildRows(worksheet, reportDataset, sheetName);
            });

            const buffer = await workbook.xlsx.writeBuffer();
            const blob = new Blob([buffer], {
                type: 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet'
            });
            const url = URL.createObjectURL(blob);
            const link = document.createElement('a');
            link.href = url;
            link.download = getExportFileName('excel');
            link.click();
            URL.revokeObjectURL(url);
            return true;
        }

        document.getElementById('reportOptions').innerHTML = REPORTS.map(([key, title, description]) => `
            <label class="group flex items-center justify-between rounded-xl border border-gray-100 bg-off-white/50 p-4 transition-all hover:border-soft-black">
                <div class="pr-4">
                    <span class="text-xs font-black uppercase tracking-tight">${title}</span>
                    <p class="mt-1 text-[9px] font-bold uppercase italic text-soft-black/60">${description}</p>
                </div>
                <input type="checkbox" id="report-${key}" class="h-5 w-5 accent-soft-black">
            </label>
        `).join('');

        document.getElementById('resetReports').addEventListener('click', () => {
            REPORTS.forEach(([key]) => document.getElementById(`report-${key}`).checked = false);
            document.getElementById('reportName').value = '';
            document.getElementById('dateFrom').value = '';
            document.getElementById('dateUntil').value = '';
            reportDataset = null;
            reportDatasetRangeKey = '';
            renderReportTransactions();
        });

        loadDataset();

        window.addEventListener('afterprint', async () => {
            if (!pendingPdfExportRecord) return;

            pendingPdfExportRecord = false;

            setTimeout(async () => {
                const didExport = window.confirm('Did you save or print this PDF report? Click OK only if the report was exported.');
                if (didExport) await recordExport('pdf');
            }, 200);
        });

        document.getElementById('exportPdf').addEventListener('click', async () => {
            if (!(await prepareReport())) return;
            pendingPdfExportRecord = true;
            document.fonts.ready.then(() => setTimeout(() => window.print(), 300));
        });

        document.getElementById('exportExcel').addEventListener('click', async () => {
            if (!(await prepareReport())) return;
            const keys = selectedReportKeys();
            if (!(await exportExcelDocument(keys))) return;
            await recordExport('excel');
        });
    </script>
</body>
