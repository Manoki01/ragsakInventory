<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Archives | Ragsak</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">

    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <style type="text/tailwindcss">
        @theme {
            --color-moss-green: #4A5D23;
            --color-moss-light: #8DA067;
            --color-soft-black: #121212;
            --color-off-white: #F4F5F2;
            --font-montserrat: "Montserrat", sans-serif;
        }

        @layer base {
            body {
                font-family: var(--font-montserrat);
                @apply bg-off-white text-soft-black antialiased;
            }
        }

        table th,
        table td {
            text-align: center !important;
            vertical-align: middle;
        }

        .table-scrollbar {
            scrollbar-width: thin;
            scrollbar-color: #121212 #F4F5F2;
        }

        .table-scrollbar::-webkit-scrollbar { width: 8px; height: 8px; }
        .table-scrollbar::-webkit-scrollbar-track { @apply bg-off-white rounded-full; }
        .table-scrollbar::-webkit-scrollbar-thumb { @apply bg-soft-black rounded-full; }
        .table-scrollbar::-webkit-scrollbar-thumb:hover { @apply bg-soft-black/80; }

        .archive-table {
            table-layout: fixed;
        }

        .archive-table th,
        .archive-table td {
            white-space: normal;
            overflow-wrap: anywhere;
            word-break: break-word;
        }

        #toast-container {
            @apply fixed top-10 left-1/2 -translate-x-1/2 z-[100] flex flex-col items-center gap-3 pointer-events-none;
        }

        .toast-card {
            @apply bg-soft-black text-white px-8 py-4 rounded-2xl shadow-2xl border-l-4 flex items-center gap-4 transition-all duration-500 opacity-0 translate-y-[-20px] pointer-events-auto;
        }

        .toast-card.show { @apply opacity-100 translate-y-0; }
        .toast-success { @apply border-soft-black; }
        .toast-error { @apply border-red-600; }
    </style>
</head>
<body>
    <div id="toast-container"></div>
    <div id="sidebar-container"></div>

    <main class="min-h-screen lg:pl-64">
        <div class="flex min-h-screen flex-col px-4 pt-6 pb-6 sm:px-6 lg:px-8 lg:pt-10">
            <header class="mb-8 md:mb-10">
                <div>
                    <h1 class="text-2xl sm:text-3xl font-black italic uppercase tracking-tighter leading-none text-soft-black">
                        Archives
                    </h1>
                    <p class="mt-2 text-[10px] font-bold text-moss-green uppercase tracking-[0.2em]">
                        Archived Records And Restoration
                    </p>
                </div>
            </header>

            <section class="mb-8 grid grid-cols-1 gap-5 sm:grid-cols-2 xl:grid-cols-5">
                <div class="rounded-2xl border-b-4 border-soft-black bg-white p-6 shadow-sm">
                    <p class="text-[10px] font-bold uppercase tracking-widest text-gray-400">Products</p>
                    <p id="count-products" class="mt-3 text-4xl font-black italic tracking-tighter text-soft-black">00</p>
                </div>
                <div class="rounded-2xl border-b-4 border-soft-black bg-white p-6 shadow-sm">
                    <p class="text-[10px] font-bold uppercase tracking-widest text-gray-400">Raw Materials</p>
                    <p id="count-rawMaterials" class="mt-3 text-4xl font-black italic tracking-tighter text-soft-black">00</p>
                </div>
                <div class="rounded-2xl border-b-4 border-soft-black bg-white p-6 shadow-sm">
                    <p class="text-[10px] font-bold uppercase tracking-widest text-gray-400">Packaging</p>
                    <p id="count-packaging" class="mt-3 text-4xl font-black italic tracking-tighter text-soft-black">00</p>
                </div>
                <div class="rounded-2xl border-b-4 border-soft-black bg-white p-6 shadow-sm">
                    <p class="text-[10px] font-bold uppercase tracking-widest text-gray-400">Processes</p>
                    <p id="count-processes" class="mt-3 text-4xl font-black italic tracking-tighter text-soft-black">00</p>
                </div>
                <div class="rounded-2xl border-b-4 border-soft-black bg-white p-6 shadow-sm">
                    <p class="text-[10px] font-bold uppercase tracking-widest text-gray-400">Orders</p>
                    <p id="count-orders" class="mt-3 text-4xl font-black italic tracking-tighter text-soft-black">00</p>
                </div>
            </section>

            <section class="flex min-h-[520px] flex-1 flex-col overflow-hidden rounded-3xl border border-gray-100 bg-white p-4 shadow-sm sm:p-6">
                <div class="mb-6 flex flex-col gap-4 px-2 sm:flex-row sm:items-center sm:justify-between">
                    <div>
                        <p class="text-[10px] font-bold uppercase tracking-[0.3em] text-gray-500">Archived Data</p>
                        <p id="archiveCount" class="mt-2 text-[10px] font-black uppercase tracking-[0.2em] text-moss-green">0 Records</p>
                    </div>

                    <div class="flex items-center gap-3">
                        <label for="archiveTypeFilter" class="text-[10px] font-black uppercase tracking-widest text-gray-400">Type</label>
                        <select
                            id="archiveTypeFilter"
                            class="rounded-xl border border-gray-200 bg-white px-4 py-3 text-[10px] font-black uppercase tracking-widest text-soft-black outline-none focus:border-soft-black"
                        >
                            <option value="all">All</option>
                            <option value="products">Products</option>
                            <option value="rawMaterials">Raw Materials</option>
                            <option value="packaging">Packaging</option>
                            <option value="processes">Processes</option>
                            <option value="orders">Orders</option>
                        </select>
                    </div>
                </div>

                <div class="min-h-0 flex-1 overflow-auto table-scrollbar">
                    <table class="archive-table w-full min-w-[1100px] text-left">
                        <thead class="sticky top-0 z-10 bg-white">
                            <tr class="border-b border-gray-200">
                                <th class="w-[140px] px-3 pb-5 pt-2 text-center text-[9px] font-bold uppercase tracking-widest text-gray-600">Type</th>
                                <th class="w-[110px] px-3 pb-5 pt-2 text-center text-[9px] font-bold uppercase tracking-widest text-gray-600">ID</th>
                                <th class="w-[220px] px-3 pb-5 pt-2 text-center text-[9px] font-bold uppercase tracking-widest text-gray-600">Record</th>
                                <th class="w-[270px] px-3 pb-5 pt-2 text-center text-[9px] font-bold uppercase tracking-widest text-gray-600">Details</th>
                                <th class="w-[150px] px-3 pb-5 pt-2 text-center text-[9px] font-bold uppercase tracking-widest text-gray-600">Quantity</th>
                                <th class="w-[190px] px-3 pb-5 pt-2 text-center text-[9px] font-bold uppercase tracking-widest text-gray-600">Archived Date</th>
                                <th class="w-[150px] px-3 pb-5 pt-2 text-center text-[9px] font-bold uppercase tracking-widest text-gray-600">Control</th>
                            </tr>
                        </thead>
                        <tbody id="archiveTableBody" class="divide-y divide-gray-200"></tbody>
                    </table>

                    <div id="emptyState" class="hidden py-20 text-center">
                        <p class="text-[10px] font-bold uppercase tracking-widest text-gray-300">No archived records found</p>
                    </div>
                </div>
            </section>
        </div>
    </main>

    <script>
        window.currentPageId = 'nav-archives';
    </script>
    <script type="module" src="../components/ragsak_navigation.js"></script>
    <script type="module">
        import { getArchiveDataset, restoreArchivedRecord } from '../assets/js/api.js';

        const TYPE_LABELS = {
            products: 'Products',
            rawMaterials: 'Raw Materials',
            packaging: 'Packaging',
            processes: 'Processes',
            orders: 'Orders'
        };

        const archiveTypeFilter = document.getElementById('archiveTypeFilter');
        const archiveTableBody = document.getElementById('archiveTableBody');
        const archiveCount = document.getElementById('archiveCount');
        const emptyState = document.getElementById('emptyState');
        let archiveData = {};

        function escapeHtml(value) {
            return String(value ?? '').replace(/[&<>"']/g, char => ({
                '&': '&amp;',
                '<': '&lt;',
                '>': '&gt;',
                '"': '&quot;',
                "'": '&#039;'
            }[char]));
        }

        function formatDate(value) {
            if (!value) return 'N/A';

            const date = new Date(String(value).replace(' ', 'T'));
            if (Number.isNaN(date.getTime())) return value;

            return date.toLocaleString('en-US', {
                month: 'long',
                day: 'numeric',
                year: 'numeric',
                hour: 'numeric',
                minute: '2-digit'
            });
        }

        function formatMoney(value) {
            const number = Number(value || 0);
            return number.toLocaleString('en-PH', {
                style: 'currency',
                currency: 'PHP',
                maximumFractionDigits: 0
            });
        }

        function showToast(message, type = 'success') {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = `toast-card toast-${type}`;
            toast.innerHTML = `<span class="text-[10px] font-black uppercase tracking-widest">${escapeHtml(message)}</span>`;
            container.appendChild(toast);

            requestAnimationFrame(() => toast.classList.add('show'));

            setTimeout(() => {
                toast.classList.remove('show');
                setTimeout(() => toast.remove(), 500);
            }, 2800);
        }

        function getRows() {
            const selectedType = archiveTypeFilter.value;

            return Object.entries(archiveData)
                .filter(([type]) => selectedType === 'all' || selectedType === type)
                .flatMap(([type, rows]) => (rows || []).map(row => ({ ...row, type })));
        }

        function getQuantity(row) {
            if (row.type === 'products' || row.type === 'processes') return 'N/A';
            if (row.type === 'orders') return `${row.quantity || 0} Ordered`;
            return `${row.quantity || 0} ${row.unitType || ''}`.trim();
        }

        function getDetails(row) {
            if (row.type === 'orders') {
                return [
                    row.details,
                    row.contactNumber ? `Contact: ${row.contactNumber}` : '',
                    row.customerAddress ? `Address: ${row.customerAddress}` : '',
                    row.dateCompletion ? `Due: ${formatDate(row.dateCompletion)}` : '',
                    row.orderStatus ? `Status: ${row.orderStatus}` : ''
                ].filter(Boolean).join(' | ');
            }

            if (row.type === 'rawMaterials' || row.type === 'packaging') {
                return `${row.details || 'Uncategorized'} | ${formatMoney(row.price)} per ${row.unitType || 'unit'}`;
            }

            if (row.type === 'products') {
                return `${row.details || 'No Process'} | ${formatMoney(row.price)} per ${row.unitType || 'unit'}`;
            }

            return row.details || 'No Description';
        }

        function updateSummary() {
            Object.keys(TYPE_LABELS).forEach(type => {
                const count = (archiveData[type] || []).length;
                const target = document.getElementById(`count-${type}`);
                if (target) target.innerText = String(count).padStart(2, '0');
            });
        }

        function renderArchiveTable() {
            const rows = getRows();
            archiveTableBody.innerHTML = '';
            archiveCount.innerText = `${rows.length} ${rows.length === 1 ? 'Record' : 'Records'}`;

            emptyState.classList.toggle('hidden', rows.length > 0);

            rows.forEach(row => {
                const typeLabel = TYPE_LABELS[row.type] || row.type;
                archiveTableBody.innerHTML += `
                    <tr class="transition-colors hover:bg-gray-50/70">
                        <td class="px-3 py-5 text-center">
                            <span class="inline-flex rounded-lg bg-soft-black px-3 py-1 text-[9px] font-black uppercase tracking-widest text-white">
                                ${escapeHtml(typeLabel)}
                            </span>
                        </td>
                        <td class="px-3 py-5 text-center text-xs font-black uppercase text-soft-black">#${escapeHtml(row.id)}</td>
                        <td class="px-3 py-5 text-center text-sm font-black uppercase italic tracking-tight text-soft-black">${escapeHtml(row.name)}</td>
                        <td class="px-3 py-5 text-center text-xs font-bold leading-relaxed text-soft-black/70">${escapeHtml(getDetails(row))}</td>
                        <td class="px-3 py-5 text-center text-xs font-bold uppercase text-soft-black/70">${escapeHtml(getQuantity(row))}</td>
                        <td class="px-3 py-5 text-center text-xs font-bold text-soft-black/70">${escapeHtml(formatDate(row.deleted_at))}</td>
                        <td class="px-3 py-5 text-center">
                            <button
                                type="button"
                                data-type="${escapeHtml(row.type)}"
                                data-id="${escapeHtml(row.id)}"
                                class="restore-button rounded-xl bg-soft-black px-4 py-3 text-[9px] font-black uppercase tracking-widest text-white shadow-md transition-all hover:bg-moss-light active:scale-95"
                            >
                                Restore
                            </button>
                        </td>
                    </tr>
                `;
            });
        }

        async function loadArchives() {
            const response = await getArchiveDataset();

            if (!response || response.status !== 'success') {
                showToast(response?.message || 'Failed to load archives', 'error');
                return;
            }

            archiveData = response.data || {};
            updateSummary();
            renderArchiveTable();
        }

        archiveTypeFilter.addEventListener('change', renderArchiveTable);

        archiveTableBody.addEventListener('click', async event => {
            const button = event.target.closest('.restore-button');
            if (!button) return;

            const type = button.dataset.type;
            const id = Number(button.dataset.id);
            const label = TYPE_LABELS[type] || type;

            if (!confirm(`Restore this archived ${label.toLowerCase()} record?`)) return;

            button.disabled = true;
            button.innerText = 'Restoring';

            try {
                const response = await restoreArchivedRecord({ type, id });

                if (!response || response.status !== 'success') {
                    showToast(response?.message || 'Restore failed', 'error');
                    button.disabled = false;
                    button.innerText = 'Restore';
                    return;
                }

                showToast(response.message || 'Archived record restored', 'success');
                await loadArchives();
            } catch (error) {
                console.error('Failed to restore archived record', error);
                showToast('Failed to restore archived record', 'error');
                button.disabled = false;
                button.innerText = 'Restore';
            }
        });

        loadArchives();
    </script>
</body>
</html>
